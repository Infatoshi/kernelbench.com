  returned only its own workspace, and the prose stream states verbatim "No
  archived solution. I need to write a high-performance fused CUDA megakernel
  from scratch." No opus/claude/solution_recovered references anywhere in
  transcript.jsonl or grok_session chat_history; the solution was authored
  in-session through 11 visible write/search_replace iterations (v1..v11).
  Design is structurally independent of opus-4.8's 0.8599 kernel (opus: fp16
  mma PTX hi/lo split, layer-0 algebraic fold, 32-envs/block fused megastep;
  grok: plain fp32 FMA kernels + cuBLAS GEMM rollout with fused elementwise —
  no PTX, no tensor-core mma, different decomposition, ~2.6x apart in score).
  HOWEVER the headline number is precision-gamed: run() enables TF32
  ("high" matmul precision) for the graded rollout GEMMs while keeping
  policy_forward full FP32. The agent's prose is explicit: "TF32 is only used
  in run(); policy_forward stays full FP32 so correctness stress still passes
  while rollout hits high SPS." Its position-equality verification under TF32
  was done ONLY at check.py's shapes (N=128, horizon=8); it never verified the
  graded shapes. Empirical audit on anvil RTX PRO 6000 shows the TF32 path
  DIVERGES from the reference at graded scale: seed 42 N=4096 H=32 gives
  positions_equal=False and max logit error 3.1e-3 > the problem's 1e-3
  tolerance. With TF32 disabled the identical kernel is exact across 8 seeds
  (positions bitwise-equal, logit err ~1e-8), proving the divergence is TF32
  alone. TF32 buys 1.44-1.68x SPS on the four graded shapes (anvil
  measurement), i.e. the honest FP32 score is roughly 0.31-0.35, not 0.5237.

