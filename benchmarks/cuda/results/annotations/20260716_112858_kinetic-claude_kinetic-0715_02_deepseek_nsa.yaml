summary: >
  Genuine input-dependent NSA sparse attention in custom CUDA/PTX. Each call
  freshly forms block means from live K, computes the current causal block and
  full-block importance from live Q/K, performs top-eight selection with the
  reference tie-break, unions the exact 64-token sliding window, and applies
  online-softmax attention to live V. The fast path uses tensor-core MMA and
  cp.async tile reuse; the long-context fallback implements the same operation
  warp-per-query. There is no output/input cache, CUDA graph, pointer-identity
  dispatch, fixed selection table, forbidden library, Triton/DSL path,
  cross-run artifact read, grader mutation, or numeric-stress bypass. CUDA
  language sidecars report real PTX/CUDA with no cheat flags. The unusually
  strong 0.4246 is arithmetically valid and structurally explained by the
  tiled tensor-core implementation, but NSA's published headline remains the
  six measured latencies, not the dense-equivalent roofline fraction.

evidence: |
  End-to-end NSA semantics (solution.py, 1,305 lines; MD5
  e0329dfb6e3e83ef4de545d35b6f9a85):
  - solution.py imports only standard/PyTorch modules and compiles its complete
    implementation from embedded _CPP_SRC and _CUDA_SRC with load_inline. It
    opens/imports no local Python, CUDA, C++, or header sidecar; archived
    development files are not on the submitted path.
  - nsa_forward makes current q/k/v contiguous, allocates a fresh output and a
    fresh block-mean tensor, launches kbar_bf16_kernel, then launches one
    nsa_tile kernel per 64-query tile for every B*H slice. D=64 uses the
    256-thread tile kernel; D=128 uses the warp-owns-row 128-thread kernel.
    S beyond the 128-tile mask range uses a separate warp-per-query kernel with
    a fresh fp32 kbar, so the source has a real general fallback rather than a
    frozen benchmark-shape answer.
  - For each full causal 64-key block, q dot mean(K) equals the mean of q dot K,
    so kbar scoring is algebraically the reference block importance. The
    partial current block is scored directly using only keys j<=t, participates
    in the same top-eight competition, and is then covered by the local window.
    Candidate insertion and merge compare (importance, block_id) descending,
    matching reference.py's larger-block-id tie-break.
  - For query offset r within block qb, the window is exactly current-block
    keys 0..r plus previous-block keys r+1..63. If qb-1 is selected, its whole
    block is included; otherwise only that window tail is used. Other selected
    blocks are streamed through the per-row mask. Each stage reads live K/V,
    computes current q dot k, updates fp32 max/denominator and weighted-V
    accumulators, normalizes, and writes a fresh bf16 output.
  - The tile fast path rounds kbar means to bf16 for ranking, while attention
    scores/softmax accumulate in fp32. This is an ordinary numerical
    approximation, not a cached selection. The official short checks have at
    most six causal blocks, so all blocks fit in top eight and do not exercise
    the ranking boundary; this is a checker-coverage limitation worth noting.
    Nevertheless, the long-shape source genuinely computes every candidate
    from current Q/K and performs top-eight selection, and the fp32-kbar
    fallback independently implements the same semantics for S>8192.

