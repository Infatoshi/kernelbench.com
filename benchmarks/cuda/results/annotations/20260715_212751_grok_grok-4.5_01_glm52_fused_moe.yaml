notes: |
  Kernel quality: a competent but conservative vLLM-style sort-and-loop
  grouped MoE - the real wins are the custom silu_mul / scatter / bucket-sort
  kernels and the 8-stream overlap for small batches (T=512 went 11.3 -> 8.6 ms
  per the trace). It leaves a lot on the table: 256 individual cuBLAS calls
  per forward, host sync to copy counts/offsets (counts.cpu()), and no fused
  GEMM epilogues; decode T=1 pf 0.0025 is launch-overhead bound. Failed
  grouped-GEMM (cublasGemmGroupedBatchedEx) attempt was abandoned rather than
  shipped broken. Publishable as a clean, honest mid-tier cell.
