summary: >
  Genuine GLM-5.2-class fused MoE in inline CUDA (load_inline, no sidecars):
  shared-expert FFN via ATen/cuBLAS bf16 GEMMs, device histogram + exclusive
  scan + bucket-sort of (token, expert, weight) by expert id, then per-expert
  gather -> gate|up GEMM -> custom silu_and_mul kernel -> down GEMM ->
  weighted scatter into an fp32 accumulator, cast to bf16. Small-T path (T <
  2048) fans experts over 8 cached non-blocking CUDA streams with an atomic
  f32 scatter; large-T runs sequential with a non-atomic scatter (tokens are
  unique per expert). No output caching, no CUDA graphs, no data_ptr keying,
  no forbidden ops (no Triton, no vllm, no torch._grouped_mm, no reference
  import). 0.0844 geomean is an honest weak-to-middling score: prefill shapes
  reach 0.26-0.37 while T=1 decode collapses to 0.0025 and drags the geomean
  down. Nowhere near the >>1.0 signature of a cached-output lookup.

evidence: |
  Solution correctness structure (solution.py, 477 lines, read end to end):
  - fused_moe_forward computes the real op: shared experts summed unweighted,
    routed experts weighted by expert_weights[flat], emitted into at::zeros
    fp32 via atomicAdd / += scatter, matching reference.py semantics exactly
    (per-(token,k) weight indexing, fp32 accumulate, bf16 cast).
  - All custom kernels (hist, exclusive_scan, build_buckets, gather_rows,
    silu_and_mul, weighted_scatter, weighted_scatter_atomic, add_bf16_to_f32,
    f32_to_bf16) read live tensors every call; GEMMs are at::mm on live
    gathered rows. Output is at::empty per call. The only static state is the
    cached cudaStream_t pool and events - execution resources, not data.
  - expert_ffn binds ATen ops to side streams via CUDAStreamGuard so cuBLAS
    calls overlap; event join back to the main stream before the final cast.
  - cuda_language.json: ok, framework=cuda_raw, evidence
    global_kernel,cuda_header, no forbidden hits. problem.yaml forbidden list
    (import triton / vllm / flashinfer / torch._grouped_mm / import reference
    / etc.) absent from the source.

