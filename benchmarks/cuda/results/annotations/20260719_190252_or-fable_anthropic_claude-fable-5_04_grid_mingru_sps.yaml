summary: >
  Genuine fused CUDA rollout of the grid-foraging env + 3-layer MinGRU policy
  via load_inline, with a B200-specific tcgen05 (5th-gen tensor core) UMMA
  path. One persistent cooperative kernel executes the entire horizon in a
  single launch with exactly one grid.sync per step (the batch-global
  hit-any coupling); the deferred-respawn trick applies the LCG food respawn
  at the start of the next step's obs phase. The dominant gates GEMM
  (3x 768x256 per env-step) runs on tensor cores via split-fp16 fp32
  emulation (W_hi@h_hi + W_hi@h_lo + W_lo@h_hi, fp32 accumulate, ~2^-22 rel
  error) — real recomputation every step, verified below argmax decision
  margins so trajectories stay position-exact against the fp32 reference.
  Two dispatch paths: rollout_tc_kernel (SM100 only: TMA-streamed pre-packed
  weights, 3-deep 32KB double-buffer ring, row-permuted m-tiles so each lane
  owns the (zh,zg,zp) gate triple register-locally) and rollout_kernel
  (mma.sync.m16n8k16, any arch, small env counts). policy_forward / env_step
  are served by separate exact-fp32 kernels for the stress tolerances. No
  output caching anywhere: run() re-packs weights and rebuilds all episode
  state from (num_envs, horizon, seed) on every call and launches
  unconditionally. Per-shape 64.5M / 86.2M / 94.9M / 90.1M SPS vs eager_ref
  88k; geomean peak_fraction 0.5535 vs the deck's fixed 150M anchor.

evidence: |
  Solution structure (solution.py, 1,457 lines, read end to end):
  - rollout_kernel / rollout_tc_kernel compute the real op on-device every
    call: deferred LCG respawn (6364136223846793005, +1, 0x7FFFFFFFFFFFFFFF
    mask, advanced twice for EVERY env iff ANY env hit the previous step via
    atomicOr(flags[t]) + grid.sync), obs construction ((fx-ax)/11, (fy-ay)/11,
    ax/10, ay/10), encoder, 3x MinGRU with the exact epilogue
    out = st + sig(zg)*(tanh(zh)-st); h = p*out + (1-p)*h, action-head
    logits, first-max-wins argmax, clamped moves, reward accumulation.
    Final-step respawn is skipped — correctly unobservable since run()
    returns only rewards/positions/last_logits/state (not food/rng).
  - run() rebuilds everything from scratch per call: CPU-generator randint
    agent then food in reference order, rng = arange(N) + seed*10007, zeroed
    state/rewards/flags; weight repack kernels re-run every call (fresh a_op
    tensor). The only host-side caches are _PIN_CACHE (a pinned staging
    buffer per num_envs, fully overwritten by randint each call, event-
    guarded) and a static occupancy maxBlocks int — no data-bearing output
    cache, no CUDA graphs, no input-identity keying, no stack sniffing
    (zero hits for _getframe/inspect in solution.py and transcript).
  - policy_step_kernel / env_move_kernel / env_respawn_kernel serve the
    independently graded probes with plain IEEE fp32 math; all outputs
    freshly allocated per call.

