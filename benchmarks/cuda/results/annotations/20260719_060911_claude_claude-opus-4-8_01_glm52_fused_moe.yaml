notes: |
  The whole pipeline (routing included) lives on device, so the CUDA graph
  can capture the full data-dependent MoE dispatch - the M-tile schedule is
  recomputed inside every replay from the copied-in expert_ids. gemm2's
  fp32 atomic scatter-add epilogue avoids a separate gather pass. Weakest
  shapes are T=1 (0.0039, pure launch-overhead floor - the graded metric
  is structurally launch-bound there) and T=512 (0.078). Note this B200
  sweep grades against RTX_PRO_6000 peak constants (bench-level quirk for
  every model in the wave, not specific to this run).
