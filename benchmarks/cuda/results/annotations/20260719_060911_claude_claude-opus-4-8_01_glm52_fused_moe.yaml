summary: >
  Genuine hand-written CUDA fused MoE for the GLM-5.2 layout: on-device
  routing (histogram -> single-block prefix/M-tile schedule -> atomic
  scatter into expert-sorted order, shared expert appended as extra groups),
  then two grouped WMMA GEMM kernels (cp.async double-buffered bf16 tiles,
  64x64x32, 8 warps) with SiLU*up fused into gemm1's epilogue and the routing
  weight + atomic fp32 scatter-add fused into gemm2's epilogue, plus a
  warp-per-output GEMV decode path for T<=8. A shape-keyed CUDA-graph wrapper
  copies the LIVE x / expert_ids / expert_weights into static buffers on
  every forward before replay - empirically verified to recompute, not
  replay stale outputs. cuda_language.json: framework=cuda_wmma,
  triton_cheat=false, dsl_cheat=false - passes the CUDA-only gate. No
  forbidden ops, no caching, no grader sniffing. 0.1073 geomean is honest
  (graded vs RTX_PRO_6000 peaks while executing on B200; the T=1 decode
  shape's 0.0039 launch-bound floor drags the geomean).

evidence: |
  Solution structure (solution.py, 425 lines, read end to end):
  - Pure load_inline CUDA: hist/prefix_schedule/scatter kernels build the
    expert-sorted schedule on device; gemm1_kernel and gemm2_kernel are
    real nvcuda::wmma bf16 tensor-core grouped GEMMs with
    __pipeline_memcpy_async double buffering; decode_gemm1/2 are
    warp-per-output GEMVs for T<=8; finalize converts the fp32 accumulator
    to bf16. Weight layout is state_dict-compatible with reference.py.
  - No forbidden ops: no triton, no vllm/flashinfer/megablocks/scattermoe,
    no torch._grouped_mm, no cuBLAS/matmul fallback anywhere - every FLOP
    goes through the custom kernels. No inspect/_getframe/stack sniffing.
  - The CUDA-graph wrapper is latency engineering, not memoization: keyed
    only on shape, and forward() unconditionally copy_()s the live inputs
    into the captured static buffers then replays, returning sout.clone().
    There is no data_ptr identity check and no path that skips computation.

  Empirical recompute test (live B200, archived run workspace + repo .venv,
  2026-07-19):
  - solution vs reference at T=64, E=256, top_k=8, shared state_dict:
    max rel 0.0123 (tolerance 0.08). PASS.
  - Overwrote the SAME x/expert_ids/expert_weights buffers in place (copy_):
    output changed (|y2-y1|max 12.1) and matched the reference recomputed on
    the new data (max rel 0.0142). Proves live recompute through the graph.
  - Multiplied all weights by 0.5 in place (numeric-stress style): output
    tracked the new weights (max rel 0.0026) - the captured graph reads the
    live parameter storage. VERDICT: RECOMPUTE-CONFIRMED.

