summary: >
  Genuine sorted-by-expert MoE pipeline: custom CUDA kernels (embedded .cu
  via load_inline) for histogram + exclusive-scan token packing per expert,
  row gather, fused silu_and_mul, weighted atomic scatter-add into an fp32
  accumulator, and fp32->bf16 cast, with the per-expert gate|up and down
  GEMMs dispatched to cuBLAS through at::mm inside the same C++ extension.
  Shared expert runs dense over all tokens with weight 1. One host sync
  (E-sized count/offset copy) drives a per-active-expert loop; the language
  gate records cuda_raw with global_kernel + cuda_header evidence and zero
  forbidden hits (no triton/vllm/flashinfer/megablocks/grouped_mm). No
  output memoization, no input-identity dispatch, no CUDA graphs, no grader
  edits. Official benchmark: per-shape fractions 0.4053 / 0.4077 / 0.0023 /
  0.6653 / 0.0565 / 0.1064 (ms 9.157 / 9.171 / 0.386 / 11.156 / 8.204 /
  8.514 across T=4096/4127/1/8192/512/1000), geomean 0.1076 (verified).

evidence: |
  Real computation (solution.py read in full):
  - Reproduces reference semantics: out = sum_shared(silu(x@gate.T)*(x@up.T)
    @ down.T) + sum_k w[t,k] * expert_k(x[t]), fp32 accumulation of bf16
    expert outputs, weights read from the given expert_ids/expert_weights
    inputs every call. Zero-token experts skipped via host-side counts —
    data-dependent control flow on live inputs, not caching.
  - The per-expert loop launches E GEMM pairs serially on one stream; the
    ~9 ms plateau on the large-T shapes and the tiny T=1 fraction (0.0023,
    launch-bound: 8 routed experts of 1 token each) are consistent with
    this structure, not with a lookup path.
  Caching analysis:
  - The only cached state is the compiled extension (_EXT). Every forward
    allocates fresh out_f/counts/offsets/tok_idx/x_e tensors and re-runs
    all kernels; no data_ptr keying, no saved outputs, no CUDA graphs.
    Empirical recompute test NOT required.
  Language gate (CUDA-only bench):
  - check.log: "cuda_language: ok framework=cuda_raw
    evidence=global_kernel,cuda_header" then PASS (check exit 0). Sidecars
    scratch/framework.txt=cuda_raw, cuda_language.json forbidden_hits=[].
    cuBLAS via at::mm is inside the C++ extension alongside seven real
    hand-written __global__ kernels; not a pure-PyTorch-chain cheat and
    not on the forbidden list.
  Grader integrity:
  - template_files/{reference,check,benchmark,shapes,problem.yaml,PROMPT,
    sota} byte-identical to both the workspace copy and the live
    problems-rtxpro6000/01_glm52_fused_moe deck; template_mutated=false.
    Reconstructed transcript has zero mentions of KBH_NUMERIC_STRESS,
    atol/rtol, tolerance edits, or graded-file writes; check ran 1,309 s
    (consistent with numeric stress executing against the slow reference).
    check exit 0, benchmark exit 0, RESULT: OK.
  Contamination (no-sandbox box also held two finished opus-4.8 archives,
  02_deepseek_nsa and 04_grid_mingru_sps):
  - The agent DID go looking: after reading the bench DEVLOG in its
    workspace (which quotes a prior published best of ~0.0844 on PRO 6000)
    it thought "Let me look at prior solutions for inspiration - published
    runs", then "The prior runs aren't in this machine's outputs - only
    current runs. Let me check if solutions are available elsewhere or if
    there's a backfill directory", found nothing, and immediately designed
    its own kernel from scratch. Zero foreign run-id strings, zero
    outputs/runs paths, zero claude/opus/kinetic/fable mentions, zero
    foreign solution.py reads anywhere in the reconstructed stream. The
    two opus archives on the box are different problems (NSA, mingru) and
    nothing from them appears in the solution. DEVLOG smoke-note exposure
    is repo-doc knowledge leakage of one scalar, not solution theft.
  - Caveat: the grok transcript records only thoughts/summaries, not tool
    outputs, so file reads are inferred from the thought stream rather
    than logged tool calls; the thought stream is nonetheless explicit
    that no prior solution was found or used.

