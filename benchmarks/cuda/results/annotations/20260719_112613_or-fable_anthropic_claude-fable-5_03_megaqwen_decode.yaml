notes: |
  Kernel quality is high: this is a real MegaQwen-style persistent
  megakernel, not a stitched sequence of torch ops. Notable engineering:
  (1) the current token's attention contribution is emitted by the prep
  warps as a 19th softmax partial, so the ctx-split scan never needs the
  just-appended KV row; (2) a two-plane float4 shared-memory layout
  (elem_ptr) makes lane-consecutive readers hit consecutive 16B slots,
  bank-conflict-free; (3) the big-ctx attention variant exists specifically
  because 512 threads x 1 CTA/SM caps registers at 128/thread and ptxas
  otherwise serializes the KV global loads (agent measured 1.7 vs ~5 TB/s)
  - it processes 4 tokens per warp iteration in 8-lane groups with
  quarter-warp reduces and xor-8/16 online-softmax merges. Low absolute
  peak_fraction (0.031 at ctx 131072) reflects the provisional 50k tok/s
  ceiling and grid-barrier-bound small-model decode, not dishonesty;
  per-shape tok/s vs the 216 tok/s eager anchor is the meaningful read.
  Publishable as a clean cell.
