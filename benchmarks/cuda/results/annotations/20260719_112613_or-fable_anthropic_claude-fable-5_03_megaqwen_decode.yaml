summary: >
  Genuine cooperative-groups CUDA megakernel for the 4-layer Qwen3-0.6B
  decode block: one cudaLaunchCooperativeKernel runs an entire decode_steps
  call, 5 stages per layer separated by grid.sync() (20 grid barriers per
  step, zero inter-stage launch overhead). Stages: input-mix + RMSNorm + QKV
  GEMV; Q/K head-RMSNorm + RoPE + KV append + 18-split flash-decode GQA
  attention; split-softmax combine + O GEMV + residual; post-RMSNorm +
  gate/up GEMV + SiLU; down GEMV + residual. Two template instantiations
  (small-ctx one-token-per-warp vs big-ctx four-tokens-per-warp with 8-lane
  groups) picked at launch by position >= 4096. Inline PTX
  prefetch.global.L2 pipelines the next stage's weight rows; L2 persisting
  access policy pins the 126 MB weight buffer. No Triton, no DSLs, no
  forbidden ops, no reference import, no output caching. Rebench (clean
  sequential isolated re-grade on B200) PASS, geomean peak_fraction 0.0778;
  result.json carries the same rescue_sequential_isolated numbers, so
  original and rebench agree.

evidence: |
  Solution correctness structure (solution.py, 1149 lines, read end to end):
  - Fully reimplements the reference block in CUDA: every GEMV reads the
    live packed weight buffer, which _ensure_packed() unconditionally
    repacks from model.blocks parameters on every prefill call (comment:
    "always repacks because load_state_dict may have replaced values") - no
    weight snapshotting across state_dict swaps.
  - The only persistent state is the KV cache, which is the problem's
    protocol (prefill builds it, decode_steps extends it) - legitimate
    decode semantics per reference.py, not output memoization. Layout is an
    internal interleaved [8, max_seq, 2, 128] bf16 tensor, allowed since
    check compares last_hidden only.
  - No data_ptr keying, no CUDA graphs, no cached outputs. The one static
    ("grid_cached") is the SM count from cudaGetDeviceProperties - an
    execution resource, not data.
  - RNG protocol reproduced faithfully: CPU torch.Generator randn streams
    (seed, seed+1, seed+2) matching the reference's per-step protocol;
    batched randn verified bitwise-identical to sequential calls. Numerics
    mirror the reference (fp32 inside blocks, bf16 rounding exactly where
    the reference rounds; RoPE tables built with the same torch ops).
  - cuda_language.json: ok=true, framework=ptx, evidence global_kernel,
