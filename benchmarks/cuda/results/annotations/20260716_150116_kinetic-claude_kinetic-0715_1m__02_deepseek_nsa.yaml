  - kbar_kernel reads every current K row and forms the exact mean for each
    complete or partial 64-token block. select_kernel reads current Q and K,
    scores full prior blocks through q dot mean(K), handles the current block
    with an exact causal prefix mean, and selects eight blocks descending by
    (importance, block id), matching reference.py's larger-id tie-break.
  - attn_kernel clips selected blocks before the window boundary to avoid
    duplicates, adds the exact [t-63,t] causal window, reads live K/V segments,
    performs fp32 score/softmax/weighted-V reduction, and writes a newly
    allocated bf16 output. D=64/128 and all six scored shapes use this path.
    The vectorized PyTorch fallback is restricted to unsupported shapes and
    computes the same operation; it contains no stored answer.
