summary: >
  Genuine block-centric CUDA NSA sparse attention via load_inline, tensor-core
  mma (mma.sync m16n8k16 bf16 + ldmatrix inline PTX). Five-stage pipeline:
  (1) kmean precompute collapses sub-diagonal block scoring from O(S^2 D) to
  O(S*nb*D) using the linearity of the mean (importance = scale * q . mean(k));
  (2) warp-per-query select kernel adds the diagonal partial causal mean, does
  register-resident top-8 with the reference's tie-to-larger-index rule, unions
  the 64-token sliding window, and builds per-(bh,block) subscriber counts;
  (3) device cumsum CSR + scatter; (4) block-centric split-softmax attention
  (flash-decoding style, one CTA per key block, K/V staged to XOR-swizzled
  shared memory once, warps serve 16 subscribers via tensor cores) — inverting
  the query loop so each K/V block is read from L2 once instead of by every
  subscriber; (5) per-query logsumexp combine of <=10 partials. Exact split
  softmax, fp32 accumulation, fp32 (non-TF32) bmm for selection ordering.
  Rebench 0.2934 geomean matches the in-run number (0.2934) — no contention
  inflation. Low fraction is by design (dense-equivalent FLOPs formula vs a
  correct sparse kernel); per-shape fractions reach 0.86.

