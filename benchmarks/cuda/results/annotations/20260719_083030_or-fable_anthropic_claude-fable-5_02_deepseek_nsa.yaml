    sys._getframe), fresh torch::empty outputs and full kernel launches every
    forward. at::bmm is used only for the fp32 selection-importance GEMM (not
    a forbidden op; the attention itself is custom CUDA).
  - Semantics faithfully mirror reference.nsa_attend including the subtle
    tie-break: Python's (imp, bi) reverse tuple sort prefers the LARGER block
    index on equal importance, and select_kernel implements exactly that
