summary: >
  Genuine hand-written CUDA multi-layer decode for the Qwen3-0.6B geometry:
  per-block RMSNorm, warp-per-row QKV GEMV, fused Q/K head-RMSNorm + RoPE +
  bf16 KV-cache store, split-KV online-softmax flash attention (W warps
  cooperating per split, shared-memory merge, parallel combine), K-split
  GEMV with fused residual for O/down proj, SwiGLU - a host loop launches
  ~11 kernels per layer per step, wrapped in a CUDA graph keyed on
  (start_pos, n_steps, split config) that copies the live hidden + randn
  into static buffers and replays over the persistent KV cache. Empirically
  verified to recompute on mutated KV/hidden, not replay stale outputs.
  cuda_language.json: framework=cuda_raw, no Triton/DSL, real __global__
  CUDA - passes the CUDA-only gate. Numerics mirror reference exactly
  (fp32 math, bf16 rounding at cache and block boundaries; same seeded
  CPU-generator randn contract). 0.0491 geomean (4831 tok/s at ctx 2048
  vs eager reference 206 tok/s) is an honest measurement.

evidence: |
  Solution structure (solution.py, 676 lines, read end to end):
  - All compute in raw CUDA via load_inline: rmsnorm_kernel, qkv_kernel /
    gateup_kernel (warp-per-row GEMVs with float4 bf16 loads), qknr_kernel
    (per-head RMSNorm + RoPE + KV store at pos), attn_partial_kernel
    (split-KV online softmax with warp-cooperative slices and a shared
    max/l/acc merge), attn_combine_kernel, gemv_resid_kernel<SK> (K-split
    with fused residual), silu_kernel. run_steps drives n_steps x 4 layers
    host-side with pos as a plain argument - no device counters, no
    hidden shortcuts.
  - No forbidden ops: no triton, flash_attn, scaled_dot_product_attention,
    vllm, thunderkittens, cutlass.cute, tilelang; reference.py never
    imported. No inspect/_getframe/stack sniffing.
  - Interface honest: prefill (untimed) runs eager and fills the persistent
    KV; decode_steps (timed) copies live hidden+randn into static buffers
    and replays the captured graph; randn derives from the required
    seed+1/seed+2 CPU-generator contract identical to reference.py.
    _setup_cuda_toolkit only wires CUDA_HOME to the venv cu13 nvcc
    (documented box quirk), touching nothing graded.

