notes: |
  ~23x over the eager reference at ctx 2048. The interesting design choice
  is warp-cooperative split-KV attention: W warps share one split so nsplit
  (and combine cost) stays small while occupancy stays high, with the
  split table tuned per ctx bucket up to 131072. The CUDA graph amortizes
  ~44 kernel launches per decode step - essential on this time-sliced
  shared B200 where eager launch gaps dominate sub-millisecond pipelines.
  peak_tok_s=50000 makes long-ctx shapes bandwidth-doomed by construction
  (ctx 131072 at 0.0177); the geomean is dominated by that structural
  falloff, not kernel quality. Graded vs RTX_PRO_6000-era peak constants
  while executing on B200 (bench-level quirk for every model in the wave).
