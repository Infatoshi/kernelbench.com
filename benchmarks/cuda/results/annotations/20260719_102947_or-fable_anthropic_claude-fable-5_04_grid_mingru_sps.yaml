summary: >
  Genuine fused CUDA rollout of the grid-foraging env + 3-layer MinGRU policy
  via load_inline with inline PTX cp.async. Two persistent-kernel families
  run the WHOLE horizon in one launch, synchronizing via a hand-rolled
  software grid barrier (sense-reversing, all blocks resident by occupancy
  construction): a multi-phase kernel (tiled 64-env GEMM with the MinGRU
  gate/highway epilogue fused in, cp.async double-buffered weight tiles) and
  a tile-owner kernel where each block owns 32-env tiles end-to-end so hidden
  state never round-trips global memory and only ONE grid barrier per step
  remains (the hit-any -> LCG respawn global coupling). Strict fp32 FFMA with
  k-sequential accumulation order so logits are bit-reproducible across
  variants and argmax-stable (positions must be EXACT). Separate simple API
  kernels serve check.py's policy_forward/env_step probes with the same math.
  The only cache is a weight-repack keyed on parameter _version + data_ptr —
  constant preparation, not output memoization — and the empirical probe
  proved live recompute. Rebench (clean sequential re-grade) geomean
  peak_fraction 0.1909 (~28.6M SPS vs the deck's fixed 150M anchor);
  per-shape 21.9M / 31.1M / 33.6M / 29.5M SPS.

evidence: |
  Solution structure (solution.py, 1,136 lines, read end to end):
  - rollout_kernel / rollout_tile_kernel compute the real op on-device every
    call: respawn + obs construction ((fx-ax)/11, (fy-ay)/11, ax/10, ay/10),
    encoder, 3x MinGRU layers with the exact epilogue
    out = st + sigmoid(zg)*(tanh(zh)-st); h = p*out + (1-p)*h, action-head
    logits, first-max-wins argmax, clamped moves, reward accumulation, and
    the reference's batch-global quirk: the LCG (6364136223846793005, +1,
    0x7FFFFFFFFFFFFFFF mask) advances twice for EVERY env only if ANY env
    hit that step, published via atomicOr(flags[t]) and consumed after the
    grid barrier. rng writeback is deferred to a phase with exclusive env
    ownership to avoid cross-block RMW races.
  - api_enc/api_gru/api_heads/env_move/env_respawn kernels implement the
    independently graded policy_forward and env_step with identical math;
    all output tensors freshly allocated per call.
  - run() builds fresh episode state from (num_envs, horizon, seed) on every
    call — CPU-generator randint agent then food (reference order),
    rng = arange(N) + seed*10007, zeroed rewards/state/flags/barrier — and
    launches unconditionally. No CUDA graphs, no saved outputs, no
    stack/frame inspection, no data-value dispatch.
  - The sole data-bearing cache is model._kb_packed (repacked/transposed
    weights), keyed on (p._version, p.data_ptr()) for all seven parameters,
    so in-place copy_/load_state_dict invalidates it. Weight prep reuse, not
    an output cache.
  - KB_TN env var only selects among numerically identical kernel variants
    (comment: "Accumulation order over k is strictly sequential ... so logits
    are reproducible across variants"); default is an occupancy-based
    auto-pick. No semantics change.

