notes: |
  Publishable as a clean cell. The interesting engineering: it rejected
  cooperative-launch grid.sync in favor of a hand-rolled sense-reversing
  software barrier with occupancy-capped grids, and treated numeric
  determinism as a first-class constraint — the k-sequential FMA order is
  held identical across all kernel variants so the greedy argmax (and thus
  exact positions over the whole horizon) never flips between the validated
  path and faster ones. The final tile-owner kernel keeps the entire per-step
  pipeline (encoder -> 3 GEMM layers -> logits -> env step) in one block's
  shared memory with a single grid barrier per step. 0.1909 of the 150M
  proxy anchor = ~28.6M geomean SPS, below the audited Grok 4.5 baseline
  (~50-61M SPS, pf 0.33-0.41) — an honest mid-tier result, nowhere near a
  cached-lookup signature.
