summary: >
  Genuine hand-written fused GLM-5.2 MoE, entirely inline CUDA/PTX via
  load_inline: vLLM-style token grouping reimplemented from scratch
  (hist -> scan -> scatter moe_align with BM-padded per-expert rows, shared
  expert appended as expert id E with weight 1.0), then grouped
  gate/up GEMM with fused silu*up epilogue and a down GEMM with weighted
  fp32-atomicAdd scatter. Three engine paths: an SM100 tcgen05 UMMA path
  (tensor-memory accumulator, cp.async.bulk/TMA staging with mbarrier
  expect_tx, weights pre-packed once into 8KB core-matrix blocks), an
  mma.sync.m16n8k16 + cp.async double-buffered path for SM80+/small batches,
  and a per-(token,expert) streaming GEMV decode path for T<=4. CUDA graphs
  keyed on input pointers+shape remove launch overhead on tiny batches;
  empirically verified to recompute on live data. No forbidden ops, no
  Triton/DSL, no reference import, no cross-run contamination. Rebench
  (sequential isolated re-grade) geomean 0.2787 matches the agent's own final
  0.2788 — no contention-era inflation.

evidence: |
  Solution correctness structure (solution.py, 1376 lines, read end to end):
  - moe_forward computes the real op: histogram/scan/scatter build
    expert-sorted (token, weight) rows; gemm1 computes
    silu(x@gate^T)*(x@up^T) in fp32 accumulators via mma.sync (or tcgen05
    UMMA on SM100); gemm2 applies routing weights with fp32 atomicAdd, the
    shared expert initializing the accumulator with plain stores; final
    fp32->bf16 convert kernel. Matches reference.py semantics (shared +
    top-8 routed, fp32 accumulation, bf16 output).
  - Every kernel reads live tensors each launch. Persistent state is limited
    to workspace buffers, packed-weight blocks keyed on
    weight data_ptr + _version (repack on weight mutation), and CUDA graphs
    keyed on input data_ptrs (replay only re-executes the same kernels
    against the buffers' live contents).
  - cuda_language.json: ok, framework=ptx, evidence
    global_kernel,cuda_header,ptx_inline, forbidden_hits=[], triton_cheat
    false, dsl_cheat false. No @triton.jit / triton.language / vllm /
    flashinfer / torch._grouped_mm / import reference anywhere in the source
    ("vLLM-style" appears only as a docstring description of the grouping
    scheme, not an import).

