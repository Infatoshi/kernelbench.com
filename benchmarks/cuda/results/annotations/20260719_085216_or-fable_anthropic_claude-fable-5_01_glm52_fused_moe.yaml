notes: |
  Strong kernel. The tcgen05 (5th-gen tensor core UMMA) path is the headline:
  single-thread mainloop issuing full 128x256 UMMA tiles from tensor memory,
  operands staged by cp.async.bulk with a 4-deep mbarrier ring, and weights
  repacked once at init into the exact core-matrix block order the no-swizzle
  smem descriptor walks — gemm1's epilogue even writes h pre-packed for
  gemm2. Prefill shapes hit 0.86-1.03 of the configured roofline (shape 3 at
  frac 1.0285 suggests the peak table is keyed to RTX_PRO_6000 while the run
  executed on B200 — a bench-config artifact common to all B200 cuda cells,
  not a solution anomaly). The geomean is dragged down by T=1 decode
  (0.0081, launch-overhead bound like every model's) and mid-size batches.
  The pointer-keyed CUDA-graph cache is the same pattern lint flags as
  memoization on other cells; empirical mutation test proves it is
  launch-overhead removal only. Publishable as a clean, high-quality cell.
