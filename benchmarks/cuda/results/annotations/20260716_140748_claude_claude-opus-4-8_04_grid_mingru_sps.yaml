summary: >
  Genuine persistent raw-CUDA grid-foraging plus 3-layer MinGRU rollout. One
  co-resident block owns a slice of environments and executes the whole
  horizon inside mega_kernel: live observation construction, a mathematically
  folded layer-0 encoder/GRU projection, two full fp32 MinGRU GEMV layers,
  logits, greedy action, environment movement, reward, batch-global hit
  agreement, and exact LCG food respawn. The standalone policy_forward and
  env_step entry points use the same CUDA math and satisfy the grader's
  component checks. There is no output memoization, grader sniffing, frozen
  file mutation, forbidden framework, or language-gate bypass. The only
  cross-run transcript accesses were GPU-lock timing/status logs used while
  queued on the shared device; no foreign solution, grader, benchmark,
  result, or transcript content was opened. Official SPS measurements are
  6.89M, 15.83M, 11.39M, and 15.06M steps/s; their 11.695M geomean divided by
  the deck's fixed 150M steps/s anchor reproduces the stored 0.0780 score.

evidence: |
  End-to-end CUDA semantics (solution.py, 815 lines, read in full):
  - run() creates fresh episode tensors on every call, draws agent and food
    positions from a CPU generator seeded by the live seed argument in the
    same order as reference.py, initializes rng[e] = e + seed*10007, and
    zeros rewards, recurrent state, logits, hit flags, and barrier state.
  - mega_kernel constructs every live observation from current agent/food
    positions with the reference's dx/11, dy/11, x/10, y/10 formulas. It
    executes all horizon iterations in-device rather than substituting a
    precomputed trajectory.
  - Layer 0 is a legitimate algebraic fold:
    w_gru[0] @ (w_enc @ obs + b_enc) becomes
    (w_gru[0] @ w_enc) @ obs + w_gru[0] @ b_enc. _prep_uncached computes the
    folded constants from the live model parameters, using fp64 only while
    forming the constants and converting back to fp32. The kernel still
    computes the live encoder highway value w_enc @ obs + b_enc.
  - For all three layers the CUDA epilogue implements exactly
    out = st + sigmoid(zg) * (tanh(zh) - st), then
    h = sigmoid(zp) * out + (1 - sigmoid(zp)) * h. Layers 1 and 2 stream the
    complete 256x(3x256) live weight matrices with fp32 FMA. Final logits read
    all 256 hidden values and all action-head weights, then first-max argmax
    matches torch's tie behavior.
  - Environment movement implements actions 0/1/2/3 as up/down/left/right,
    clamps coordinates to [0,10], tests exact food equality, and increments
    reward on hit. grid_sync_any implements the reference's unusual
    batch-global condition: if any environment hits, every environment takes
    two LCG steps using 6364136223846793005, +1, and the positive-int64 mask,
    while only hitters replace food. _cfg_plan caps the persistent grid to
    one block per SM after checking kernel occupancy, making the global
    spin-barrier grid co-resident.
  - policy_kernel shares policy_chunk with the persistent rollout and also
    computes the value head. env_k1/env_k2 implement the independently graded
    env_step. All output tensors are newly allocated or zeroed per call.

  Cache and live-recompute analysis (code structure only, no GPU replay):
  - _MOD caches only the compiled extension. _SM_COUNT and _MAXB cache device
    properties/occupancy. Neither cache contains inputs or outputs.
  - The sole data-bearing cache is model._kb_prep, containing transformed
    weights. Its key includes (data_ptr, Tensor._version) for every parameter,
    so rebinding and in-place load_state_dict/reset/copy_ mutations invalidate
    it. Model.reset_parameters uses p.copy_ under no_grad specifically so the
    version counter advances. This is safe constant-preparation reuse, not an
    output cache.
  - policy_forward copies the current obs and state into fresh padded tensors
    on every call and launches policy_kernel unconditionally. run() allocates
    and initializes fresh state from num_envs/horizon/seed on every call and
    launches mega_kernel unconditionally. There is no data-value or data_ptr
    dispatch over input tensors, no saved result tensor, no CUDA graph, and no
    stack/frame inspection. Therefore same-storage input mutation necessarily
    flows through the next kernel execution.
  - KB_CFG and KB_L2_BW only select among semantically identical launch
    geometries via a performance cost model; KB_VERBOSE only changes compiler
    verbosity. TORCH_CUDA_ARCH_LIST=12.0 is a compile target. None changes the
    operation, correctness predicate, tolerance, or score calculation.

