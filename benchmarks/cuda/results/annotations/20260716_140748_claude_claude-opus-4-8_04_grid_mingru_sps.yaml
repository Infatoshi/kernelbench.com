notes: |
  Publishable as a clean cell. The main optimization is genuine fusion and
  amortization: the whole horizon stays inside one persistent CUDA launch,
  layer-0's large gate projection is algebraically folded to a 4-input
  projection, and environment chunks reuse the policy weights. The fixed
  150M SPS ceiling is a deck-defined proxy anchor, so 0.0780 means about
  11.7M geomean steps/s, not 7.8 percent of a FLOP roofline.
