evidence: |
  Real-operation and recomputation structure:
  - solution.py embeds all CUDA C++ in _CUDA_SRC and builds via load_inline
    with -gencode=arch=compute_120,code=sm_120. Kernels k_qkv, k_attn /
    k_attn_hi, k_append_comb, k_o_res, k_mlp, k_down each compute the live
    op: RMSNorm from live activations, warp-per-row GEMVs over all 1024
    inputs, position-dependent RoPE from fp32 tables built with the same
    torch ops as reference, online-softmax attention partitioning all
    positions 0..pos via chunk slots, numerically stable cross-slot LSE
    combine, SwiGLU, residuals, and a bf16 residual stream mirroring
    reference numerics. The K cache is stored int8 with per-row absmax/127
    scales and the V cache bf16; that is a precision tradeoff scored under
    the deck's published bf16 tolerance 0.08, not a shortcut.
  - No input-identity memoization, tensor fingerprinting, stack/check.py
    sniffing, backend mutation, monkeypatching, or torch-op wrappers doing
    the heavy math. The single data_ptr() comparison in decode_steps only
    skips a redundant copy when the caller passes the engine's own hidden
    buffer back in; it never maps inputs to stored outputs.
