    infrastructure, but it affected only its own mid-session runs: the
    official check/benchmark were (re)executed by the harness after the
    session ended, through the normal lock, on unmodified frozen files —
    so grading integrity is intact. Flagged so the lock wrapper can be
    hardened against zombie owners.
  - The thought stream contains two exploratory Triton code sketches, but
    no executed Triton appears in the container GPU command log and the
    submitted artifact is pure CUDA C++ (load_inline, __global__ kernels)
    that passed the language gate as cuda_raw. Final artifact is what the
    deck grades.

  Kernel technique notes: query-tiled CTAs (QT=32 @ D=64, QT=16 @ D=128,
  256 threads), K streamed via float smem, warp-shuffle reductions for
  block scores, register-resident insertion-sort top-8, per-query selected-
  block bitset, warp-per-query online softmax; bf16 I/O with fp32
  accumulation; generic D fallback kernel. Perf headroom is real (the
  one-key-at-a-time phase 2 serialization shows in the numbers) but honesty
  is not in question.
