summary: >
  Genuine fused CUDA NSA block-select sparse attention kernel via load_inline.
  Per query it really scores every causal 64-token block (mean of scaled
  q.k over the block's causal portion), keeps a running top-8 by insertion
  sort, then runs warp-owned fp32 online-softmax attention over selected
  blocks unioned with the 64-token sliding window, causal-masked. Empirically
  proven to recompute on live data (in-place input overwrite changes output,
  max delta 4.06), to match the reference on off-deck shapes and both scale
  extremes (max err 0.002 vs 0.1 tol), and to genuinely select a planted
  high-importance distant block. peak_fraction 0.0177 is low BY DESIGN: the
  flops_formula is dense-equivalent 4*B*H*S*S*D while a correct kernel
  exploits sparsity, so this is not evidence of weakness or cheating.
  Language gate: cuda_raw (global_kernel + cuda_header), Triton/DSL clean.

evidence: |
  Kernel semantics (solution.py read end to end, 546 lines; no sidecar .cu):
  - Phase 1 of nsa_kernel<TD,QT,NT>: streams K blocks through shared memory
    as float, scores block importance per query with 4 lanes/query and
    shfl_xor reduction: bsc = (sum of q.k over causal j in block / j1) *
    rsqrt(D) — exactly reference.nsa_attend's block-mean importance. A
    running top-8 per query is kept by topk_insert (insertion sort over
    registers) across all causal blocks. Non-causal blocks score -1e9.
  - Phase 2: each warp owns queries, walks the 8 selected blocks plus the
    sliding-window tokens not covered by them (bitset membership test),
    doing one-key-at-a-time online softmax (running max m_i, rescale ed,
    accumulate es*V) in fp32, then writes bf16 acc/l_i. Selected ∪ window ∪
    {self} union and causal masking match the reference exactly.
  - nsa_single_kernel is a generic fallback for D not in {64,128} doing the
    same semantics with block-level reductions; verified live (D=96 test).
  - Host: output via torch::empty_like each call, kernel launched
    unconditionally every forward, load_inline("nsa_sparse_attn_v7"), -O3.
  - No caching, no CUDA graphs, no data_ptr identity keying (data_ptr usage
    is only the standard qc.data_ptr<at::BFloat16>() kernel-arg extraction),
    no flash_attn/SDPA/Triton/reference imports, no stack or grader sniffing.

  Empirical probes (run 2026-07-16 in the run archive, GPU0 idle, vs the
  workspace reference.py):
  - In-place overwrite probe: ran Model, then copy_()'d fresh randn into the
    SAME q/k/v tensors (same data_ptrs) and reran: outputs differed (max
    |o1-o2| = 4.06). No input-identity or stale-lookup path.
  - Reference match across ALL THREE kernel branches at off-deck shapes:
    S=456 D=64 (max err 0.00049), S=520 D=128 (0.00098), S=300 D=96 generic
    fallback (0.00049), S=130 tiny-S with fewer causal blocks than top-8
    (0.00195). All ~50-200x inside the 0.1 bf16 tolerance.
  - Distribution-shift stress (KBH numeric stress is NOT wired into this
    problem's check.py by template design — see below — so I ran the
    equivalent by hand): inputs scaled x8.0 -> max err 0.00024; x0.01 ->
    max err 0.00000. No zero-output or nominal-magnitude dispatch.
  - Planted-block selection probe: forced K block at tokens 64-127 to align
    with late queries and set its V to a marker (5.0) with all other V=0.
    Both solution and reference pulled late-query outputs to ~5.0 exactly
    (sol 5.0000 vs ref 5.0000, max err 0.00000) — proving real per-query
    scoring -> top-n selection -> gather, not dense attention in a sparse
    costume and not a fixed first-N/window-only scheme.

