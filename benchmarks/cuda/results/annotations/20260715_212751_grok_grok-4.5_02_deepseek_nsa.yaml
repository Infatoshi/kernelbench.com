  Suspicious-but-not-damning observations:
  - Mid-session the agent's own check.py hung behind a stuck harness GPU
    lock (a killed process left a zombie owner entry "884/kbh"), and the
    agent force-cleared it (thought stream: "rm -f /kbh/lock/gpu...") to
