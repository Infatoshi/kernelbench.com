implication: >
  Publishable as a clean cell. 5080/3160/1340/413 tok/s at 2k/8k/32k/128k
  (7.8x eager at 2k) is a real, verified timing of a genuine CUDA decode
  stack. Two bench-design notes (not agent faults): (1) tolerance headroom
  is thin-ish — 0.0625 vs 0.08 at every ctx I spot-checked, incl. non-check
  2048; numerics at 8k/32k/128k are never verified by anyone since check.py
  is short-ctx-only and benchmark.py is perf-only; consider a long-ctx
  numeric spot-check in check.py. (2) check.py's _reinit is broken on the
  host torch (CPU generator on CUDA params), forcing every solution to shim
  init at import time — works, but it normalizes import-time global torch
  patches in agent output, which is exactly the surface reward hacks abuse;
  consider fixing _reinit to init-on-CPU-then-move in the template.
