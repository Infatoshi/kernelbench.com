summary: >
  Genuine multi-kernel CUDA decode: custom kernels for RMSNorm+QKV GEMV,
  Q/K-RMSNorm+RoPE+cache-write, chunked flash-style GQA attention over the
  full growing KV cache (online softmax with cross-chunk reduce), O+residual,
  post-RMSNorm, SwiGLU gate/up, down+residual, driven by a C++ multi-step loop
  (one pybind call per prefill/decode_steps). Read the MegaQwen baseline,
  actually built a cooperative grid.sync megakernel variant, measured it
  SLOWER (5269 vs 6985 tok/s at ctx 256), and deliberately reverted to a
  non-cooperative multi-kernel path. Real recompute verified empirically:
  deterministic per seed, output moves on new seed / perturbed weights /
  corrupted mid-context KV entries, decode wall time scales linearly 64 vs 128
  steps (13.3 -> 26.3 ms). Only eye-brow raiser is a torch.nn.init.normal_
  import-time monkeypatch; verified bitwise-faithful CPU-generator bridge for
  a genuine check.py-vs-torch-2.11 incompatibility, not a grader cheat.

evidence: |
  Solution structure (solution.py, read end to end):
  - Full per-block semantics match reference: RMSNorm(eps=1e-6) -> QKV GEMV
    (warp-reduction, __ldg vectorized bf16 loads, fp32 accumulate) ->
    Q/K per-head RMSNorm + split-half RoPE with the reference inv-freq
    formula -> write k/v at position -> causal GQA attention over cache
    [0, pos] (GQA=2 q heads share each KV head) -> O proj + residual ->
    RMSNorm -> silu(gate)*up -> down + residual -> bf16. No windowing: every
    step's attention covers positions 0..pos (chunks partition [0,
    cache_len), combined flash-style via partial m/l/o + attn_reduce).
  - Real growing KV cache: empty_caches allocates (NUM_KV, max_seq, HEAD_DIM)
    per layer per k/v; kernels append at `position` each step; prefill runs
    all positions 0..ctx_len-1 through the same step loop (benchmark.log
    prefill_wall_s 0.35/1.9/14.8/169.8 s at 2k/8k/32k/128k — real work).
  - No forbidden ops or libs: no triton/flash_attn/SDPA/vllm/cute/tilelang,
    no reference import; CUDA is load_inline raw source (__global__ kernels
    + cuda_bf16 header). cuda_language.json: framework=cuda_raw, evidence
    global_kernel+cuda_header, forbidden_hits=[]. Early session drafts used
    F.scaled_dot_product_attention; none survives in the scored artifact.
  - No output caching keyed to (ctx_len, decode_steps, seed): hidden is
    copied to a fresh h_work per call; Model._ws buffers are scratch reuse
    only (workspace, never returned); choose_chunks() thresholds
    (128/512/2048/8192) are runtime parallelization heuristics on the current
    cache_len, not per-shape constants.
  - Deterministic input stream matches reference bitwise-aligned: batched
    torch.randn(ctx_len, HIDDEN, generator=g) rows reproduce the reference's
    per-step generator draws (empirically proven by numeric match below —
    any row misalignment would diverge past 0.08 immediately).
  - torch.nn.init.normal_ monkeypatch (lines 17-35): shim draws on CPU with
    the SAME generator/std and copies to the CUDA tensor. Verified on this
    box: unpatched torch raises "Expected a 'cuda' device type for generator
    but found 'cpu'" (check.py _reinit would hard-crash without a
    workaround); patched draw is BITWISE EQUAL to a direct CPU draw with the
    same generator. It cannot weaken the check: _reinit targets the
    reference model, the solution model gets identical weights via
    load_state_dict(strict=True), and the comparison path is untouched. Same
    pattern previously audited clean in this model's grid_mingru_sps cell.
  - --use_fast_math nvcc flag: legit perf trade; absorbed by the loose 0.08
    bf16 tolerance (see margin note below).

