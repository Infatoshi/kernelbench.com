summary: >
  Genuine raw-CUDA (load_inline) decode implementation for the 4-layer
  Qwen3-0.6B block: six __global__ kernels per layer (RMSNorm+QKV GEMV with
  fused input-mix on layer 0; attention with in-block Q/K RMSNorm + RoPE +
  fresh-KV write + split-K online-softmax flash decode; split combine; O-proj
  GEMV + residual; RMSNorm + gate/up GEMV + SwiGLU; down GEMV + residual),
  driven by a device-side position counter so a CUDA graph of 64 unrolled
  steps is captured once and replayed for both prefill and decode with
  near-zero launch overhead. KV loads use __ldcs evict-first hints to keep
  the ~123MB packed weight buffer resident in the 128MB L2. All math fp32
  internally with bf16 rounding exactly where the reference rounds, RNG
  protocol (seed / seed+1 / seed+2 CPU generator streams) reproduced
  faithfully. No Triton, no DSLs, no forbidden ops, no output caching.

evidence: |
  Solution structure (solution.py, 803 lines, read end to end):
  - Real CUDA evidence: load_inline with 6 __global__ kernels;
    cuda_language.json ok=true framework=cuda_raw evidence=global_kernel,
    triton_cheat=false, dsl_cheat=false, zero forbidden hits.
  - prefill() calls _pack() unconditionally, repacking all block parameters
    into the persistent device weight buffer on every call, so
    load_state_dict swaps between check iterations are always picked up.
  - The CUDA graph replays kernels that read live device buffers (packed W,
    X input stream, pos counter, KV caches); inputs are copied into those
    fixed-address buffers before each replay. The only data_ptr comparison
    is decode_steps detecting foreign caller caches and COPYING their
    contents in - state adoption, not identity memoization.
  - Persistent state is the KV cache (the problem's protocol) plus
    execution workspace. No cached outputs, no check.py sniffing, no
    tolerance games, no torch backend mutation.

