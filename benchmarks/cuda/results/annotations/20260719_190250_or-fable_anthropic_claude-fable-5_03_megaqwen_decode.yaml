notes: |
  Compared with the same model's B200 run (20260719_112613, one
  cooperative-groups megakernel with grid.sync), this SM120 run takes the
  other classic route: a fixed 6-kernel-per-layer sequence made cheap by
  capturing 64 unrolled decode steps into one CUDA graph keyed off a
  device-side position counter (no host round-trips inside the graph;
  n_steps decomposed as replays of the 64-step and 1-step graphs). The
  fresh token's K/V is normed/roped and folded into the owner split's
  partial inside the attention kernel, so the split scan never re-reads the
  just-written row. Low absolute peak_fraction at long ctx (0.0127 at
  131072) reflects the provisional tok/s ceiling on small-model decode, not
  dishonesty; tok/s vs the eager anchor is the meaningful read. Publishable
  as a clean cell.
