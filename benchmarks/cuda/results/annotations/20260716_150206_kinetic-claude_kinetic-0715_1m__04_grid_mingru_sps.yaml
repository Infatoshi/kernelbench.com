  Genuine persistent raw-CUDA grid-foraging plus three-layer MinGRU rollout.
  The default scored path executes the entire horizon in rollout_v2: it builds
  live observations, applies the encoder and all live MinGRU/action weights,
  chooses greedy actions, updates positions/rewards, implements batch-global
  hit agreement, and advances the exact LCG respawn state. Component
