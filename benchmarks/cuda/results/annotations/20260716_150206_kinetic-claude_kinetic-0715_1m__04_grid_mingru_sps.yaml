  Fusion is optional for this problem and the submitted fully fused persistent
  implementation is valid. Official throughput is 25.004M, 33.506M, 34.499M,
  and 25.515M steps/s, reproducing the stored 0.1954 SPS score.

evidence: |
  End-to-end operation and live data flow:
  - solution.py MD5 is ba48f46f5d03dc2607b914e78d33eeb5. Its implementation
    is embedded in CUDA_SRC/CPP_SRC and compiled with load_inline; it imports
    no local Python, CUDA, C++, or header implementation sidecar.
  - _pick_variant returns -2 unless an explicit development override is set,
    so both official check.py and benchmark.py call rollout_cuda/rollout_v2.
    run() freshly initializes agent/food positions from the live seed in the
    same CPU-generator order as reference.py, initializes RNG as
    env_id+seed*10007, and allocates fresh state, rewards, logits, hit state,
    and output positions for every call.
  - rollout_v2 constructs each observation from current agent/food positions,
    computes the full 4x256 encoder, streams all live packed weights for each
    of three 256-wide MinGRU layers, applies the exact gate/state/highway
    equations in fp32, reads the full action head, and uses first-max greedy
    action selection. It then applies the reference movement/clamp/reward
    rules, grid-wide any-hit agreement, and two exact LCG steps for every env
    whenever any env hits. The whole requested horizon executes in the
    cooperative kernel; no trajectory or reward is precomputed.
  - policy_forward_kernel reads the live obs/state and all seven live model
    tensors and returns fresh logits/state/value. env_step clones its inputs,
    launches real movement and respawn kernels, and exactly implements the
    batch-global RNG rule checked by the grader.

  Cache, graph, pointer, and retained-debug-path analysis:
  - _ext caches executable code only. _PACK caches a permutation of w_gru for
    the active parameter object and version; model replacement/load_state_dict
    invalidates it, and official per-seed models therefore use their current
    weights. _PIN caches only synchronized pinned staging allocations, which
    are overwritten with new seeded positions before each H2D copy. _SCR is a
    reusable uninitialized workspace for non-default tuning variants, not an
    output cache. Fresh scored state/output tensors are allocated every run.
  - data_ptr is used only at raw CUDA call boundaries; no pointer is compared,
    fingerprinted, or mapped to an answer. There is no CUDA graph, saved result,
    fixed seed/shape output table, stack inspection, or grader-side branch.
  - The final source retains KBH_ROLLOUT_VARIANT=15 as an explicitly labeled
    wrong-math performance probe using DUMMY_W. It is an opt-in development
    branch, not selected by shape/data and not set by the official checker or
    benchmark. The scored default is unconditionally -2 and uses all live
    weights. The dormant probe should ideally be removed for source hygiene,
    but it cannot explain or inflate this cell's official score.

