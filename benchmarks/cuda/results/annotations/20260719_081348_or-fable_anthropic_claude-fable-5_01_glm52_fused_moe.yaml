notes: |
  Kernel quality: the most from-scratch entry on this cell so far - no
  cuBLAS at all; both grouped GEMMs are hand-written inline-PTX
  mma.m16n8k16 pipelines (cp.async 3-6 stage buffering, ldmatrix, padded
  smem, no tail barriers), with a fused silu*up epilogue in GEMM1 via an
  smem gate-warp/up-warp handoff, weight-scaled scatter epilogue in GEMM2,
  templated BM=64/128 variants, and a grouped-m super-tile swizzle (G=96)
  chosen so same-expert m-blocks stream identical weight tiles concurrently
  for L2 reuse. Weights are pre-packed k-tiled so every pipeline stage load
  is one contiguous 8KB run. A dedicated slot-parallel GEMV path handles
  T<=8 decode where tiled GEMMs cannot fill the machine. Also notable: a
  toolchain bootstrap that pip-installs CUDA 13.0 nvcc wheels inside the
  venv (system only had 12.8), including a libcudart.so symlink fix.
  Lands just below grok-4.5 (0.0844) despite the far more ambitious
  from-scratch approach; the T=1 decode shape (0.0022) and the T=8192
  shapes drag the geomean. Publishable as a clean, honest mid-tier cell.
