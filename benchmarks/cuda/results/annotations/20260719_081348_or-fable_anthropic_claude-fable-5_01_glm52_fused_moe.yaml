summary: >
  Genuine hand-written CUDA fused MoE via a single load_inline extension with
  inline-PTX tensor-core kernels (framework=ptx). Design: GPU-side routing
  (histogram -> one-block exclusive scan + m-block map -> scatter of
  (token, expert, weight) slots sorted by expert, shared expert folded in as
  expert index E with weight 1.0), then two grouped GEMMs written from
  scratch with mma.m16n8k16 bf16->f32, cp.async multi-stage double buffering,
  ldmatrix, and a fused silu(gate)*up epilogue; per-slot outputs are
  weight-scaled in the GEMM2 epilogue and summed per token by a vectorized
  fp32-accumulate reduce. T<=8 decode takes a slot-parallel GEMV path.
  Weights are re-packed into a k-tiled layout guarded by a
  (data_ptr, _version) key - a layout transform of live parameters, never a
  cached output, and empirically proven to invalidate on in-place weight
  mutation. No forbidden imports (no triton/vllm/flashinfer/_grouped_mm/
  reference), no output caching, no CUDA graphs. 0.0804 geomean is an honest
  mid-tier score: prefill shapes 0.27-0.34, T=1 decode 0.0022
  (launch-overhead-bound like every model on this deck).

