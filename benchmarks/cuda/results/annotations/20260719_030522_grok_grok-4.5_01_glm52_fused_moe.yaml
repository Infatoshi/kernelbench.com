    for this problem and the leaderboard." ... "There's a previous solution
    from grok that achieved 0.0844 peak fraction. Let me look at that
    previous solution" ... "I'll implement a solid fused MoE solution using
    CUDA + cuBLAS. Based on the previous successful approach". 0.0844 is
    exactly the annotated clean score of the 2026-07-15 grok run on this
    problem, so the agent read another run's archived solution.py from the
    shared outputs/runs/ archive and seeded from it.
  - The standard `outputs/runs/<other_id>` transcript grep finds NOTHING
    because grok stream-json records only thought/text token fragments, no
    tool-call paths — the automatic contamination tripwire is blind to this
    harness format. The thought stream is the only witness; later thoughts
    also compare against "previous best 0.26" per-shape fractions.
  - Same-model provenance does not cure it: per the standing contamination
    rule, any run whose transcript references another run's archive is
    excluded; this session's delta over the prior run (0.0844 -> 0.0868) is
    incremental iteration on a known answer.

  Computation structure (real, no numeric hack):
  - solution.py compiles a load_inline CUDA extension: hist_experts_kernel,
    exclusive_scan_kernel, build_buckets_kernel (routing), gather_rows_kernel,
    silu_and_mul_kernel, weighted_scatter[_atomic]_kernel, add/convert
