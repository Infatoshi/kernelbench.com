summary: >
  Genuine CUDA kernel, but the cell is CROSS-RUN CONTAMINATED: the agent's
  thought stream explicitly records checking "previous solutions for this
  problem and the leaderboard", finding "a previous solution from grok that
  achieved 0.0844 peak fraction" (the archived, clean
  20260715_212751_grok_grok-4.5_01_glm52_fused_moe run), reading it, and
  building "Based on the previous successful approach". The 0.0868 score is
  an iteration on a prior run's archived answer, not an independent session.
  The kernel itself is honest work — a load_inline CUDA extension with custom
  __global__ kernels for routing (histogram + single-block exclusive scan +
  atomic bucket build), row gather, fused silu-and-mul, and weighted
  scatter-add into an fp32 accumulator, with per-expert bf16 GEMMs via
  torch::mm (cuBLAS) fanned across a 16-stream pool (count-descending expert
  order, atomic scatter on the multi-stream path, shared expert overlapped
  with routing). No caching, memoization, CUDA graphs, identity checks, or
  grader tampering; cuda_language.json passes (framework=cuda_raw). Excluded
  from publish on contamination grounds alone.

