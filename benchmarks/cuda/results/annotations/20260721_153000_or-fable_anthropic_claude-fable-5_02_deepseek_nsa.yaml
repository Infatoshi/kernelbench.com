summary: >
  Genuine, well-engineered NSA kernel. The outlier 0.7192 (vs kinetic
  0.4246 board ceiling and fable's own truncated-session 0.2934) is a real
  algorithmic win, not a hack: the agent inverted the sparse attention from
  query-centric gather to BLOCK-CENTRIC processing (CTA per KV block stages
  K/V in smem once, serves all subscriber queries via histogram/scan/
  scatter user lists), replaced the O(S^2) importance pass with a tiny
  Q @ Ksum^T GEMM (mean over block = dot with block K-sum), and moved the
  block pass onto tensor cores (mma.m16n8k16, 16 users/warp, XOR-swizzled
  smem, one-shot softmax per block, online-softmax merge kernel). Per-shape
  fractions >1.0 on long-context shapes (1.64 at S=8192) are the expected
  dense-equivalent-FLOPs artifact for a fast correct sparse kernel: the
  deck charges 4*B*H*S^2*D dense FLOPs while NSA touches <=576 keys/query
  (~14x less work at S=8192); implied REAL throughput is only ~29 TFLOPS
  of sparse work -- physically modest for this card. The 0.2934 -> 0.7192
  jump is the same design family finished: the 07-19 session (api_error at
  96 min) had already landed the block-centric inversion but with a SIMT
  warp-per-subscriber block pass; this 2.3 h session added the tensor-core
  block pass, one-global-atomic-per-CTA selection, stripe splitting for
  occupancy, and a CUDA-graph capture of the whole pipeline, iterating
  through 20+ ncu profile rounds (0.1222 -> 0.3858 -> 0.7296 -> 0.7349
  in-session; 0.7192 at grading).

evidence: |
  Solution audit (read end to end):
  - Computes the real op: per-query block importances (full blocks via
    Q @ Ksum^T with the mean==dot-with-sum identity; partial current block
    via within-block K cumsum), top-8 selection with the reference tie
    semantics (ties -> higher block id, matching the Python tuple sort),
    sliding-window union via slot-8/9 window remainders, true softmax
    attention over selected keys with exact split-softmax merge.
  - No importance/selection caching, no precomputed selection reuse, no
    output caching, no fixed/static block lists. The only data_ptr keying
    is CUDA-graph capture (same class as the audited-clean glm-5.2 fp8
    cell): fresh pointers/shapes always run eager; capture happens only
    after >=3 calls on identical buffers, and graph REPLAY re-executes
    every kernel against live buffer contents.
  - CUDA-only gate: cuda_language.json ok, framework=ptx, evidence
    global_kernel+cuda_header+ptx_inline, no forbidden hits; load_inline
    CUDA C++ with inline mma/ldmatrix PTX. Torch fallback exists only for
    non-CUDA/odd-D inputs (never the graded path).
  Grader integrity:
  - check.py / reference.py / benchmark.py / shapes.py / problem.yaml /
    PROMPT.txt / sota.py in the run workspace are byte-identical to the
    deck; template_mutated=false; check exit 0 (numeric stress cases run
    inside the unmodified check.py); KBH_NUMERIC_STRESS untouched.
  - Transcript: 127 tool events, zero references to outputs/runs, zero
    foreign run ids, no reads of prior solutions, no tolerance/check
    edits. Dense ncu-driven optimize loop (SpeedOfLight/SchedulerStats/
    per-kernel metrics across multiple shapes) -- the work is visible.
  EMPIRICAL recompute test (GPU 0, 2026-07-21, uv run, small shapes due to
  vLLM co-tenant holding ~89 GB):
  - eager fresh call: max_abs_err 0.0078 vs reference.nsa_attend (tol 0.1)
  - forced CUDA-graph capture (6 calls, same buffers), then overwrote the
    SAME q/k/v buffers in place with new random data (and a second round
    with 3x/0.25x scale skew): output CHANGED and matched a fresh
    reference recompute both times (max_abs_err 0.0078). Replay
    recomputes; there is no stale-lookup path.
  Magnitude sanity:
  - Graded shape 0 (1x16x2048x64) harness ms 0.084; audit re-timing under
    active vLLM contention 0.135 ms -- same ballpark, and ~30-40x slower
    than a 4 MB output memcpy (~3 us), i.e. real compute, not a cached
    return. Long-shape ms (0.167 @ S=8192) implies ~29 TFLOPS of actual
    sparse FLOPs -- far below hardware limits.

