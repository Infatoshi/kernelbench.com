  deflated it, so 0.0383 is a floor.
  Interpretation: 0.0383 on B200 beats grok's own published PRO 6000
  cell (0.0345) but trails kinetic-0715[1m] 0.0622 and fable 0.0578 on
  the same GPU/problem. It clearly beat the eager reference (~5.3x at
  2k, ~9x at 128k-adjacent regimes) and took the MegaQwen repo as a
  design foil rather than a port — the headline design choice is
  dropping the cooperative megakernel entirely in favor of a split-KV
  many-CTA pipeline. Long-ctx (128k, 0.0192) remains the weak shape;
  the agent's own roofline math put ~3900 tok/s as the 128k ceiling vs
  961 achieved.
