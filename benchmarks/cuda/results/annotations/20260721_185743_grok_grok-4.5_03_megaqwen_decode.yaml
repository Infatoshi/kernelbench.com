notes: |
  Publishable as a clean cell, WITH the standing sequential re-grade
  caveat (2026-07-19 rule): sibling grok sessions 02_deepseek_nsa and
  04_grid_mingru_sps overlapped this run on the same B200 (gpu_lock
  serializes graded commands within the bench only), so the official
