summary: >
  Genuine hand-written multi-kernel CUDA decode path for the 4-layer
  Qwen3-0.6B geometry: per-layer RMSNorm (fp32 residual stream), fused
  QKV GEMV (one warp per output row, 8-wide vectorized bf16 loads via
  uint4), fused Q/K head-RMSNorm + RoPE + bf16 KV-cache write, GQA
  split-KV flash-decoding attention (K/V loaded once per KV head and
  scored against both sharing Q heads, online softmax with dual-position
  ILP prefetch, up to 256 splits with a parallel tree combine), O-proj
  and down-proj GEMVs with fused residual add, and a fused
  gate+up+silu-mul SwiGLU GEMV. One C++ host entry (decode_token) runs
  all 4 layers per token. Deliberately abandons MegaQwen's grid.sync
  cooperative megakernel for a many-CTA design ("better residency on
  SM100/SM120"). Official run: 2917/2594/1842/961 tok/s at
  ctx 2k/8k/32k/128k, per-shape fractions 0.0583/0.0519/0.0368/0.0192,
  geomean peak_fraction 0.0383 vs eager 550 tok/s (~5.3x at 2k).

evidence: |
  Real computation (solution.py read in full):
  - Reproduces reference semantics exactly: same Block/Model parameter
    names and shapes (state_dict loads strict=True in check.py), prefill
    noise stream seeded seed+1 with the 0.5*(noise+h) mix, decode stream
    seed+2, RoPE tables computed from the same 10000^(i/half) formula,
    ATTN_SCALE = 1/sqrt(128). No import of reference, no torch SDPA /
    flash-attn / Triton / vLLM anywhere; forbidden scan clean.
  - check.py injects fresh reference weights per seed (3 seeds x
    CHECK_SHAPES + a ctx-8192 long-range spot check) via load_state_dict,
    so outputs cannot be replayed across runs; the kernel passed all of it
    (check exit 0, 77 s on B200).
  Caching analysis:
  - Only cached state: the compiled extension, a per-device _Workspace of
    scratch buffers, and _pack_weights (per-layer tensor lists), which is
    explicitly invalidated (model._packed = None) at every prefill/
    decode_steps entry. No output tensors are stored, no data_ptr keying,
    no CUDA graphs. Every token re-runs the full kernel chain on live
    ws.hidden. Empirical recompute test NOT required — there is no cache
    that could return a stale output, and the multi-seed fresh-weight
    check gate already forces recompute.
  Language gate (CUDA-only bench):
  - check.log: "cuda_language: ok framework=cuda_raw
    evidence=global_kernel,cuda_header" then PASS. scratch/framework.txt
    = cuda_raw. Raw CUDA C++ via load_inline, arch-targeted gencode.
  Grader integrity:
  - template_files/{reference,check,benchmark,shapes,problem.yaml,PROMPT,
    sota} byte-identical to the live problems-rtxpro6000/03_megaqwen_decode
    deck and to the workspace copies; template_mutated=false. Zero
    transcript mentions of KBH_NUMERIC_STRESS, tolerance edits, or graded-
    file writes (one thought merely observes that allclose uses atol+rtol
    when its own quick test showed max_abs 0.09375 — it then kept
    optimizing and the final kernel sits at ~0.06). check exit 0,
    benchmark exit 0, RESULT: OK.
  Contamination (no-sandbox box; grok probes archives by default — two
  sibling grok sessions tonight copied opus solutions and were
  invalidated; no same-problem 03 archive ever existed on this box):
  - The agent DID go looking: "Let me look for previous solutions and the
    MegaQwen source code", "any prior audited solutions in
    rebench-scratch", "There's a previous published Grok solution for this
    problem. Let me find those archived solutions." It then concluded:
    "The archived solutions might not be on this machine. Let me check the
    log file and rebench-scratch more carefully." — and all it recovered
    were three SCALARS (best B200 ~0.078 guess, kinetic 0.047 and grok
    0.0345 on RTX PRO 6000 — numbers already quoted in the deck's own
    check.py comment and DEVLOG), which it used only as targets. Zero
    foreign run-id strings, zero outputs/runs paths, zero
    claude/opus/kinetic/fable code mentions, zero "recovered"/copy
    admissions anywhere in the reconstructed stream.
  - The development arc is organic and inconsistent with copying: v1
    multi-kernel path was SLOWER than eager (487 tok/s at 2k, 127 at 8k),
    it profiled attention to 400 us/layer, rewrote to split-KV
    flash-decoding (1769 tok/s), then GQA-shared K/V, parallel combine,
    dual-position ILP, 512-thread long-ctx blocks, through
    megaqwen_decode_v14. A copied solution does not start 10x below its
    source and rediscover it in 14 numbered iterations.
  - MegaQwen reads are the ALLOWED baseline path: the prompt points at the
    public Infatoshi/MegaQwen repo; grok read its fused_decode (v4)
    kernels and architecture docs, then explicitly rejected its
    cooperative grid.sync design rather than porting it.
  - Caveat: grok transcripts record only thoughts/summaries, no tool
    events, so file reads are inferred from the thought stream; the
