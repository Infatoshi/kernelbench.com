summary: >
  Genuine raw-CUDA DeepSeek-style NSA sparse attention. A first CUDA kernel
  mean-pools live K by 64-token block; a second query-tiled kernel computes the
  exact causal diagonal prefix score and full-block importance, selects the
  per-query top eight with the reference tie-break, unions the sliding window,
  builds a block-to-query CSR schedule, streams selected live K/V blocks, and
  performs online-softmax attention into a fresh output. The mean-pooling
  identity reduces block scoring without changing semantics. There is no
  output cache, fixed selection table, dense-attention substitute on a scored
  shape, forbidden op, Triton/DSL path, cross-run artifact reuse, grader
  mutation, or numeric-stress bypass. Language sidecars say cuda_raw with real
  CUDA evidence and no cheat flags. For this ms-headline problem the six
  official timings are the ground truth; the archived 0.1784 scalar is
  internally reproduced but its dense-equivalent FLOP ceiling is not a
  physically meaningful performance headline.

evidence: |
  End-to-end NSA semantics (solution.py, 721 lines; MD5
  76711ec84da204db4ec8a60243850afa):
  - nsa_forward makes q/k/v contiguous from their current contents, allocates a
    fresh bf16 output and fresh fp32 KbarT, then unconditionally launches
    kbar_kernel and nsa_kernel on the current CUDA stream. kbar_kernel reads
    every live K element and writes the exact mean key for each complete or
    partial 64-token block.
  - For a fully causal block, mean_j(q dot k_j) equals q dot mean_j(k_j), so
    scoring against KbarT is algebraically identical to reference.py. The
    current diagonal block is handled separately with a live cumulative K sum
    and per-query prefix denominator, preserving partial-block causality.
  - Importance and block id are packed into an ordered u64. Successive warp
    maxima produce the top eight in descending (importance, block_id) order,
    including the reference's larger-block-id tie-break. Longer sequences loop
    over pooled-key chunks and merge into the same running top-eight list.
  - The CSR build adds every top-eight block, the diagonal block, and the
    previous block's exact sliding-window tail without duplication. Each
    selected K/V block is loaded once per 64-query CTA; only queries present in
    that block's CSR list are processed. Causal lo/hi bounds distinguish a full
    selected block from a window-only tail.
  - Sparse attention reads the live q/k/v values, computes q dot k in fp32,
    maintains an fp32 online-softmax max/denominator, accumulates weighted V in
    fp32, normalizes, and writes bf16. Both aligned and odd-S deck shapes use
    this CUDA path, including D=64/128 and the partial final block.

  Cache and live-recompute analysis:
  - _EXT caches only compiled executable code. The static last_smem integer
    avoids repeating cudaFuncSetAttribute for an unchanged launch request. It
    stores no tensor pointer, data, selection, probability, or output.
  - out and KbarT are freshly allocated on every nsa_forward call. CUDA kernels
    always dereference the current q, k, and v pointers and rebuild pooled keys,
    diagonal prefix scores, top-eight selections, CSR lists, softmax state, and
    output. Standard data_ptr extraction passes kernel arguments; it is never
    compared or used as an identity key. Therefore same-storage input mutation
    necessarily reaches the next computation.
  - The pure-PyTorch fallback is restricted to unsupported D or S>16384 and is
    never reached by the correctness or six benchmark shapes. It computes the
    same operation and contains no stored answer. There is no CUDA graph,
    memoized output, value fingerprint, seed/shape table, stack inspection,
    caller check, or grader-sidecar branch.

