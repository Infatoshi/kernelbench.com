summary: >
  Genuine input- and weight-dependent raw-CUDA MegaQwen decode. Five custom
  CUDA kernels per layer implement RMSNorm, live Q/K/V projections, Q/K norm,
  RoPE, full growing-cache causal GQA attention, O projection, residuals,
  post-norm, SwiGLU, and down projection for every prefill and decode step.
  CUDA graphs cache only the launch DAG; their kernels obtain current model,
  random-input, and KV-cache pointers through a device pointer table. Reused
  buffers and KV allocations are overwritten before any relevant read, and no
  answer, seed result, or input identity is cached. Foreign run IDs occur only
  in passive GPU-lock/process output, with no other run artifact read. Frozen
  grader files are byte-identical to the deck, no stress/tolerance bypass is
  present, and the CUDA-only gate passes without Triton, DSL, or forbidden
  hits. The logged throughput arithmetic reproduces the graded 0.0470.

evidence: |
  Real-operation review (solution.py, 925 lines; MD5
  51ba6c779c1b854eab358c74c121b984):
  - solution.py imports only os, torch, and torch.nn. It compiles the complete
    implementation from embedded _CPP_SRC and _CUDA_SRC with
    torch.utils.cpp_extension.load_inline. No local .py/.cu/.cuh/.cpp/.h
    sidecar is imported; the archived scratch diagnostics are not on the
    submitted call path.
  - Each step launches mq_qkv, mq_attn, mq_o, mq_gateup, and mq_down for all
    four layers. mq_qkv mixes the current random activation with the live
    residual, computes RMSNorm, and streams the current Q/K/V weights. mq_attn
    applies current Q/K RMSNorm and position-dependent RoPE, writes the current
    K/V row, scans every causal cache position before pos in split chunks, adds
    the current position from registers, and combines fp32 online-softmax
    partials. mq_o, mq_gateup, and mq_down consume those fresh results and the
    current projection/MLP weights to produce the next bf16 residual.
  - prefill regenerates the seed-specific initial hidden and all ctx_len random
    rows, starts at position zero, and executes all ctx_len steps. decode_steps
    regenerates the seed+2 rows, starts at the supplied live position, and
    executes all requested steps. The returned last_hidden is a clone of the
    newly computed residual, not a constant or stored answer.

  Cache, CUDA-graph, and data_ptr analysis:
  - _ext_cache contains compiled executable code only. _STATE retains a fixed
    pointer table, counters, scratch tensors, and KV allocations keyed by
    max_seq. Every phase copies current parameter, K/V, and random-buffer
    data_ptr values into the device table, copies the current hidden, resets
    positions and attention barriers, and launches the complete computation.
  - CUDA graphs are keyed only by generic split count and layer count. Captured
    kernels retain the stable address of the device pointer table, not stale
    model/KV/random addresses; those values are refreshed before each replay.
    Graphs therefore cache launch structure, not tensor values or results.
  - Reused KV storage is safe structurally: prefill overwrites positions
    0..ctx_len-1 from current inputs, attention reads only positions below the
    current pos, and the current K/V is supplied from fresh registers while it
    is written. Stale positions beyond the active prefix are never read. All
    other scratch is overwritten by the five-kernel pipeline before its
    consumer uses it. data_ptr is used only to pass live addresses, never as an
    output-cache key. There is no CUDAGraph result memo, value fingerprint,
    seed/shape answer table, caller/stack inspection, or grader sniffing.

