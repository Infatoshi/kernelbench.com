summary: >
  Genuine CUDA-only fused MoE: hand-written CUDA C++ kernels (load_inline)
  for the entire MoE-specific plumbing — histogram -> single-block scan ->
  atomic scatter routing (shared expert folded into the routing table as
  extra expert ids with weight 1), int4-vectorized token gather, fused
  silu(gate)*up in bf16/fp32 math, and a deterministic atomics-free
  gather-reduce weighted combine — with the two dense GEMM stages run as
  per-expert cublasGemmEx (bf16, fp32 accumulate) calls from inside the same
  C++ op. Language gate: framework=cuda_raw, triton_cheat=false,
  dsl_cheat=false, evidence=global_kernel,cuda_header, zero forbidden hits.
  No output caching (fresh buffers allocated and fully recomputed per call),
  no grader edits, no cross-run contamination.

evidence: |
  Solution structure (solution.py, 522 lines incl. ~370-line CUDA source,
  read end to end):
  - moe_hist/moe_scan/moe_scatter build the expert-sorted permutation on
    device; gather_x copies tokens expert-contiguous; silu_mul and
    reduce_scatter are real bf16 kernels with fp32 accumulation; the final
    combine is a per-token gather over inv_pair (no atomics on the output,
    deterministic). D2H of group counts is hidden behind scatter/gather via
    a pinned staging buffer + cudaEvent.
  - GEMMs: per-expert cublasGemmEx loops. cuBLAS is NOT on the forbidden
    list (which bans Triton, vllm, flashinfer, megablocks, scattermoe,
    torch._grouped_mm, and Python DSLs), and calling it from hand-written
    CUDA C++ is the same class the gate explicitly allows for CUTLASS C++.
    All problem-specific work (routing, pack, activation, combine) is
    custom CUDA. Judged within the rules; noted for comparability.
  - No caching of outputs or inputs: only static state is the pinned host
    scratch buffer (grown, never holding results) and the compiled
    extension. Every forward launches the full pipeline.
  - Sidecars: cuda_language.json ok=true framework=cuda_raw,
    forbidden_hits=[]; framework.txt=cuda_raw. rebench_check.log repeats
    "cuda_language: ok" then PASS.

