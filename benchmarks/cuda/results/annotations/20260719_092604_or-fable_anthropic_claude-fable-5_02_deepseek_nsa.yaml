summary: >
  Genuine hand-written NSA block-select sparse attention in inline CUDA
  (load_inline, two __global__ kernels, no sidecars): a kmean_kernel
  precomputes per-block key means stored transposed [D, NB] for coalesced
  importance loads, then a fused nsa_kernel does one-warp-per-query block
  importance, warp-reduced iterative top-8 selection with the reference's
  tie-toward-larger-index semantics, window/blocks segment union, fp32
  online softmax, and a 4-wide unrolled P.V pass, all in bf16->fp32. A
  Python-side CUDA-graph cache keyed on (data_ptr, shape, stride) removes
  pybind/dispatch overhead; empirical in-place mutation on the live B200
  proved replay recomputes from live memory (not a stale lookup). Rebench
  peak_fraction 0.0932 (original result.json 0.0931 - match); low fraction
  is the expected structural artifact of dense-equivalent FLOPs on this
  problem - headline is ms, and 0.53-2.65 ms per shape is real kernel
  territory, nowhere near a cached-output signature.

