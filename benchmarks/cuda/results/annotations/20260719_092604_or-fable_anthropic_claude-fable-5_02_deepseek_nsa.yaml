    q.mean(k_block) identity for full blocks, explicit causal-subset mean for
    the diagonal block), top-8 via warp-parallel iterative argmax over a
    monotonic float->uint keying with block index packed in the low 32 bits
    (ties resolve to larger bi, matching reference's descending tuple sort),
    union with the 64-token sliding window, fp32 softmax over exactly that
