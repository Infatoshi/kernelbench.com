notes: |
  Kernel quality: a thoughtful single-kernel fusion with several genuinely
  clever moves - the exact "full-block importance = q . mean(k_block)"
  algebraic reduction (turns the score-then-mean over 64 keys into one dot
  product against a precomputed transposed mean table), the observation
  that the diagonal block's causal keys are always a subset of the sliding
  window (so selected blocks only contribute keys strictly below the window
  start), and the packed (score, index) float2 shared-memory layout read
  back as float4 pairs in the P.V pass. The CUDA-graph wrapper is an
  aggressive but honest latency play: the harness times individual model
  calls, so removing pybind + double-launch dispatch is fair game, and the
  empirical mutation test confirms replay reads live memory. bandwidth is
  ~25-31 GB/s effective - the kernel is selection/latency bound, not
  saturating the B200; a split-K or multi-warp-per-query design could go
  further. Publishable as a clean cell.
