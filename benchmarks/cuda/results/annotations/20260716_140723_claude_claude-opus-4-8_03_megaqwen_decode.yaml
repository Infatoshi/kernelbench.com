summary: >
  Genuine input- and weight-dependent raw CUDA/PTX MegaQwen decode. One
  persistent cooperative kernel executes every requested decode/prefill step
  and all four layers, including RMSNorm, live Q/K/V projections, Q/K norm,
  long-position RoPE, full growing-cache causal GQA attention, O projection,
  residuals, post-norm, SwiGLU, and down projection. The only persistent state
  is compiled code, pointer tables, and overwritten scratch; no output,
  per-seed answer, or per-shape result is cached. All foreign run IDs in the
  transcript came from passive lock-owner, waiter, process, or directory
  listings used to diagnose shared-GPU contention; no other run's solution or
  artifact was read. The checker and all template files are unmodified, no
  stress/tolerance bypass appears, and the CUDA-only gate passes with no
  Triton/DSL/forbidden hit. The official regrade's 0.0097 arithmetic is
  internally consistent. For this latency-headline problem, the ground-truth
  decode measurements are 1019.656/746.051/412.938/175.771 tok/s and
  62.8/85.8/77.5/91.0 ms for ctx 2k/8k/32k/128k respectively; peak_fraction is
  context, not the preferred ms/frozen-eager score.

evidence: |
  Solution and real-operation review (solution.py, all 882 lines; MD5
  67fa49d8b15b9a6326aabbf9fac5df3):
  - solution.py has only standard/PyTorch imports and compiles _CPP_SRC plus
    _CUDA_SRC embedded in the file with torch.utils.cpp_extension.load_inline.
    It opens/imports no local .cu/.cuh/.cpp/.h/Python implementation sidecar.
    The grading workspace contains no top-level custom source sidecar used by
    the submitted path; scratch programs are not imported by solution.py.
  - mq_decode loops unconditionally over every step and every model layer. Its
    five synchronized stages perform the supplied operation: mixed live random
    activation plus prior hidden -> input RMSNorm -> Q/K/V GEMVs -> Q/K
    RMSNorm and position-dependent RoPE -> append current K/V -> causal GQA
    over every cache position 0..pos -> O projection and residual -> post
    RMSNorm -> gate/up GEMVs and SiLU -> down projection and residual. All
    projections dereference the current model parameter pointers.
  - Attention partitions all prior positions [0,pos) across cooperative blocks
    and adds the current position explicitly. The fixed-M softmax is a common
    per-query shift derived from a Cauchy-Schwarz bound on RMS-normalized Q/K
    and the live q_norm/k_norm parameter maxima, so it preserves softmax
    ratios; it is not a stored attention pattern or a context shortcut. The
    kernel writes each current K/V entry and later steps read the growing
    cache. RoPE uses the actual pos and accurate sincosf, including at long
    context.
  - prefill allocates fresh K/V caches and invokes the same _run_steps engine as
    decode. _run_steps generates the current seed's bf16 activation stream,
    clones the incoming hidden, and launches the kernel for all n_steps (in
    general-purpose chunks of at most 4096). The returned hidden is therefore
    produced from the current inputs, current weights, and freshly built KV
    history, not a shape/seed constant.

  Cache, data_ptr, and graph analysis from code structure:
  - _ext caches compiled executable code only. Model._scratch holds qkv,
    numerator/denominator, projection, gate/up, RoPE, and down-projection work
    buffers; the kernel clears or overwrites the relevant buffers every layer
    and never returns them as a remembered answer.
  - Model._wtab is built after the model is placed on device and contains the
    live parameter data_ptr values plus a k_norm bound. The grader loads the
    reference state_dict before the first solution call, so this is stable
    launch metadata, not weight or output caching. Model._kvtab is rebuilt
    when the newly allocated first K/V cache pointers change and contains only
    the current caches' pointers/strides. During benchmark re-prefill the old
    caches remain live while new caches are allocated, preventing allocator
    alias reuse at that key comparison.
  - All other data_ptr calls pass live tensor addresses to mq_launch. Pointer
    values are never mapped to an output, seed, score, or known shape. There is
    no CUDA graph, CUDAGraph, output memo, tensor-value fingerprint, hard-coded
    last_hidden, caller/stack inspection, grader import, or result-file read.
    Environment knobs MQ_WARPS/MQ_BLOCKS/MQ_L2_KEEP/MQ_L2_STREAM only select
    generic launch/cache-policy tuning and do not select answers.

