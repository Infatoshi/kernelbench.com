name: 04_grid_mingru_sps
display_name: "Grid + 3×MinGRU(h=256) SPS (CUDA-only)"
precision: fp32
regime: throughput

# Throughput-graded: score = achieved_sps / peak_sps.
# peak_sps is a roofline-proxy ceiling, not a best-known-kernel number: the
# first audited fused CUDA baseline (Grok 4.5, 2026-07-15) sustains ~50-61M sps
# (peak_fraction 0.33-0.41). Kept at 150M for the debut; recalibrate only if a
# measured craftax.cu / PufferLib-class baseline shows the ceiling is wrong.
peak_sps: 150000000.0

hardware: [RTX_PRO_6000]

# Fixed policy geometry (matches craftax.cu h256/L3 side bench intent).
policy:
  obs_dim: 4
  hidden: 256
  gru_layers: 3
  num_actions: 4

# Correctness: short seeded rollout must match reference env dynamics +
# policy logits (not a learned-return band — that is Mega's PPO problem).
logit_tolerance:
  float32: 1.0e-3
position_exact: true

language: cuda
require_cuda_evidence: true

forbidden:
  - "import triton"
  - "from triton"
  - "@triton.jit"
  - "triton.language"
  - "import thunderkittens"
  - "from cutlass.cute"
  - "import tilelang"
  - "gymnasium"
  - "import gym"
  - "pufferlib"
  - "import reference"
  - "from reference"

sota:
  name: "craftax.cu classic h256/L3 side bench (informational)"
  url: "https://github.com/PufferAI/PufferLib"
  function: ""
  deps: []

num_correct_trials: 3
num_perf_trials: 3

# Fusion is OPTIONAL. A multi-launch CUDA path can pass. A megakernel that
# fuses env+policy across the horizon is allowed and usually wins on SPS.
constraints:
  fused_rollout: optional
  max_launches_per_step: unrestricted
