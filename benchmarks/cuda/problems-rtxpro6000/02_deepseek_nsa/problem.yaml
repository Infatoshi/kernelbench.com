name: 02_deepseek_nsa
display_name: "DeepSeek-style NSA (block-select sparse attn, CUDA-only)"
precision: bf16
regime: compute

# Dense-equivalent full attention FLOPs so sparsity cannot inflate TFLOPS.
flops_formula: "4 * B * H * S * S * D"
# Bytes: Q + K + V + O (bf16); selection traffic ignored in roofline bytes.
bytes_formula: "B * H * S * D * 2 * 4"

hardware: [RTX_PRO_6000]
peak_tflops_key: bf16
peak_bandwidth_key: dram

tolerance:
  bfloat16: 0.1
  float32: 2.0e-3

language: cuda
require_cuda_evidence: true

# Block size and top-n selected blocks (NSA-inspired; simplified for the bench).
nsa:
  block_size: 64
  top_n_blocks: 8
  # Always include the local sliding window of this many tokens ending at each query.
  sliding_window: 64

forbidden:
  - "import triton"
  - "from triton"
  - "@triton.jit"
  - "triton.language"
  - "flash_attn"
  - "flashinfer"
  - "scaled_dot_product_attention"
  - "F.scaled_dot_product_attention"
  - "torch.nn.functional.scaled_dot_product_attention"
  - "import thunderkittens"
  - "from cutlass.cute"
  - "import tilelang"
  - "import reference"
  - "from reference"

sota:
  name: "naive dense causal attention (eager)"
  url: "https://arxiv.org/abs/2502.11089"
  function: ""
  deps: []

num_correct_trials: 3
num_perf_trials: 15
