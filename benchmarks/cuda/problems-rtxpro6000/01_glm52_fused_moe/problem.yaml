name: 01_glm52_fused_moe
display_name: "GLM-5.2 Fused MoE (CUDA-only)"
precision: bf16
regime: compute

# Dense-eq: all tokens through n_shared + T*top_k routed experts.
# Per expert: 2*(H*I) gate + 2*(H*I) up + 2*(I*H) down = 4*H*I + 2*I*H
flops_formula: "T * (n_shared + top_k) * (4 * H * I + 2 * I * H)"
bytes_formula: "T * H * 2 * 2 + (E + n_shared) * (2 * I * H + H * I) * 2"

hardware: [RTX_PRO_6000]
peak_tflops_key: bf16
peak_bandwidth_key: dram

tolerance:
  bfloat16: 0.08
  float32: 1.0e-3

language: cuda
require_cuda_evidence: true

# GLM-5 / 5.1 / 5.2 MoE layer (Z.ai): 256 routed, top-8, 1 shared, I=2048.
moe:
  style: glm52
  E: 256
  top_k: 8
  n_shared: 1
  H: 4096
  I: 2048

forbidden:
  - "import triton"
  - "from triton"
  - "@triton.jit"
  - "triton.language"
  - "import vllm"
  - "from vllm"
  - "flashinfer"
  - "megablocks"
  - "scattermoe"
  - "torch._grouped_mm"
  - "import thunderkittens"
  - "from cutlass.cute"
  - "import tilelang"
  - "import reference"
  - "from reference"

sota:
  name: "vLLM fused_moe (if installed) / naive expert loop"
  url: "https://github.com/vllm-project/vllm"
  function: "fused MoE with shared + routed experts"
  deps: []

num_correct_trials: 3
num_perf_trials: 15
