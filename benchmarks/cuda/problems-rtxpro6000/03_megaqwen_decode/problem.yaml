name: 03_megaqwen_decode
display_name: "MegaQwen-style Qwen3-0.6B block decode (improve baseline)"
precision: bf16
regime: throughput

# Throughput: decode steps per second for a growing KV cache.
# peak_tok_s is provisional on RTX PRO 6000 (MegaQwen hit ~530 tok/s on 3090
# for full model; this cell is single-block then multi-layer loop in run()).
peak_tok_s: 50000.0

hardware: [RTX_PRO_6000]

# Qwen3-0.6B geometry (from Infatoshi/MegaQwen SPEC).
model:
  hidden_size: 1024
  intermediate_size: 3072
  num_q_heads: 16
  num_kv_heads: 8
  head_dim: 128
  num_layers: 4   # bench uses 4 layers (not full 28) for wall-clock; same block
  rms_eps: 1.0e-6

tolerance:
  bfloat16: 0.08
  float32: 1.0e-3

language: cuda
require_cuda_evidence: true

forbidden:
  - "import triton"
  - "from triton"
  - "@triton.jit"
  - "triton.language"
  - "flash_attn"
  - "flashinfer"
  - "scaled_dot_product_attention"
  - "F.scaled_dot_product_attention"
  - "import vllm"
  - "from vllm"
  - "import thunderkittens"
  - "from cutlass.cute"
  - "import tilelang"
  - "import reference"
  - "from reference"

sota:
  name: "MegaQwen (Infatoshi/MegaQwen) — known strong CUDA megakernel"
  url: "https://github.com/Infatoshi/MegaQwen"
  function: "fused_decode_ldg"
  deps: []

num_correct_trials: 3
num_perf_trials: 5
