name: 03_allgather_fp8
display_name: "TP/FSDP fp8 AllGather + Dequant"
collective: all_gather
world_size: 4
hardware: [H100x4]
precision: fp8_e4m3
dtype_bytes: 1

# all-gather moves (n-1)/n * total_gathered_bytes; total = world*tokens*hidden*1.
busbw_bytes_formula: "(world_size-1)/world_size * world_size*tokens*hidden*dtype_bytes"

tolerance:
  bfloat16: 5e-2

forbidden:
  - "dist.all_reduce"
  - "dist.all_gather"
  - "dist.all_gather_into_tensor"
  - "dist.reduce_scatter"
  - "dist.reduce_scatter_tensor"
  - "dist.all_to_all"
  - "dist.all_to_all_single"
  - "dist.broadcast"
  - "dist.reduce"
  - "dist.gather"
  - "dist.scatter"
  - "torch.distributed.all_reduce"
  - "torch.distributed.all_gather"
  - "torch.distributed.reduce_scatter"
  - "torch.distributed.all_to_all"
  - "torch.distributed.reduce"
  - "torch.distributed.broadcast"
  - "_c10d_functional"
  - "torch.distributed.nn"

sota:
  name: "NCCL all_gather (fp8 bytes) + dequant (PyTorch c10d)"

num_correct_trials: 5
num_perf_trials: 100
num_warmup: 500
