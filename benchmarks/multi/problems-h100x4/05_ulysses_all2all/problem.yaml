name: 05_ulysses_all2all
display_name: "Ulysses seq<->head All-to-All"
collective: all_to_all
world_size: 4
hardware: [H100x4]
precision: bf16
dtype_bytes: 2

# NCCL alltoall busbw convention: S = the PER-RANK buffer (seq*heads*head_dim —
# seq is the per-rank shard), each rank wires (n-1)/n of it. No world_size
# multiplier: that counts the aggregate activation and over-credits 4x
# (wave-2 audit read peak_fraction 1.42 with a real send bw of ~160 GB/s).
busbw_bytes_formula: "(world_size-1)/world_size * seq*heads*head_dim*dtype_bytes"

tolerance:
  bfloat16: 5e-3

forbidden:
  - "dist.all_reduce"
  - "dist.all_gather"
  - "dist.all_gather_into_tensor"
  - "dist.reduce_scatter"
  - "dist.reduce_scatter_tensor"
  - "dist.all_to_all"
  - "dist.all_to_all_single"
  - "dist.broadcast"
  - "dist.reduce"
  - "dist.gather"
  - "dist.scatter"
  - "torch.distributed.all_reduce"
  - "torch.distributed.all_gather"
  - "torch.distributed.reduce_scatter"
  - "torch.distributed.all_to_all"
  - "torch.distributed.reduce"
  - "torch.distributed.broadcast"
  - "_c10d_functional"
  - "torch.distributed.nn"

sota:
  name: "NCCL all_to_all_single seq<->head (PyTorch c10d)"

num_correct_trials: 5
num_perf_trials: 100
num_warmup: 500
