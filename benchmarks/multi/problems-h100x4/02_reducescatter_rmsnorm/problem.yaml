name: 02_reducescatter_rmsnorm
display_name: "SP ReduceScatter + RMSNorm"
collective: reduce_scatter
world_size: 4
hardware: [H100x4]
precision: bf16
dtype_bytes: 2

# reduce-scatter moves (n-1)/n * message_bytes; message = tokens*hidden*dtype.
busbw_bytes_formula: "(world_size-1)/world_size * tokens*hidden*dtype_bytes"

tolerance:
  bfloat16: 5e-3

forbidden:
  - "dist.all_reduce"
  - "dist.all_gather"
  - "dist.all_gather_into_tensor"
  - "dist.reduce_scatter"
  - "dist.reduce_scatter_tensor"
  - "dist.all_to_all"
  - "dist.all_to_all_single"
  - "dist.broadcast"
  - "dist.reduce"
  - "dist.gather"
  - "dist.scatter"
  - "torch.distributed.all_reduce"
  - "torch.distributed.all_gather"
  - "torch.distributed.reduce_scatter"
  - "torch.distributed.all_to_all"
  - "torch.distributed.reduce"
  - "torch.distributed.broadcast"
  - "_c10d_functional"
  - "torch.distributed.nn"

sota:
  name: "NCCL reduce_scatter + RMSNorm (PyTorch c10d)"

num_correct_trials: 5
num_perf_trials: 100
num_warmup: 500
