name: 01_allreduce_residual
display_name: "TP AllReduce + Residual"
collective: all_reduce
world_size: 8
hardware: [H100x8]
precision: bf16
dtype_bytes: 2

# busbw (NCCL convention): all-reduce moves 2*(n-1)/n * message_bytes.
# message_bytes = tokens * hidden * dtype_bytes.
busbw_bytes_formula: "2*(world_size-1)/world_size * tokens*hidden*dtype_bytes"

tolerance:
  bfloat16: 5e-3

# The bare NCCL collectives are the cheat — and so is swapping all-reduce for any
# OTHER c10d collective. The cross-GPU sum must be implemented with fine-grained
# NVLink primitives (symmetric memory / NVSHMEM / put-get). p2p send/recv is
# allowed (build a ring yourself); the c10d collective surface is not.
forbidden:
  - "dist.all_reduce"
  - "dist.all_gather"
  - "dist.all_gather_into_tensor"
  - "dist.reduce_scatter"
  - "dist.reduce_scatter_tensor"
  - "dist.all_to_all"
  - "dist.all_to_all_single"
  - "dist.broadcast"
  - "dist.reduce"
  - "dist.gather"
  - "dist.scatter"
  - "torch.distributed.all_reduce"
  - "torch.distributed.all_gather"
  - "torch.distributed.reduce_scatter"
  - "torch.distributed.all_to_all"
  - "torch.distributed.reduce"
  - "torch.distributed.broadcast"
  - "_c10d_functional"
  - "torch.distributed.nn"

sota:
  name: "NCCL all-reduce (PyTorch c10d)"

num_correct_trials: 5
num_perf_trials: 100
num_warmup: 500
