authenticity_reason: >
  Genuine single-launch megakernel, Triton flavor: step() does host-side
  bookkeeping only (workspace/barrier alloc on growth, one-time transposed
  copies of the tiny bf16 router/beta weights keyed on weight-object id,
  barrier zeroing) and then issues exactly ONE mega_kernel[(114,)] Triton
  launch per decode step. The entire per-token forward runs inside that one
  @triton.jit kernel with ~50 software grid barriers (atomic spin) between
  phases: both RMSNorms per block, int4 register-dequant GEMVs for every
  projection and all MoE expert mats (weights never materialized), short
  causal conv + SiLU with in-kernel conv-state shift, KDA gated delta-rule S
  update, decoupled-RoPE MLA in absorbed (latent) form with in-kernel cache
  copy+append, router + top-8 softmax with routed scaling, shared expert,
  all residuals. No CUDA graphs, no torch.compile, no per-op loop in the
  timed path; framework.txt = "triton". Imports are only
  torch/triton/dataclasses -- no forbidden library. No identity gates or
  output caching: the kernel reads the live hidden/state buffers every
  launch; the only cross-step statics are weight-derived (transposed
  router/beta copies), never input- or output-derived, so no empirical
  recompute test is required.

