implication: >
  Publishable as a clean weak cell if mega publishes Grok at all. Do not
  confuse with 18.94x (contaminated). Score reflects real kernel limits under
  the authentic single-launch constraint, not infra failure or reward hack.
  To ever look competitive would need Fable-class stage design (few barriers,
