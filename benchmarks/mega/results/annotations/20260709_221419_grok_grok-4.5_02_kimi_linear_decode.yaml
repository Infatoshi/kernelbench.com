summary: >
  Independent clean cell after the contaminated 18.94x run
  (20260709_203918, which was byte-identical to Fable 20260701_172615).
  This rerun writes a genuine single-launch cooperative CUDA megakernel
  (cudaLaunchCooperativeKernel once per step; framework cuda_raw; check.py
  PASS with out/S/cache cosines ~0.99–1.0). Transcript has zero references to
  public/, outputs/runs, Fable, 18.7x, or copying prior solutions. Line Jaccard
  vs the contaminated/Fable solution is ~0.06 — different code.

  Performance is legitimately poor (RESULT: LOW). Official times: 6.11 / 7.50 /
  9.42 ms/tok vs baseline 5.53 / 6.13 / 6.92 → 0.90 / 0.82 / 0.73x (geomean
  0.8157). Not a hang and not a grader cheat: agent wall ~49 min of active
  compile/check/optimize flywheel, then stopped after declaring the score and
  remaining bottlenecks.

why_slow: >
  Architecture is a correctness-first megakernel, not a bandwidth-competitive one.

  1) Barrier tax. Source has ~30 grid.sync() sites; many sit on the per-layer /
     multi-phase path (RMSNorm alone does 3 grid syncs; KDA update does 4 passes
     each with grid.sync; MLA score/softmax/context each barrier). Agent measured
     early path at ~280 effective syncs and ~0.23x, then cut syncs and fused MoE
     GEMVs to climb to ~0.82x. Fable's clean 18.7x kernel uses a stage machine
     with ~14 sense-reversing grid barriers per token and zero naive
     grid.sync() in the same pattern — different design class.

  2) Naive int4 GEMV. gemv_int4_body is output-parallel grid-stride over N with
     scalar dequant FMA over K from global memory; deliberately dropped static
     smem x cache after "Shared memory exceeded the limit". Agent measured
     standalone GEMV ~0.038 ms (~125 GB/s) but said megakernel effective BW was
     far lower because stages serialize and reload. No tensor-core / MMA path.

  3) MLA materializes scores. Comment and code: "Simplified correct path:
     materialize scores [L,H]" into a large workspace (up to ~524k floats), then
     softmax, then context. Cost scales with L — matches the measured regression
     0.90x@2k → 0.73x@16k. Fable streams online softmax over compressed KV in
     two passes (no full score tensor).

  4) KDA state update is four full passes over H×Dk×Dk with barriers between
     scale / pred / rank-1 update / q-readout — correct, not fused.

  5) Ceiling math the agent itself wrote: if all GEMVs were as fast as the
     standalone microbench, ~130 GEMVs ≈ 4.9 ms would beat baseline ~5.5 ms;
     the fused kernel never got there because barrier + MLA + occupancy
     overhead ate the win. Best official geomean left at 0.82x.

path_taken: >
  Session narrative (surface text + thoughts): read problem → wait on GPU lock
  (killed stuck wait) → baseline ~5.66 ms/tok → first megakernel correct but
  ~4× slower → rewrite GEMV / cut grid.sync / try single-block (got much worse
  ~165 ms) → restore multi-block → batch MoE experts → MegaParams by pointer →
  drop smem x (OOM) → MLA locality tweaks → settle at 0.82x and stop.
  Progress curve claimed by agent: ~0.23x → ~0.32x → ~0.54x → ~0.76x → 0.82x.
  Not stuck at the end; early GPU-lock wait only.

