summary: >
  H100 kinetic-0715[1m] cell (4.0063x geomean speedup versus the eager
  reference over ctx 2048/8192/16384). Clean, genuine single-launch raw CUDA
  megakernel: unlike the RTX PRO 6000 sidecar runs, this solution.py is fully
  self-contained (1347 lines, no local module import) with the CUDA source
  embedded and compiled via load_inline. The timed step() path calls
  _ext.mega_step exactly once, which issues one megakernel<<<nCTA, 256,
  40960B smem>>> launch; all 23 stages (three KDA blocks: fused int4 GEMVs,
  short conv, gated-delta S update, o_proj+residual, router/top-8 MoE
  gate/up/down; one MLA block: q/kv_a projections with in-kernel RoPE, latent
  cache append plus in-kernel copy-forward of the old cache rows,
  flash-decoding chunked online-softmax attention with a combine phase, kv_b
  value projection, o_proj, MoE) are separated by an atomics-based grid-wide
  barrier inside the same launch. No CUDA graph, no torch.compile, no
  per-token multi-kernel loop, no forbidden library, no cached or constant
  output: every launch reads the live hidden/state pointers and writes hout,
  all KDA S/conv windows, and the appended MLA cache into freshly allocated
  output tensors. The debug stage-stop parameter is hardcoded to 999 (run all
  stages) in the timed path, and KIMI_FORCE_EAGER only selects the slow eager
  oracle, which the official grading did not use (benchmark shows 2.79-3.39
  ms/tok versus 11.5-13.3 ms baseline, and latency grows with context length
  as real live-cache attention should).

