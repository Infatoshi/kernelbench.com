summary: >
  Clean H100 cell (14.8182x geomean speedup versus the eager baseline over
  contexts 2048/8192/16384). The submission is a genuine single-launch raw
  CUDA cooperative megakernel, not an output cache, constant answer, forbidden
  library call, CUDA graph, torch.compile wrapper, or per-op launch loop. It
  executes all four decode blocks in one kernel: three KDA blocks with fused
  int4 dequant GEMVs, short-convolution window updates, gated recurrent S
  updates, output projections and residuals; one MLA block with q/kv_a
  projections, RoPE, latent-cache append, absorbed kv_b attention over every
  live cache row, value/output projections and residual; and a router/top-8
  MoE plus shared expert after every block. The private _ws identity marker
  only identifies state already resident in the model-owned live cache so it
  can avoid copying historical rows again. A foreign initialized state is
  copied in, continuous returned state already aliases the updated workspace,
  and every call appends a row, recomputes attention, mutates all three KDA
  states/windows, and overwrites the complete 2304-element output buffer.
  Therefore the pointer/identity reuse cannot replay a stale output in the
  checker or benchmark call structures.

evidence: |
  - End-to-end source review: solution.py imports only standard/PyTorch modules
    and local mega_impl. mega_impl imports torch and load_inline; neither file
    imports any problem.yaml-forbidden model, attention, MoE, or W4A16 library.
    Model.step calls ext.mstep exactly once. Its host mstep issues exactly one
    cudaLaunchCooperativeKernel, while setup/weight repacking occurs before the
    timed step path. The production spec passes dbg_stop=-1, so none of the
    development phase-stop branches can skip work.
  - Full decode semantics: mega loops bi=0..3. For bi<3 it computes q/k/v/g
    dequant GEMVs, beta, three live convolution-window reads and shifts,
    decayed/gated S updates, KDA output projection and residual, then moe_phase.
    For bi=3 it computes q and kv_a, RoPE, copies a foreign cache when fresh,
    appends the current latent KV row, performs online-softmax absorbed MLA over
    positions 0..L, combines every attention chunk, applies kv_b value and
    output projections, then runs the fourth moe_phase. Each moe_phase computes
    all 64 router logits, normalized top-8 routing weights, eight routed
    gate/up/down experts, and the shared gate/up/down expert before the next
    residual. The final phase writes every XOUT element.
  - Cache/pointer scrutiny: fresh is true unless the state's private _ws tuple
    identifies this Model's own _ws_c buffer. On fresh calls, the CUDA P1 work
    count includes L copy tasks that copy c_kv and k_rope into WSC/WSK, and the
    Python pointer spec is rebuilt including all KDA state pointers. On chained
    calls, the returned c_kv/k_rope are views of those same live buffers, so
    skipping the redundant historical copy preserves in-place changes; the
    kernel still appends at row L and attention iterates through L+1 rows.
    hidden.data_ptr and cache source pointers are refreshed in the reused spec,
    and no input key, output memo, graph replay, constant tensor, or early
    return exists. The persistent XOUT allocation is only storage and is fully
    overwritten after all phases on every invocation.
