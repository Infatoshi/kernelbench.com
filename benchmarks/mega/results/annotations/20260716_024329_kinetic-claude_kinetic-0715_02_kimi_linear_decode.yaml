summary: >
  RTX PRO 6000 kinetic-0715 round-2 cell (18.0880x geomean speedup versus the
  eager reference over ctx 2048/8192/16384). Clean, genuine single-launch raw
  CUDA megakernel: solution.py delegates to the local kimi_mega.py sidecar,
  whose load_inline extension calls cudaLaunchCooperativeKernel exactly once
  per step() with one 1024-thread block per SM (188 blocks on this GPU) and
  grid-wide barriers across all 22 phases. It recomputes the complete live
  decode step: three KDA blocks with fused asymmetric-int4 GEMVs, short-conv
  and conv-window writes, gated-delta S update, output projection and residual;
  one MLA block with q/kv_a projections, RoPE, latent-cache append, online
  softmax attention over the live cache, kv_b value projection, output
  projection and residual; and four router/top-8 MoEs including all eight
  routed experts plus the shared expert with normalized routed weights. There
  is no CUDAGraph, torch.compile, per-op custom-kernel loop, forbidden import,
  cached output, constant answer, or dropped stage. The fixed parameter
  pointers refer to the model's live buffers, hidden and KDA-state pointers are
  passed dynamically on every invocation, and output/state are written on
  every launch. The c_kv.data_ptr identity test only avoids recopying an MLA
  cache that already aliases the runner's growing live buffer: foreign buffers
  are copied in, in-place rewrites are already visible through the same buffer,
  and the kernel always appends and recomputes attention, so this is not
  input-keyed memoization. Debug gates KIMI_EAGER and KIMI_STOP_AFTER default
  to the megakernel and the complete phase range respectively; official logs
  show the full output/S/cache result.

