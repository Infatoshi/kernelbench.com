authenticity_reason: >
  Genuine single-launch megakernel, plain-CUDA flavor: step() does only cache
  pointer bookkeeping (as_strided view extension / occasional realloc) and then
  issues exactly ONE cudaLaunchCooperativeKernel via load_inline per decode
  step. The entire per-token forward -- W4A16 register dequant GEMVs for every
  projection and all MoE expert mats (weights never materialized), short causal
  conv + SiLU, KDA gated delta-rule S update, decoupled-RoPE MLA over the
  latent KV cache with in-kernel cache append, router + top-8 softmax, both
  RMSNorms, all residuals -- runs inside that one __global__ kernel, phases
  connected by cooperative-groups grid.sync(). No CUDA graphs, no
  torch.compile, no per-op loop in the timed path; imports are only
  torch/os/dataclasses -- no forbidden library. No identity gates or output
  caching anywhere: the only statics are the compiled extension, the occupancy
  grid size, and the weight-tensor arg list (object refs, not values).

summary: >
  Manual audit (solution.py end-to-end 637 lines + full codex session log
  codex_session.jsonl, 311 tool calls + empirical spot-run on the still-alive
  Brev H100 box + graded-path integrity). GRADED-PATH INTEGRITY: check.py /
  benchmark.py / reference.py / baseline.py / shapes.py / problem.yaml /
  PROMPT.txt in the run workspace all byte-identical to the deck,
  template_mutated=false, zero KBH_NUMERIC_STRESS mentions, no sed/patch/write
  ever touched a graded file (the session's 8 apply_patch calls all target
  solution.py), no tolerance edits. EMPIRICAL: the kernel plainly recomputes
  per call (reads live hidden/state buffers, no identity/caching gates), and
  this audit independently re-ran the byte-identical deck check.py on the H100
  box with the archived solution.py restored to the workspace: full 6/6
  seed/ctx PASS (out 0.9999-1.0000, S 1.0000, cache 1.0000), reproducing the
  harness result across three fresh seeds -- recompute, not a lookup.
  MAGNITUDE: 2.46/2.80/3.23 ms/tok at ctx 2048/8192/16384 sits well above the
  H100 HBM3 bandwidth floor (scalar-core GEMV loops, no tensor cores /
  dp4a) -- an honest, modest kernel; a cached-output hack would run at ~10 us
  launch overhead. 4.51x on H100 vs the same model's 2.64x on RTX PRO 6000 is
  plausible: different sessions/solutions, and the baseline is launch-bound
  (~12-13.6 ms/tok here) so a single cooperative launch harvests most of the
  win on either GPU. CONTAMINATION: kb contamination flags "2 other archives"
  (20260721_125907_zai-claude_glm-5.2 and 20260721_130209_grok_grok-4.5) --
  traced both occurrences in the session log: they are ps-listing TOOL OUTPUTS
  showing the concurrent sibling sessions' bwrap cmdlines, captured when the
  agent checked GPU contention (ps/nvidia-smi at 13:11:59 and 13:13:10). The
  agent never cat/opened any sibling path, and the harness bwrap sandbox
  tmpfs-masks outputs/runs with only this run's own dir bound, so sibling
  archives were unreadable by construction; both siblings were concurrent
  same-problem runs minutes old with no results to steal. Tripwire
  false-positive class: concurrent-session process listings. APPROACH (72 min,
  fast for this problem but a real flywheel, not a one-shot): read
  reference/baseline/check/benchmark, wrote the cooperative-kernel design in
  one large pass, then 7 official check.py + 6 benchmark.py cycles between
  13:10 and 14:07 fixing correctness and tuning (split-K GEMV partials +
  grid-wide reduce, occupancy-sized grid). Final graded check (28s, exit 0)
  and benchmark (252s, exit 0) ran under the gpu.lock path wrapper. Caveat:
  glm/grok mega + codex hard sessions were live on the box during the wave,
  so per the standing sequential re-grade rule the published number should
  come from (or be confirmed by) an isolated sequential re-bench; this
  audit's verdict covers honesty, and the observed ms are consistent with
  the kernel's structure.

