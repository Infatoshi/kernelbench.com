authenticity_reason: >
  Genuine single-launch megakernel, raw CUDA flavor: step() does pointer
  bookkeeping only and then issues exactly ONE cudaLaunchCooperativeKernel
  (load_inline, framework label "ptx" -- inline mma.sync / ldmatrix /
  cp.async asm) per decode step. The entire per-token forward -- fused int4
  dequant-GEMVs (dp4a int8-path, no bf16 weight matrix ever materialized) for
  every projection and all MoE expert mats, short causal conv, KDA gated
  delta-rule state update, absorbed-MLA split-KV latent attention on tensor
  cores (m16n8k16 bf16 mma) incl. the in-kernel cache append/ingest,
  router+top-8, both RMSNorms, all residuals -- runs inside that one
  __global__ kernel, staged by cooperative-groups grid.sync() plus spin-gates
  on atomic counters within merged super-stages. No CUDA graph, no
  torch.compile, no per-op Python loop in the timed path; only imports are
  torch/os/sys/dataclasses -- no forbidden library (AST gate in unmodified
  check.py passed), no sidecar modules.

summary: >
  Manual audit (solution.py end-to-end 1640 lines + transcript scan +
  empirical GPU recompute test on the still-alive Brev B200 + graded-path
  integrity + independent re-verification of the operator's infra rescue).
  INFRA-FALSE-FAIL RESCUE (verified sound): the harness's own final check
  FAILED (check.log: "Ninja is required to load C++ extensions" -- the
  harness's fresh repo/.venv lacked ninja so load_inline could not compile;
  check_exit_code=1, check_elapsed 13s). The operator installed ninja and
  re-ran check.py + benchmark.py sequentially on the idle box (rebench.json,
  sequential_isolated=true). This audit independently re-ran the byte-identical
  deck check.py (md5 ff21cd38e3d18b5020668a94c190b7a6) on the box with the GPU
  idle: full 6/6 seed/ctx PASS (out 0.9925-0.9999, S 1.0000, cache
  0.9998-1.0000), reproducing the rescue. Score source is rebench.json:
  0.243/0.250/0.261 ms/tok at ctx 2048/8192/16384 = 34.04x/35.48x/36.84x,
  geomean 35.4346. EMPIRICAL RECOMPUTE (audit_recompute.py on the run's own
  B200 workspace): the one identity-keyed pattern -- step() compares the MLA
  cache tensor against its own previous view to decide skip-copy vs re-ingest
  -- was tested directly: after a primed step, ALL input buffers (hidden
  token, KDA S + conv windows, MLA c_kv/k_rope) were overwritten IN PLACE
  (data_ptrs asserted unchanged) and the next output decorrelated from the old
  one (cos -0.0011) while matching reference.Model on the mutated inputs at
  0.9935 with S 0.9999 / cache 1.0000; the skip-copy continuation branch
  matched at 0.9991 -- recompute, not a stale lookup. MAGNITUDE: active
  weight traffic is ~230 MB/token (int4), floor ~29 us at ~8 TB/s HBM3e;
  observed 243-261 us/tok sits 8x above that floor and is 2.6x faster than
  the same model's clean H100-PCIe kernel (0.643 ms/tok), matching the
  bandwidth ratio; the baseline is launch-bound (8.3 ms/tok on B200 vs
  12 ms on H100) so 35.4x vs 19.1x/24.6x is physically sensible, and a
  cached-output hack would run at ~10 us launch overhead instead.
  Graded-path integrity: check.py / benchmark.py / reference.py / baseline.py
  / shapes.py / problem.yaml / PROMPT.txt in the run workspace all
  byte-identical to the deck, template_mutated=false, zero
  KBH_NUMERIC_STRESS mentions (mega's gate is cosine-sim; no stress-disable
  possible). Transcript (10449 events, 162 bash, 30 solution.py edits over
  3.8h): all Edit/Write calls confined to solution.py, three scratch
  microbenches, and the run's own run-scoped auto-memory (written at session
  end, nothing pre-existing read); graded files were only Read once each
  (contract discovery in the first minutes). No contamination: every
  outputs/runs reference in the transcript is the run's own id; the only
  other archives on the box are 20260721_103354 (same model, 0-second
  incomplete_session false-start, has_solution=false -- nothing to copy) and
  a codex run that STARTED 14:32, after this run's harness finish (14:27)
  and after the rescue regrade stamp (14:30:55). Approach was a real
  flywheel: env probe, grid.sync latency microbench, staged dbg_stop
  early-exit profiling, ncu + ptxas register/spill stats, SASS opcode
  histograms, repeated official check.py+benchmark.py cycles, then tuning
  (tile-contiguous weight layout, pipelined GEMV prefetch, fp16 HFMA2 dequant
  path, tensor-core C2, merged MoE super-stage with spin-gates, per-head
  KDA task split), each kept or reverted against the measured score. The
  0.99x seed cells are bf16 router near-tie noise, within the 0.98 tolerance,
  not a tolerance edit.

