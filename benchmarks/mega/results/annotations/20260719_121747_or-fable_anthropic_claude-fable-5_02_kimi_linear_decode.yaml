implication: >
  Clean. (1) solution.py read end to end: real fused compute, no cached/constant
  path; the data_ptr() check only decides whether the incoming state is the view
  the model handed back last step (skip re-copying the KV cache into the
  capacity buffer) -- the hidden token and all state are re-read from live
  memory every launch. (2) Transcript audit: all 290 outputs/runs references are
  the run's own archive path (zero cross-run contamination); no problem-file
  edits; no stack sniffing; torch.compile/CUDAGraph mentions are quotes of the
  problem's own authenticity-gate text; agent iterated with 59 real
  check/benchmark invocations. (3) Empirical GPU re-test on the PRO box:
  overwriting the SAME hidden buffer (same data_ptr) with new random contents
  and a fresh state gives cos(sol,ref)=0.9999 on the new input while
  cos(old_out,new_out)=-0.006 (recompute proven, not stale lookup); the
  continuation path (cont=True, returned-state views, new token copy_'d into
  the same tensor object) matches a reference two-step chain at
  cos=0.9999 with state S/cache cos=1.0000. Magnitude sanity: ~230 MB streamed
  per token at ctx 2048 (107.7 MB dense+shared int4 weights + 120.3 MB for
  8/64 routed experts x 4 layers + KV cache) implies ~745 GB/s at 0.309
  ms/tok -- about 41% of the 1.8 TB/s device peak, physically plausible; a
  cached-lookup path would be orders of magnitude below any weight-streaming
  bound. (4) Graded numbers came from unmodified deck files (diff clean); this
  problem's check.py grades via cosine over GRADING_SEEDS and does not use
  KBH_NUMERIC_STRESS, so no stress-disable vector exists; rebench logs show the
  standard runner output.
