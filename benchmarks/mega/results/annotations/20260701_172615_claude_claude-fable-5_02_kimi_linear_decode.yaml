implication: >
  Publishable as the first megakernel-authentic headline cell for
  02_kimi_linear_decode. Mechanically it lands where Opus's 19.35x graph-replay
  did (~0.29-0.31 ms/tok) but with the on-chip fusion the bench actually
  demands: one persistent cooperative kernel instead of a CUDA-graph replay of
  many small kernels (Opus cell = megakernel_authentic false under v2.1). The
  GLM-family clean cells (7.3-11.1x) were also graph/multi-kernel paths, so
  Fable 5 currently holds the only authentic single-kernel number at 18.7x,
  ~55-60% of the bandwidth roofline (~29x). Note for future audits: the
  returned hidden aliases the Model's scratch buffer and the returned state
  holds views into its capacity cache — legitimate here (proven by the
  in-place-overwrite recompute test), but any rescoring harness that assumes
  fresh output tensors per step should clone.
