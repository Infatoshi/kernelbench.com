verdict: interesting

summary: |
  New best TopK cell. The implementation uses exact hierarchical top-K with CUB BlockRadixSort, a striped coalesced load, and a three-pass merge for the single-row k=64 case to keep enough blocks resident.

quotes:
  - file: solution.py
    lines: [11, 32]
    label: "Hierarchical exact TopK strategy"
    text: |
      For all shapes the kernel uses CUB BlockRadixSort to extract the per-block
      top-K, with a STRIPED input load (one cache line per warp per iteration)
      followed by a BlockExchange StripedToBlocked permutation into the
      arrangement BlockRadixSort expects. The prior solution used a BLOCKED
      load, which causes 32 separate 4-byte transactions per warp per iteration
      — the dominant reason the old design was stuck at ~27 GB/s on shape 0.
      
        k == 1 (argmax):  one block per row, warp-reduced max with tie-break-low.
      
        small k, many rows (k=8/16/32):  two-pass.
          Pass 1 (segment_sort):  blocks_per_row blocks per row sort their chunk
                                  descending and emit the chunk's top-K (val + int32
                                  col index) to scratch.
          Pass 2 (partial_sort):  one block per row sorts the blocks_per_row*K
                                  candidates and emits the final sorted top-K (int64).
      
        k == 64, single row (n=131072):  three-pass hierarchical merge. A single row
          with the two-pass design only fields blocks_per_row blocks, which on this
          row count is bandwidth-starved. Instead split the row into B1 chunks
          (B1 chosen to give one wave of blocks on 188 SMs), merge groups of GROUP
          chunks at the second level, and finalize in one block. top-K of a union
          of per-partition top-Ks is the global top-K, so the hierarchy is exact.

implication: |
  This is an honest algorithmic win rather than a forbidden torch.topk wrapper: the gain comes from memory coalescing and enough parallel chunks on the hard single-row case.
