summary: >
  RTX PRO 6000 kinetic-0715 cell (14.11x, geomean over ctx 2048/8192/16384).
  Genuine single-launch persistent Triton megakernel: one @triton.jit `mega`
  kernel invoked exactly once per step() (NBLK=376 persistent blocks, spin
  grid-wide barriers between statically scheduled stages). No torch.cuda.
  CUDAGraph, no torch.compile, no per-op kernel loop, no getattr/importlib
  obfuscation, no sidecar modules. Computes the full real op in-kernel: 3x KDA
  (fused int4 dequant-GEMV q/k/v/g via int8 tensor cores with exact per-group
  fp32 dequant correction, short-conv + silu with conv-window state update,
  gated-delta recurrence matching reference S update, o_proj + residual), MLA
  in absorbed form (q_abs against the 576-d latent cache, rope on q/k, cache
  append, two-pass chunked softmax + PV, absorbed Wv, o_proj + residual), and
  per-layer MoE with router softmax, iterative top-8 (tie-hardened), weight
  renorm * routed_scaling, all 8 routed experts PLUS the shared expert (9-slot
  task loops: 2592=9x288 gate/up, 1296=9x144 down), RMSNorms with bf16
  rounding fidelity. No dropped terms for cosine gaming; the state (KDA S,
  conv windows, MLA cache) is written back and check.py compares it (S>=0.9999,
  cache>=0.9997, out 0.987-0.9994 vs the 0.98 gate). Activation int8-per-128-
  group quantization is the same class of int8-tensor-core dequant path
  previously ruled clean on this problem. Only imports: torch/triton/os/
  dataclasses -- forbidden-scan passes; no reference/baseline import in the
  timed path. template_files match the deck byte-for-byte; template_mutated=
  false. Transcript: all 140 outputs/runs references are this run's own id
  (no cross-run contamination); zero KBH_NUMERIC_STRESS=0; no edits to
  check.py/benchmark.py/reference.py/baseline.py/problem.yaml (only scratch
  timing scripts and solution.py self-edits); no grader probing. No data_ptr-
  keyed or input-keyed memoization anywhere: the kernel reloads the hidden
  input and recomputes every launch (first-call state upload is keyed on a
  "_mk" marker in the state dict, not on pointers). MEGA_STOP env knob is a
  debug early-exit defaulting to -1 (full run) and was not set in check/
  benchmark logs. If empirical confirmation is ever wanted: mutate the hidden
  buffer in place between two step() calls on the same state and confirm the
  returned HB changes (no GPU test run for this audit; kernel structure makes
  a stale-lookup path impossible). Provenance: session hit the legacy 21600s
  cap (session_complete=false, harness_exit_code=124); graded from the
  solution present at cutoff, which passed check (exit 0) and benchmark
  (exit 0). Per-shape speedups 12.85x / 14.41x / 15.15x -- self-consistent
  scaling, below Fable 5's clean 18.71x ceiling and well above GLM-5.2's
  clean 7.3x, with nothing resembling the historical contaminated 16-17x
