authenticity_reason: >
  Genuine single-launch Triton megakernel: step() does host-side bookkeeping
  only (KV-cache row append via realloc+copy, workspace/barrier/topk buffer
  alloc keyed on device, per-step repack of an int64 pointer TABLE of live
  weight/state data_ptr()s to stay under the CUDA kernel-parameter limit,
  barrier zeroing, hidden copied into the f32 workspace) and then issues
  exactly ONE decode_megakernel[(64,)] launch per decode step. The whole
  per-token forward runs inside that one @triton.jit kernel with ~180
  arrive/release atomic spin-barrier phases: RMSNorms, int4 register-dequant
  GEMVs for every projection and all MoE expert mats (weights never
  materialized), short conv + SiLU with in-kernel conv-state shift, KDA
  gated delta-rule S update, decoupled-RoPE MLA in absorbed (latent) form
  with in-kernel cache append, per-program private router top-8 softmax with
  routed scaling 2.446, shared expert, residuals, bf16 out-store. No CUDA
  graphs, no torch.compile, no per-op loop in the timed path. Imports are
  only torch/triton/dataclasses -- no forbidden library (problem.yaml list
  checked). No identity gates or output caching: the pointer table is
  weight/state-derived (repacked every step from live tensors), the input
  hidden is copied fresh into the workspace each step, and the output is
  cloned from the kernel's out buffer -- nothing input- or output-keyed, so
  no empirical recompute test is required.

