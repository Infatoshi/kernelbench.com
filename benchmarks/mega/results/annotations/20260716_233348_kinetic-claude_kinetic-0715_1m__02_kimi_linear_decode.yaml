summary: >
  Clean, genuine single-launch persistent Triton megakernel at 9.7846x geomean
  decode speedup (0.747/0.852/0.975 ms/tok vs baseline 7.615/8.304/9.199 at
  ctx 2048/8192/16384). The entire per-token forward -- 3 KDA blocks (fused
  int4-dequant split-K GEMVs for q/k/v/g sharing one x load, beta projection,
  short conv with a double-buffered conv-window ping-pong, gated-delta S
  recurrence with per-head fuzzy start flags, o_proj+residual, router/top-8
  MoE with shared expert), 1 MLA block (q/kv_a projections, absorb-identity
  attention over the compressed bf16 latent cache via head-grouped
  online-softmax flash decode with adaptive chunking and in-kernel cache
  append/RoPE, kv_b value projection, o_proj, MoE), plus both RMSNorms per
  block -- executes as ONE Triton kernel launch per step. Stage ordering uses
  atomic item counters with acquire/release semantics and nanosleep-throttled
  polling; a warmup-based occupancy probe picks the CTA count once. int4
  weights are repacked once into flat uint8/f32 regions and dequantized
  in-register inside every GEMV (no bf16 weight materialization). Weight
  flattening is cached across steps but invalidated by a
  register_load_state_dict_post_hook, so fresh check.py seeds re-materialize;
  no output memoization, no input-identity keying, no data_ptr dispatch in the
  final solution. A KIMI_DEBUG_EAGER env flag selects a slow eager oracle used
  only for the agent's own debugging; grading ran the megakernel path.

