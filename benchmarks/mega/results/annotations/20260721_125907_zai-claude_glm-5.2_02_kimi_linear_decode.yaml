authenticity_reason: >
  Genuine single-launch megakernel, raw CUDA flavor: solution.py builds one
  __global__ mega(...) kernel via torch load_inline and step() issues exactly
  ONE launch_mega call per decode step (grid sized to max-resident blocks via
  cudaOccupancyMaxActiveBlocksPerMultiprocessor, so the ~50 monotonic-generation
  atomic spin barriers between phases are deadlock-free). The entire per-token
  forward runs inside that one kernel: RMSNorms folded into each GEMV's input
  load, warp-per-output int4 register-dequant GEMVs for every projection and
  all 64+1 MoE expert mats (bf16 weights never materialized), short causal
  conv + SiLU with in-kernel conv-state shift, KDA gated delta-rule S update,
  MLA in absorbed (latent) form with in-kernel q-absorb through the int4 kv_b
  and in-kernel cache append, router softmax + top-8 + routed scaling, shared
  expert, all residuals. No CUDA graphs (the transcript's CUDAGraph hits are
  the agent READING check.py's advisory-tripwire comments and PROMPT.txt), no
  torch.compile, no per-op loop. Imports: torch + load_inline only -- no
  forbidden library, no import reference/baseline. The one identity pattern,
  is_my_buf = ckv_in.data_ptr() == self._ckv_buf.data_ptr() in step(), gates
  ONLY whether the incoming MLA cache is prime-copied into the kernel's big
  buffer: when identity holds the incoming cache IS that buffer (same live
  memory the kernel reads and appends to), and both check.py and benchmark.py
  build fresh state via reference.init_state per sequence (new allocation ->
  prime=1 copy). Nothing input- or output-derived is cached across steps; the
  output buffer is recomputed every launch from the live hidden pointer, so no
  empirical recompute test is required.

