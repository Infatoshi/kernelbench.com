summary: >
  H100 kinetic-0715 RL grid PPO MEGA cell, graded at 5.0604x. Manual local audit
  read all 650 lines of solution.py, the reference/check/benchmark contract,
  check.log, benchmark.log, result provenance, and the complete transcript
  evidence relevant to contamination and grader mutation. The timed path is a
  real fused from-scratch trainer, not a returned constant or cached curve:
  train() allocates fresh rollout, metadata, curve, statistics, gradient-slot,
  minibatch-list, and count tensors on every invocation, then makes one
  cudaLaunchCooperativeKernel call. Inside that launch, the kernel initializes
  all 645 actor-critic parameters and Adam state from the live seed, simulates
  the 11x11 grid-foraging MDP for all 4096 environments and 32 rollout steps,
  samples actions, respawns food, accumulates rewards, computes GAE and
  normalized advantages, and executes all 4 epochs x 4 PPO minibatch updates
  with clipped policy loss, value loss, entropy term, global grad-norm clipping,
  and Adam. Grid-wide barriers separate the phases. There is no CUDA graph,
  torch.compile, per-step host launch loop, prebuilt RL dependency, reference or
  baseline import, output memoization, data_ptr/input-identity lookup, or sleep.
  The only process cache is _EXT for the compiled extension and choose_nt's
  cached occupancy choice; neither stores outputs or training state. Every
  train() call uses fresh buffers and recomputes the curve from live seed-driven
  environment and policy state. The official check log shows solution finals
  3.964/3.966/3.960 versus reference 3.956/3.963/4.000, early returns
  0.226/0.233/0.215, then PASS. The official benchmark's three fresh random
  seeds all learn to 3.956-3.971 at 126.29-126.51M env-steps/s; the logged best
  126,511,028 divided by the 25,000,000 anchor is exactly 5.0604, so the score's
  magnitude is internally consistent. No GPU rerun was performed for this
  audit; code structure makes a stale-result path impossible.

