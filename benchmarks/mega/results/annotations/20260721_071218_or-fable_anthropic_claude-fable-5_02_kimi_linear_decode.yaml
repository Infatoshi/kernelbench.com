authenticity_reason: >
  Genuine single-launch megakernel, Triton flavor: step() issues exactly one
  _mega[(nprog,)] persistent-grid @triton.jit launch per decode step (plus a
  one-time co-residency probe launch at weight-prepare, not per step) and no
  other torch op — the entire per-token forward (fused int4 dequant-GEMVs for
  every projection and all MoE experts, short causal conv, KDA gated
  delta-rule state update, absorbed-MLA latent attention incl. the in-kernel
  cache append/ingest, router+top-8, both RMSNorms, all residual adds) runs
  inside that one launch, separated by ~15 software global barriers (atomic
  counter + volatile spin + nanosleep backoff, abort flag on spin cap).
  Weights stay int4 end-to-end: activations are pre-quantized per stage into
  two int8 levels per 128-group and multiplied against packed nibbles with
  tl.dot int32 (imma), rescaled by (scale, zero) on the fly — no bf16 weight
  matrix is ever materialized. No CUDA graph, no torch.compile, no per-op
  loop; framework.txt label "triton". Only imports are torch/triton — no
  forbidden library (AST gate in unmodified check.py passed), no sidecar
  modules.

