summary: >
  Clean and megakernel-authentic at 28.7578x (718,944,533 SPS vs the
  25,000,000 SPS anchor). The solution runs the ENTIRE PPO training run — all
  iterations of the 32-step x 4096-env rollout, GAE, advantage normalization,
  and 4 epochs x 4 minibatches of exact PPO gradient + grad-norm clip + Adam —
  inside ONE persistent cooperative kernel launch (plus a one-off init
  kernel), with parameters and Adam moments resident in shared memory for the
  whole run. Seed-keyed Philox RNG drives weight init, env resets, action
  sampling, and food respawns; a Feistel bijection replaces randperm for exact
  balanced minibatch assignment. No caching keyed on inputs, no CUDA graphs,
  no torch.compile, no RL library, no check.py sniffing, and all grader
  templates byte-match the snapshot. This 28.7578 is NOT a duplicate of any
  other run: the sibling 20260716_150001 run has peak_fraction=null (its
  check.py timed out waiting on the GPU lock) and a different solution file
  (md5 6a850095479b4ac27e046d4fa82d0ab1 vs this run's
  a63618ba936472df072c942b6e783e69).

evidence: |
  - solution.py (md5 a63618ba936472df072c942b6e783e69) computes the real op
    end to end: init_kernel draws uniform(-1/sqrt(fan_in)) weights from
    seed-keyed Philox; ppo_megakernel does per-env rollout (half-warp per env,
    tanh MLP forward via 16-lane butterfly reductions, categorical sampling
    from Philox, 11x11 clamped transitions with food respawn), backward GAE
    with no bootstrap past horizon, global unbiased advantage stats via fp64
    atomics, then 16 minibatch phases computing exact clip/entropy/value
    gradient terms with block reduction, grid.sync, global grad-norm clip, and
    Adam. curve is populated only from accumulated caught-food rewards and
    divided by NUM_ENVS on the host.
