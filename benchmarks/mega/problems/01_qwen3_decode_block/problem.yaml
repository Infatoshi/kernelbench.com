name: 01_qwen3_decode_block
display_name: "Qwen3-0.6B Decode Block Megakernel"
precision: bf16
regime: memory

flops_formula: "2*1024*(2048 + 1024 + 1024) + 2*1024*2048 + 2*1024*3072*2 + 2*3072*1024 + 4*16*seq_len*128"
bytes_formula: "2*(1024*(2048 + 1024 + 1024) + 1024*2048 + 1024*3072*2 + 3072*1024) + 2*(1024 + 2048 + 1024 + 1024 + 3072 + 1024) + 2*2*8*seq_len*128"

hardware: [RTX_PRO_6000]
peak_tflops_key: bf16
peak_bandwidth_key: dram

tolerance:
  bfloat16: 0.08

forbidden:
  - "torch.matmul"
  - "torch.mm"
  - "torch.mv"
  - "torch.bmm"
  - "torch.einsum"
  - "torch.nn.functional.linear"
  - "F.linear"
  - "torch.nn.functional.scaled_dot_product_attention"
  - "scaled_dot_product_attention"
  - "transformers"

sota:
  name: "MegaQwen fused decode megakernel"
  url: "https://github.com/Infatoshi/megaqwen"
  function: "csrc.megakernel.megakernel_decode"
  deps: []

num_correct_trials: 3
num_perf_trials: 20
