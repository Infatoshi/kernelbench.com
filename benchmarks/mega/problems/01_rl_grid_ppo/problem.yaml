name: 01_rl_grid_ppo
display_name: "Grid-Foraging PPO Training Megakernel"
precision: fp32
regime: throughput

# Throughput-graded: score = achieved_sps / peak_sps. peak_sps is the target
# ceiling (a hand-fused on-GPU training loop). PROVISIONAL for v0 -- it must be
# recalibrated on an idle GPU against the naive reference floor and a real
# PufferLib/Brax-class fused baseline before any published sweep.
peak_sps: 25000000.0

hardware: [RTX_PRO_6000]

# Correctness is the learned return level, not per-element allclose. The
# solution's final-window mean episodic return must land in a band around the
# reference's, proving it implemented the same MDP + PPO and actually learned.
return_band:
  final_window: 5      # iterations averaged for the "final" return
  early_window: 3      # iterations averaged for the "from scratch" baseline
  band_low: 0.30       # sol_final >= ref_final * (1 - band_low)
  band_high: 0.40      # sol_final <= ref_final * (1 + band_high)
  min_improvement: 0.5 # sol_final - sol_early >= min_improvement * ref_final

# A run that no-ops the learning to inflate SPS fails this benchmark-side floor.
benchmark_return_floor: 1.5

forbidden:
  - "gymnasium"
  - "import gym"
  - "pufferlib"
  - "cleanrl"
  - "stable_baselines3"
  - "tianshou"
  - "envpool"
  - "sample_factory"
  - "rllib"
  - "torchrl"
  # --- megakernel mandate (v2): the RL loop must be genuinely fused kernels,
  # not per-step launches or launch-overhead workarounds. These paper over
  # unfused kernels; check.py rejects them (in solution.py and any module it
  # imports).
  - "torch.compile"
  - "CUDAGraph"
  - "cuda.graph"
  - "make_graphed_callables"

# MEGAKERNEL CONSTRAINT (v2): kernel launches must NOT scale with env-steps,
# horizon, or minibatches. The whole rollout (all HORIZON steps x all envs +
# policy + sampling + advantage) runs inside a single persistent kernel launch;
# the PPO update is fused into that launch or a small fixed number of extra
# launches per iteration. Coarse fusion is fine and encouraged (many rollout
# steps and many envs inside one launch) -- the thing being ruled out is a
# per-step / per-minibatch kernel loop. NOTE: string-forbidding graph/compile is
# enforced today; a profiler-based launch-count gate (launches must not scale
# with steps) is the follow-up that makes this airtight.
constraints:
  fused_rollout: true            # all HORIZON steps of a rollout in one launch
  launches_scale_with_steps: false
  max_launches_per_iteration: 8

sota:
  name: "PufferLib (vectorized GPU RL)"
  url: "https://github.com/PufferAI/PufferLib"
  function: ""
  deps: []

num_correct_trials: 3
num_perf_trials: 3
