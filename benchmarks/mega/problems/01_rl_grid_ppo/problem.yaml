name: 01_rl_grid_ppo
display_name: "Grid-Foraging PPO Training Megakernel"
precision: fp32
regime: throughput

# Throughput-graded: score = achieved_sps / peak_sps. peak_sps is the target
# ceiling (a hand-fused on-GPU training loop). PROVISIONAL for v0 -- it must be
# recalibrated on an idle GPU against the naive reference floor and a real
# PufferLib/Brax-class fused baseline before any published sweep.
peak_sps: 25000000.0

hardware: [RTX_PRO_6000]

# Correctness is the learned return level, not per-element allclose. The
# solution's final-window mean episodic return must land in a band around the
# reference's, proving it implemented the same MDP + PPO and actually learned.
return_band:
  final_window: 5      # iterations averaged for the "final" return
  early_window: 3      # iterations averaged for the "from scratch" baseline
  band_low: 0.30       # sol_final >= ref_final * (1 - band_low)
  band_high: 0.40      # sol_final <= ref_final * (1 + band_high)
  min_improvement: 0.5 # sol_final - sol_early >= min_improvement * ref_final

# A run that no-ops the learning to inflate SPS fails this benchmark-side floor.
benchmark_return_floor: 1.5

forbidden:
  - "gymnasium"
  - "import gym"
  - "pufferlib"
  - "cleanrl"
  - "stable_baselines3"
  - "tianshou"
  - "envpool"
  - "sample_factory"
  - "rllib"
  - "torchrl"
  - "import reference"
  - "from reference"
  - "import baseline"
  - "from baseline"

# Fabrication guard (2026-07-01, validated by red-team on the 3090): a return
# curve is unfalsifiable by itself, so benchmark.py enforces mechanical
# plausibility -- random per-trial seeds (memoized curves miss), a per-trial
# return floor, and an SPS cap (sps > max_credible_sps_multiple * peak_sps
# scores 0.0; a no-work fabricator lands ~20,000x). Anything near the cap is an
# audit flag, and the authenticity judge sees a solution with no env/no policy.
max_credible_sps_multiple: 20

# MEGAKERNEL CONSTRAINT (v2.1): kernel launches must NOT scale with env-steps,
# horizon, or minibatches. The whole rollout (all HORIZON steps x all envs +
# policy + sampling + advantage) runs inside a single persistent kernel launch;
# the PPO update is fused into that launch or a small fixed number of extra
# launches per iteration. Coarse fusion is fine and encouraged (many rollout
# steps and many envs inside one launch) -- the thing being ruled out is a
# per-step / per-minibatch kernel loop, and cutting launch overhead WITHOUT
# fusing (CUDA graphs, torch.compile) does not count. This is enforced as a
# JUDGE GATE, not a substring ban: a red-team battery
# (tests/test_megakernel_evidence.py) showed a substring gate on
# "torch.compile"/"CUDAGraph" is both leaky (getattr/importlib obfuscation slips
# past) and brittle (false-positives on honest disclaimer comments). So
# graph/compile are ADVISORY tripwires (framework.txt +
# scripts/megakernel_evidence.py) that feed the post-run authenticity judge,
# which decides from the actual code. The one bright line check.py still
# hard-fails is importing a banned library (AST-matched). See
# docs/megakernel_authenticity_judge.md.
constraints:
  fused_rollout: true            # all HORIZON steps of a rollout in one launch
  launches_scale_with_steps: false
  max_launches_per_iteration: 8
  # authenticity is decided by the judge from evidence, not a substring gate
  authenticity_gate: judge
  advisory_tripwires: [graph, compile, codegen, obfuscation]

sota:
  name: "PufferLib (vectorized GPU RL)"
  url: "https://github.com/PufferAI/PufferLib"
  function: ""
  deps: []

num_correct_trials: 3
num_perf_trials: 3
