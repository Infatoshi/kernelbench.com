name: 02_kimi_linear_decode
display_name: "Kimi-Linear W4A16 Hybrid Decode Megakernel"
precision: int4_bf16
regime: latency

# Score = baseline_latency / solution_latency (speedup over optimized PyTorch),
# geomean over the context-length sweep. Reported in the peak_fraction field as
# a speedup multiple (can exceed 1), NOT a [0,1] roofline fraction. Correctness
# is the next-token hidden vs reference.py within tolerance; the baseline floor
# is baseline.py.
# Correctness is per-step cosine similarity of the next-token hidden (and the
# updated decode state) vs reference, from an IDENTICAL fed state -- not a
# chained trajectory (precision differences compound over autoregressive steps,
# which is a trajectory property, not a kernel error). Cosine sim is robust to
# bf16/fp8 while still rejecting wrong answers (which land near 0).
tolerance:
  cos_sim: 0.98

hardware: [RTX_PRO_6000]

# Forbidden: any prebuilt model / attention / MoE library, and any prebuilt
# int4/W4A16 GEMV kernel -- you must write the fused dequant-GEMV yourself. Plain
# matmul/linear on bf16 is allowed; the point is fusing the int4 unpack into the
# GEMV plus the MLA absorb-vs-materialize choice.
forbidden:
  - "transformers"
  - "flash_mla"
  - "flashmla"
  - "fla.ops"
  - "flash_linear_attention"
  - "vllm"
  - "sglang"
  - "bitsandbytes"
  - "torchao"
  - "marlin"
  - "auto_gptq"
  - "autoawq"
  - "awq"
  - "exllama"
  - "import reference"
  - "from reference"
  - "import baseline"
  - "from baseline"
  # --- megakernel mandate (v2): the scored decode step must be ONE kernel
  # launch. These cut launch overhead WITHOUT fusing, so they are not a
  # megakernel; check.py rejects them (in solution.py and any module it imports).
  - "torch.compile"
  - "CUDAGraph"
  - "cuda.graph"
  - "make_graphed_callables"

# MEGAKERNEL CONSTRAINT (v2): the entire per-token forward must be fused into a
# single custom kernel invoked exactly once per step(). CUDA graphs / compile /
# per-op kernel loops are not a substitute (they hide launches without fusing).
# The graph/compile escape hatches are banned above; one kernel launch per step
# is the mandate. NOTE: string-forbidding graph/compile is enforced today; a
# profiler-based launch-count gate (exactly 1 launch/step) is the follow-up that
# makes this airtight against many-small-kernels solutions.
constraints:
  launches_per_step: 1
  single_kernel: true

sota:
  name: "Kimi-Linear shipped decode kernels (FlashMLA + KDA + grouped MoE)"
  url: "https://huggingface.co/moonshotai/Kimi-Linear-48B-A3B-Instruct"
  function: ""
  deps: []

num_correct_trials: 3
num_perf_trials: 3
