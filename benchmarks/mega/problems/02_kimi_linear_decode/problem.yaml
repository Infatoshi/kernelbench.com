name: 02_kimi_linear_decode
display_name: "Kimi-Linear W4A16 Hybrid Decode Megakernel"
precision: int4_bf16
regime: latency

# Score = baseline_latency / solution_latency (speedup over optimized PyTorch),
# geomean over the context-length sweep. Reported in the peak_fraction field as
# a speedup multiple (can exceed 1), NOT a [0,1] roofline fraction. Correctness
# is the next-token hidden vs reference.py within tolerance; the baseline floor
# is baseline.py.
# Correctness is per-step cosine similarity of the next-token hidden (and the
# updated decode state) vs reference, from an IDENTICAL fed state -- not a
# chained trajectory (precision differences compound over autoregressive steps,
# which is a trajectory property, not a kernel error). Cosine sim is robust to
# bf16/fp8 while still rejecting wrong answers (which land near 0).
tolerance:
  cos_sim: 0.98

hardware: [RTX_PRO_6000]

# Forbidden: any prebuilt model / attention / MoE library, and any prebuilt
# int4/W4A16 GEMV kernel -- you must write the fused dequant-GEMV yourself. Plain
# matmul/linear on bf16 is allowed; the point is fusing the int4 unpack into the
# GEMV plus the MLA absorb-vs-materialize choice.
forbidden:
  - "transformers"
  - "flash_mla"
  - "flashmla"
  - "fla.ops"
  - "flash_linear_attention"
  - "vllm"
  - "sglang"
  - "bitsandbytes"
  - "torchao"
  - "marlin"
  - "auto_gptq"
  - "autoawq"
  - "awq"
  - "exllama"
  - "import reference"
  - "from reference"
  - "import baseline"
  - "from baseline"

# MEGAKERNEL CONSTRAINT (v2.1): the entire per-token forward must be fused into a
# single custom kernel invoked exactly once per step(). CUDA graphs, torch.compile,
# and per-op kernel loops are NOT a substitute -- they cut launch overhead without
# fusing on-chip dataflow. This is enforced as a JUDGE GATE, not a substring ban:
# a red-team battery (tests/test_megakernel_evidence.py) showed a substring gate
# on "torch.compile"/"CUDAGraph" is both leaky (getattr/importlib obfuscation
# slips past) and brittle (false-positives on honest disclaimer comments). So
# graph/compile are ADVISORY tripwires (framework.txt + scripts/megakernel_evidence.py)
# that feed the post-run authenticity judge, which decides from the actual code.
# The one bright line check.py still hard-fails is importing a banned library
# (AST-matched). See docs/megakernel_authenticity_judge.md.
constraints:
  launches_per_step: 1
  single_kernel: true
  # authenticity is decided by the judge from evidence, not a substring gate
  authenticity_gate: judge
  advisory_tripwires: [graph, compile, codegen, obfuscation]

sota:
  name: "Kimi-Linear shipped decode kernels (FlashMLA + KDA + grouped MoE)"
  url: "https://huggingface.co/moonshotai/Kimi-Linear-48B-A3B-Instruct"
  function: ""
  deps: []

num_correct_trials: 3
num_perf_trials: 3
