name: 09_fmha_preattn_mrope
display_name: "Multi-axis RoPE Pre-attention Prep"
precision: bf16
regime: memory  # pointwise rotation + cache gather; bandwidth-bound

# FLOPs per call: rotate-half on q and k.
# Per element: out = a*cos + b*sin -> 3 flops/elem (1 mul + 1 mul + 1 add).
# We do this on q ((B*T*Hq*D) elems) and k ((B*T*Hkv*D) elems).
flops_formula: "3 * B * T * (Hq + Hkv) * D"

# Bytes moved (lower bound):
#   read q, k:                  2 * B*T*(Hq+Hkv)*D
#   read 3 position id arrays:  3 * B*T*8        (int64)
#   read cos/sin from cache:    6 * B*T*D*2      (3 axes, 2 caches, bf16)
#   write q_rot, k_rot:         2 * B*T*(Hq+Hkv)*D
bytes_formula: "4 * B * T * (Hq + Hkv) * D + 12 * B * T * D + 24 * B * T"

hardware: [RTX_PRO_6000]
peak_tflops_key: bf16    # informational; regime=memory uses bandwidth
peak_bandwidth_key: dram

tolerance:
  bfloat16: 0.02

# Forbidden ops -- agent must implement the gather + per-axis mix + rotation.
# Banning vendor mRoPE entry points and obvious shortcuts.
forbidden:
  - "transformers.models.qwen2_vl.modeling_qwen2_vl.apply_multimodal_rotary_pos_emb"
  - "apply_multimodal_rotary_pos_emb"
  - "flash_attn.layers.rotary"
  - "flashinfer.rope"
  - "flashinfer.apply_rope"

sota:
  name: "Qwen2-VL apply_multimodal_rotary_pos_emb (transformers)"
  url: "https://github.com/huggingface/transformers"
  function: "transformers.models.qwen2_vl.modeling_qwen2_vl.apply_multimodal_rotary_pos_emb"

num_perf_trials: 30
