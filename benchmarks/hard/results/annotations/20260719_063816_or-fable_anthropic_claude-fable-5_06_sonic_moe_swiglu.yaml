notes: |
  Strong engineering session. The agent measured (not assumed) every
  alternative and documented why each lost on SM120: Triton warp
  specialization regressed to ~335 TF; CUTLASS SM120-native bf16 collective
  builders static_assert F8F6F4-only (no bf16 path), and SM80-style CUTLASS
  compiled for sm_120a topped out ~370 TF; fp16 accumulation was slower
  (GB202 runs fp32-acc at full rate); TMA descriptors ended up slightly
  behind plain pointer pipelines. ncu showed the tensor pipe 89.5%
  utilized — mma-issue-bound, ~377 TF actual. The headline 0.1052 is
  structurally capped near 1/K = 0.125 for the K=8 shapes because the deck's
  FLOPs formula counts per-token active compute (T_total) while the kernel
  must process T_perm = K*T_total rows; the kernel is near that ceiling.
  Publishable as a clean cell.
