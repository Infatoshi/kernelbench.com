notes: |
  The Model owns persistent `_partial`, `_stats`, `_counters`, and `_output`
  workspaces. Repeated calls on the same stream, including all official checks
  and timing iterations, are safe because kernel launches serialize and the last
  split resets its counter. Separate Model instances are independent. Concurrent
  unsynchronized calls on different CUDA streams using the same Model instance
  would race those shared workspaces, especially because the counter is reset
  before the last block finishes reading partials. This is a general reentrancy
  limitation, not a benchmark exploit: the contract is single-stream forward,
  the benchmark uses one instance on one stream, and every timed forward still
  reads live query/KV/page/length inputs and recomputes the full output.

  result.json retains harness_exit_code=1. The event trace ends with task_complete
  after the Codex session launched its final internal benchmark, without that
  command's result being recorded. Independently, the archive-level harness then
  ran the final full checker and canonical benchmark successfully (both exit 0)
  and classifies the completed cell as failure_reason=pass. This does not weaken
  the correctness or performance evidence above.
