summary: >
  Genuine one-launch CUDA paged-attention decode. Each producer block owns one
  (batch, KV-head, sequence-split), uses four or eight query-head warps to share
  live paged K/V loads, performs fp32 online softmax and value accumulation,
  then publishes fp32 split state. The last arriving split for each
  (batch, KV-head) merges all splits and writes the live bf16 output. The final
  solution contains no CUDA graph replay, output/input cache, distribution
  detector, fabricated result, grader mutation, or forbidden vLLM, FlashInfer,
  or SDPA call. Correctness passed every canonical shape and seed under nominal,
  0.01x-small, and 8x-large query/KV regimes. The canonical 0.5655 is supported
  by the archived solution-only benchmark and independently recomputes from its
  five reported fractions.

evidence: |
  Kernel semantics and numeric stability:
  - solution.py was read end to end (595 lines). paged_split_kernel derives the
    live batch, KV head, split, and GQA query head from blockIdx/warp; loads the
    query and follows block_table to gather each physical KV page. The packed
    [K | V] address arithmetic uses the live kv_cache, num_kv_heads, and page
    mapping rather than assuming contiguous pages or synthesizing values.
  - Lines 129-181 double-buffer eight-token half-pages using authored cp.async
    PTX. Lines 183-253 compute every QK dot in fp32, take an eight-token tile
    maximum, rescale the prior numerator/denominator, exponentiate relative to
    the running maximum, and accumulate the corresponding live V vectors in
    fp32. `token < seq_len` masks the 1535/2000 predicated tails and consumes the
    live seq_lens tensor for every batch element.
  - Lines 261-340 store every split's fp32 numerator/max/sum, then implement the
    standard last-block reduction pattern: every writer completes a device
    fence before its block's ticket, atomics on one counter totally order split
    publication, and only the `num_splits-1` ticket holder reads and merges all
    published state. Split maxima are combined with exp(local_max-global_max),
    and the output is normalized before bf16 conversion.
  - The counter is reset by the last block. The extension launches on PyTorch's
    current CUDA stream, so benchmark repetitions on one stream serialize the
    complete kernel and safely reuse counters/workspaces. The official checker
    exercised 45 forwards (five shapes x three seeds x three numeric regimes)
    and exited PASS. There is no magnitude-dependent or seed-dependent path;
    dispatch depends only on declared constructor shape/head geometry.

