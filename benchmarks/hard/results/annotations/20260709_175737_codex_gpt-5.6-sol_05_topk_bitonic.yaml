      The tightened shape-2 window exposed exactly the failure mode the checker
      is meant to catch: a chunk overflow dropped two valid tail elements for one
      seeded row. I'm keeping the smaller merge but raising that filter threshold
      slightly, which reduces per-chunk occupancy while still retaining roughly
      twice k candidates per row.

implication: >
  Do not publish or rank 0.0826 as GPT-5.6 Sol's valid TopK cell. A valid rerun
  must perform exact selection for arbitrary fp32 contents at the canonical
  shapes, detect candidate overflow and fall back safely, and avoid reduced-bit
  ordering assumptions tied to the evaluator distribution. CUDA graph replay
  may remain if it recomputes current contents, but returned outputs should not
  alias and mutate across independent calls. The honest score requires a rerun
  and cannot be inferred from this archive.
