notes: |
  Not run empirically (B200 remote target per audit instructions); the CUDA
  graph replay argument is structural: capture records kernel launches over
  raw pointers, and replay re-executes the kernel, so outputs necessarily
  track live buffer contents. Persistent workspaces (ws_O, ws_ml, counters)
  are shared per config handle; concurrent multi-stream use of one Model
  instance would race them, but the benchmark contract is single-stream
  single-instance, and counters self-zero after each merge, so all timed and
  checked forwards recompute from live inputs.
