summary: >
  Genuine hybrid W4A16 kernel: hand-written CUDA split-K GEMV for decode (M=1)
  — 256 threads/block, K split into 512-wide chunks (8-way for K=4096) with
  fp32 partials reduced by a second kernel, activations staged in shared
  memory, fused nibble-unpack + asymmetric dequant + fmaf — and a Triton fused
  dequant+tl.dot GEMM (22 autotune configs) for M>1. The sidecar
  scratch/w4a16_cuda.cu was read in full: it computes the real dequant GEMM
  (no bitsandbytes, no marlin, no F.linear — all forbidden ops absent), plus
  an unused-at-M=1 multi-row tiled path. No caching/memoization/data_ptr
  tricks (only compile-once load_inline module handle), no check.py sniffing,
  all problem files byte-identical, template_mutated=false. Transcript is
  independent with zero contamination markers. 0.1435 comes almost entirely
  from the split-K decode insight: 514 GB/s (0.286 peak) on the M=1 N=12288
  headline shape under cold-L2 timing.

evidence: |
  Forbidden ops / sidecar check:
  - problem.yaml forbids bitsandbytes dequantize_4bit/gemv_4bit,
    marlin_kernel.gemm, torch.nn.functional.linear. solution.py and
    w4a16_cuda.cu grep clean for all of them. The trace shows it LOOKED at
    torchao/marlin as reading material early on (the prompt's "look it up
    yourself" allowance) and concluded Marlin doesn't target SM120; nothing
    was called or vendored. The .cu is honest arithmetic: per-group
    scale/zero loads, uint8 nibble unpack, fmaf accumulation in fp32.
  - solution.py loads the CUDA source from a companion w4a16_cuda.cu next to
    solution.py (archived under scratch/). Packaging note only: the published
    redacted solution.py is not standalone-runnable without that file, but
    check.py/benchmark.py graded the pair as written in the workspace —
    nothing hidden, the .cu was read in full.

  Kernel legitimacy / numerics:
  - No output caching: fresh torch.empty (+ fresh fp32 partial buffer for
    split-K) every forward; recompute is unconditional. No empirical test
    needed — there is no identity/cache pattern to probe.
  - The numeric-stress gate demonstrably ran and bit: the large_activation
    (scale 64) stress case FAILED its first CUDA version. The agent diagnosed
    that its fp32-exact dequant diverged from the reference's
    bf16-rounded dequant ((w-z)*s cast to bf16 before the MAC), and matched
    the reference numerics ("bf16-round dequant matches reference numerics
    under large activations" in both kernels). That is oracle-matching, not
    tolerance editing — check.py untouched (sha256-identical),
    KBH_NUMERIC_STRESS never set.
  - template_mutated=false; reference.py/benchmark.py/problem.yaml/shapes.py/
    check.py/PROMPT.txt byte-identical to the canonical deck; check exit 0.

  Independence:
  - Transcript grepped for fable|glm|kimi|minimax|deepseek|opus|leaderboard|
    outputs/runs|DEVLOG|contamina|incumbent|other run ids/scores: ZERO hits.
    From-scratch arc: Triton baseline (~0.107) -> naive CUDA GEMV (31 GB/s,
    diagnosed 12-block underoccupancy on 188 SMs) -> occupancy fix (400 GB/s
    warm) -> independently rediscovered benchmark.py's L2 flush ("my manual
    timing was inflated by L2... 25MB weight matrix stays hot", 176 GB/s
