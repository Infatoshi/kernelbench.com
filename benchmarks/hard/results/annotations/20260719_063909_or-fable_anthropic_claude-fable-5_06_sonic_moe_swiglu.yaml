notes: |
  Kernel quality: the strongest engineering seen on this problem - a from-
  scratch CuTe DSL persistent 2-CTA tcgen05 kernel with fused SwiGLU epilogue
  and a custom _domain_offset_aligned dsl_user_op to preserve pointer
  alignment for vectorized predicated stores (default cute.domain_offset
  drops alignment and forces scalar stores). The packed gate|up 128-column
  interleave halves A reads and keeps both projections in one MMA tile; the
  (T_perm, 2I) intermediate of an unfused implementation never materializes.
  Score is honest low: shape 1 (small, weight-bound) hits 0.116, the two
  large T_perm shapes sit near 0.08 against the dense bf16 peak - the
  per-expert tile quantization and epilogue store path leave room, but this
  is a real kernel measured at its real speed. CUDA-graphing the launch
  inside forward() is aggressive timing hygiene, not a hack: replay
  recomputes on live data (empirically proven above) and the graph key
  includes every buffer pointer plus the packed-weight version chain.
  Publishable.
