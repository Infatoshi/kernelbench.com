notes: |
  Low score is real capability, not measurement noise: on the decode shape
  (M=1 N=12288 K=4096, ~27 MB of weight traffic) the kernel takes 0.125 ms
  where the 8 TB/s roofline implies ~3.4 us - it achieves ~214 GB/s, ~40x
  off DRAM peak. Context for the B200 deck: every B200 w4a16 cell to date is
  low against the 8 TB/s HBM3e denominator (best observed: claude-fable-5 at
  0.107; this run 0.0178; kinetic-0715[1m] 0.0264), so the ceiling is
  aggressive for everyone - but fable's 6x-higher cell on the same GPU shows
  the ceiling is readable and this is simply an under-optimized kernel from
  a short session, not a structurally unreadable roofline. The same model's
  RTX PRO 6000 sibling run (identical run id, different box) scored 0.1143
  with a 180-line variant of the same design and a longer autotune sweep.
