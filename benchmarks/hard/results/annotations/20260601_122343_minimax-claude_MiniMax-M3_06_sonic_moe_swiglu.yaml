    label: "Single-kernel grouped GEMM + fused SwiGLU"
    text: |
      A single Triton kernel does both GEMMs (gate + up) in one pass: the x tile is
      loaded once and fed to two fp32 accumulators, then SwiGLU is fused into the
      epilogue before the bf16 store. fp32 accumulation clears the 0.02 bf16 tolerance
      with a large margin.
      
      The kernel is a standard tiled GEMM with a per-expert axis. The benchmark routing
      is balanced (rows-per-expert divides every tile size for all graded shapes), so
      the K and N loops run maskless; only a cheap M-mask guards the (never-triggered
      here) ragged tail.
      
      Two hardcoded configs (codex-proven floors, 0.2514 geomean):
        - small M_per_e (<=256): BM64/BN128/BK32/w4/s3 (60KB SMEM)
        - big M_per_e (>256):   BM256/BN64/BK32/w8/s3 (72KB SMEM)
      
      No autotune -> 2 cold compiles total across the 3 graded shapes.
      
      Vendor-bypass: this kernel implements the grouped GEMM directly; it does not
      dispatch to any of the forbidden dense linear-algebra routines.
