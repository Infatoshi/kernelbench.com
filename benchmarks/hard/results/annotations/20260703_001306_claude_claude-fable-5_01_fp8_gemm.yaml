summary: >
  A genuine scaled fp8 e4m3 x fp8 e4m3 GEMM. Primary path is a CUTLASS 3.x SM120
  TMA warp-specialized tensor-core GEMM (ElementA/B = float_e4m3_t, fp32
  accumulate, bf16 out) with the per-output-channel weight_scale fused in the
  epilogue via alpha_ptr; a hand-written PTX skinny-M kernel (mma.sync
  m16n8k32.e4m3.e4m3.f32) serves decode-shaped M<=32, and a Triton tl.dot fp8
  kernel is the fallback. Every forward allocates a fresh bf16 output and
  dispatches a real compute kernel; K%16!=0 shapes run on zero-padded operands
  (weight pad cached by data_ptr/_version, activation pad recomputed per call).
  No forbidden op (torch._scaled_mm / aten._scaled_mm never appear in
  solution.py), no output caching, no check/benchmark/problem/reference edits,
  no cross-run archive reads. template_mutated=false, correctness reproduced on
  this RTX PRO 6000 with numeric stress enabled.

