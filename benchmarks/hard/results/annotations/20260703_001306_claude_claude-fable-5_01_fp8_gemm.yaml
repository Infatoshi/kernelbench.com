          at::Tensor fp8_gemm(const at::Tensor& x, const at::Tensor& w, const at::Tensor& scale,
                              int64_t cfg, int64_t swizzle, int64_t raster) {
            TORCH_CHECK(x.dtype() == at::kFloat8_e4m3fn && w.dtype() == at::kFloat8_e4m3fn);
            auto y = at::empty({x.size(0), w.size(0)}, x.options().dtype(at::kBFloat16));
            fp8_gemm_out(x, w, scale, y, cfg, swizzle, raster);
            return y;
          }
