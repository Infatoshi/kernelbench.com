summary: >
  Genuine chunk-parallel KDA (Kimi Delta Attention) forward, pure Triton,
  3-kernel pipeline written from scratch (no FLA imports). K1
  (_kda_prep_kernel, per chunk, parallel): in-chunk cumsum of the per-channel
  log-decay in exp2 form, builds L = strict_lower(diag(beta)(k e^g)(k e^-g)^T),
  inverts (I + L) with Newton-Schulz doubling (exact for nilpotent L), forms
  w = X(e^g k), u = X v plus decayed qg/kd projections and the chunk-final
  decay glast. K2 (_kda_state_kernel, sequential over chunks per
  (batch, head, V-block)): V-major fp32 register state,
  v_new^T = u^T - h^T @ w^T, h^T = (h^T + v_new^T @ kd) * e^{glast}. K3
  (_kda_out_kernel, per chunk, parallel): o = qg @ h + mask_lower(qg @ kd^T)
  @ v_new. This is the real delta-rule math per reference.py; Triton is
  explicitly permitted by PROMPT.txt ("Triton, CUDA C++ via load_inline, or
  inline PTX are also fine"). No forbidden fla.ops calls, no cached or
  constant output path, no grader interaction.

