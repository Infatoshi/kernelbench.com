summary: "Wrong-answer bug: pass-2 row indexing uses the wrong K. Pass 1 writes per-chunk candidates with row stride chunks_per_row*k (k=16), but pass 2 is dispatched with a template K rounded up from max_candidates (e.g. K=32 at 128 candidates), so it computes real_count=chunks_per_row*32 and in_base=row*real_count, reading misaligned candidate memory for every row>0. Shape 3 (batch=16,n=12000,k=16) fails with 227/256 mismatched (max_abs_diff 1.48, worst row 7); single-row shapes pass because row 0 is unaffected."
