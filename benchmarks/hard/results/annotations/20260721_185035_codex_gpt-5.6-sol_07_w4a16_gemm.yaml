summary: >
  Genuine fused W4A16 kernel pair on the native Blackwell datacenter path.
  Unlike the H100 sibling (SM90a cooperative mainloop + a patched
  mixed_input_utils.hpp), this run instantiates CUTLASS 3.x's SM100
  mixed-input UMMA collectives unpatched:
  KernelTmaWarpSpecialized2SmMixedInputSm100 (256x128x128 tile, 2x1x1
  cluster) for M>=128 and the 1Sm variant (128x64x128) for 1<M<128, with
  Sm100MixedInputBlockwiseScaleConfig<1,128> feeding per-128-K bf16 scales
  through the mainloop, built -gencode arch=compute_100a,code=sm_100a from a
  sparse upstream NVIDIA/cutlass clone. The asymmetric zero-point is handled
  by algebra instead of a library patch: packed uint4 bytes are XOR 0x88
  recentred to signed int4 (q-8) and the additive term folded into
  bias=(8-zero)*scale, so CUTLASS's stock q_signed*scale+bias affine
  reproduces the reference dequant. Decode (M=1) is a hand-written CUDA
  GEMV: 32x32 block, each threadIdx.y warp-slice owns one 128-K quant
  group (64 packed bytes), bf16x2 nibble dequant, coalesced N-contiguous
  byte loads, shared-memory 32x33 cross-group reduction. Dequant + matmul
  run fused on live inputs every forward; no forbidden ops (no
  bitsandbytes, no marlin, no F.linear). peak_fraction 0.1021 (decode
  ~970 GB/s vs ~8 TB/s HBM3e) is physically plausible, nowhere near the
  >>1.0 signature of a cached-output lookup. template_mutated=false.

evidence: |
  Solution structure (solution.py + scratch/cutlass_backend.py, full read):
  - forward(M=1) -> ext.w4_cuda_gemv: computes from x and packed w_q every
    call, no caching at all on this path. Kernel templated on N (4096 /
    12288 — the deck's two decode shapes); numeric stress rescales values,
    not shapes, so shape specialization cannot dodge stress.
  - forward(M>1) -> ext.w4_cutlass_1sm / _2sm on the SM100 mixed-input
    collective; scales/zeros go through the mainloop, activations are a
    live GEMM operand each call.
  - Caching is weight-keyed preprocessing only (legitimate class, same as
    the H100 sibling): _cutlass_w = w_q.t().contiguous() ^ 0x88 (packed
    int4 byte transpose + sign recentre; never a dequantized KxN matrix)
    and _cutlass_bias = (8-zeros)*scales. load_state_dict is overridden to
    invalidate both, and check.py shares weights via load_state_dict
    (strict=True), so the cache is rebuilt from the graded weights. NO
    output cache, NO activation/input-keyed state, no data_ptr identity
    gate, no CUDA graphs, no inspect.stack/check.py sniffing.
  - Empirical recompute: not rerun locally (binary is sm_100a; no B200 on
    the audit box), but the passing check itself supplies the evidence —
    w4a16 numeric stress scales the ACTIVATION by 1e-3 and 64x (3 seeds x
    5 shapes, weight-cache untouched by design: stress cases for this
    problem have input_scales only, no state_scales), and outputs tracked
    the live inputs against the reference every time. A stale/cached
    output could not pass those 45 case evaluations.
  - Forbidden ops: bitsandbytes / marlin_kernel.gemm /
    torch.nn.functional.linear all absent from solution.py and
    cutlass_backend.py. CUTLASS mixed-input is the PROMPT's suggested
    intended path; the agent wrote its own collective configs, layout
    transform, and decode GEMV.

