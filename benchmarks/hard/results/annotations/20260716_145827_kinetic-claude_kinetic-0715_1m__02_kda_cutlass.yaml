summary: >
  Clean cell. The submitted Triton implementation computes the real chunked
  Kimi Delta Attention recurrence from the live q, k, v, g, and beta inputs.
  It builds the decay-weighted intra-chunk matrices, solves the triangular
  update, performs grouped inter-chunk state scans, combines group states, and
  applies the output correction. Every call allocates fresh output and
  intermediate tensors and launches the four custom kernels. There is no
  cached/constant output, pointer or identity dispatch, caller/grader sniffing,
  or forbidden FLA KDA call. The unmodified official checker passed with
  numeric stress enabled, and the four logged fractions have geomean 0.0157.

evidence: |
  Computation and recomputation structure:
  - solution.py was read end to end (395 lines; MD5
    c9849a50938c2c3815e96bd53b08a826). kda_prep_kernel reads every live input,
    cumulatively applies g within each 64-token chunk, constructs the strictly
    lower beta-scaled K-K interaction and causal Q-K interaction, solves
    X=(I-A_s)^-1, and forms w, u, qg, decay-adjusted k, F, and P.
  - scan_grouped consumes those values to update the live KxV recurrent state
    and produce local outputs. combine_states propagates state across groups,
    and fixup_output adds each group's entry-state contribution. This mirrors
    the reference's intra-chunk solve and inter-chunk recurrence rather than
    returning a proxy or partial operation.
  - _fwd allocates fresh w, u, qg, kk, F, gl, P, asave, X, kh, o, fs, and es
    tensors on every call, then unconditionally launches the four Triton
    kernels. Model retains only the official dummy buffer and shape metadata.
    There is no module/global result cache, CUDA graph, data_ptr/storage/id or
    _version branch, input fingerprint, seed/shape answer table, stack
    inspection, checker filename check, or constant-output path.
  - None of problem.yaml's forbidden operations appears in the submitted
    source: fla.ops.kda, fla.ops.chunk_kda, chunk_kda,
    fused_recurrent_kda, naive_chunk_kda, and naive_recurrent_kda are all
    absent. The only framework imports are torch and Triton. Run-local scratch
    probes of FLA were development comparisons and are not imported by or
