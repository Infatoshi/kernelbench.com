    (both dev scratch), and solution.py. No Write/Edit targets check.py,
    benchmark.py, reference.py, shapes.py, problem.yaml, or PROMPT.txt; the
    workspace copies of check.py and benchmark.py are byte-identical (cmp) to
    problems-h100/06_sonic_moe_swiglu, and result.json records
    template_mutated=false.
  - Every outputs/runs path in the transcript refers to this run's own
    directory (its bin/ wrappers and workspace); no foreign run id, no read of
    another run's solution or trace. The two sed -i commands edit the agent's
