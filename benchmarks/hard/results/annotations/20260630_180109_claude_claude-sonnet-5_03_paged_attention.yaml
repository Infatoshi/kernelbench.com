summary: >
  Manual audit of the headline cell (highest peak fraction). Genuine Triton
  flash-decoding kernel: split-K decode does an online (streaming) softmax over
  each sequence's KV pages, gathering the paged KV cache through block_table
  (grid = num_kv_heads x splits x batch), all query heads of a GQA group handled
  by one program so each page is read from HBM once; a second reduce kernel
  merges splits via log-sum-exp (skipped when NUM_SPLITS==1). Real math (tl.dot
