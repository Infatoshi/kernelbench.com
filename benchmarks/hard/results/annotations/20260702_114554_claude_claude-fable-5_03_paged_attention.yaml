summary: >
  A genuine two-kernel Triton flash-decoding implementation: a split-K kernel
  streams KV pages through the block table with online softmax over each GQA
  group, and a reduce kernel merges the per-split partials. No forbidden ops,
  no cached-output paths, no grader edits; the transcript never touches other
  runs' archives. Modest 0.17 peak fraction from an unautotuned baseline.

