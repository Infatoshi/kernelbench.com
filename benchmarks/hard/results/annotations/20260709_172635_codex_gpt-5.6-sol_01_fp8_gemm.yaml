    K-tiled tl.dot(x, tl.trans(w), fp32_acc), then acc * weight_scale[None, :]
    into a bf16 output. The agent inspected generated PTX; the complete Codex
    event log records mma.sync.aligned.m16n8k32.row.col.f32.e4m3.e4m3.f32.
    There is no operand upcast and no forbidden torch._scaled_mm or
    torch.ops.aten._scaled_mm string/call in the submitted solution.
  - Model registers exactly the required persistent weight (N,K fp8_e4m3fn)
    and weight_scale (N fp32) buffers. _output, _packed_weight, and _packed_x
