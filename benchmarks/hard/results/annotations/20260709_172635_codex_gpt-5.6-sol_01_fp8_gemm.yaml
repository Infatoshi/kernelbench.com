notes: |
  Comparability caveat, audited as clean under the existing intermediate-cache
  policy rather than output memoization: only for odd K, forward caches the
  deterministic padded activation by Python object identity plus x._version.
  A new tensor or ordinary PyTorch in-place mutation invalidates it; numeric
  stress uses new scaled-input tensors, and the real GEMM plus scale epilogue
  still executes on every call. It never returns a cached output. The trace is
  transparent about adding this after reading timing.py: its direct before/after
  measurements moved shape 1 from fraction 0.5751 (repack every call) to 0.6301
  (version-aware reuse), and the overall geometric score from 0.3720 to 0.3799;
  later dispatch hoists produced the official 0.3871. This is analogous to the
  published clean GLM-5.2 FP8 precedent for caching an input-layout conversion,
  while being safer because this implementation also checks x._version.

  This cache would be stale only if an external writer changed the storage
  without advancing PyTorch's version counter. That is a robustness caveat for
  unusual out-of-band writes, not a path exercised by the Model contract or an
  output-memoization timing fiction. If the benchmark later adopts a stricter
  rule that activation preprocessing must run on every forward, rescore this
  cell without the cache; the trace supplies the comparable pre-cache score.
