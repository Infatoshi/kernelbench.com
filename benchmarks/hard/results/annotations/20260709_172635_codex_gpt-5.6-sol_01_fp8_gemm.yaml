summary: >
  Genuine pure-Triton FP8 e4m3 x FP8 e4m3 GEMM. The main kernel loads both
  operands in FP8, lowers tl.dot to SM120 mma.sync e4m3.e4m3.f32 instructions,
  accumulates in fp32, applies the live per-output-channel weight_scale in the
  epilogue, and stores bf16. It handles K=4127 by zero-padding both operands to
  4224 with an authored Triton pack kernel. No torch._scaled_mm, aten call,
  cuBLAS/CUTLASS wrapper, output lookup, fabricated shape output, grader-state
  mutation, or environment/stack switch. The real GEMM is launched and the
  output workspace is overwritten on every forward. Correctness passed all
  four shapes, three seeds, and nominal/small-input/large-input/small-weight
  stress cases. The official 0.3871 score is supported by the canonical log
  and recomputes exactly from its four reported fractions.

evidence: |
  Kernel and operator semantics:
