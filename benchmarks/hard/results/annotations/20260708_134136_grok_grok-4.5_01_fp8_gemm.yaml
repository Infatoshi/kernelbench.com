summary: >
  Clean rerun of the contaminated sibling 20260708_132148 (0.4146, excluded:
  that run executed on the host and read fable's CUTLASS SM120 solution and
  glm-5.2's pad-cache trick from the shared outputs/runs archive). This rerun
  ran in a container with the archive unmounted, and the transcript confirms
  independent work end to end: zero references to fable, glm, other run ids,
  outputs/runs paths, the leaderboard, or incumbent scores. The kernel is a
  genuine pure-Triton fp8xfp8 tensor-core GEMM (TMA descriptors + tl.dot,
  fp32 accum, fused per-channel weight_scale, bf16 out), no torch._scaled_mm,
  no output caching, no check.py sniffing. 0.3367 is the honest
  archive-blind score; per-shape 0.6036 / 0.4757 / 0.0680 (skinny
  bandwidth-wall, same as every model) / 0.6578.

evidence: |
  Independence / container isolation held:
  - Transcript (grok streaming thought/text tokens, no tool calls recorded)
    grepped for fable|glm|kimi|minimax|deepseek|leaderboard|outputs/runs|
    incumbent|previous solution|0.41|0.4098|contamina: ZERO hits. The prose
    narrates a from-scratch arc (reference read -> naive Triton 0.245 ->
    discovers L2-cold timing in benchmark.py -> pads odd K for TMA -> cold-L2
    autotune -> ncu occupancy analysis -> 0.3367). No target score was ever
    named before measuring, unlike the sibling ("Checking leaderboard scores"
    to set a 0.35-0.43 target).
  - The CUTLASS exploration it did do used only container-image paths:
    /opt/pytorch/pytorch/third_party/cutlass/examples/70_blackwell_gemm,
    /usr/local/lib/python3.12/dist-packages/flashinfer/data/cutlass,
    /usr/include/cutlass — all inside nvcr.io tensorrt-llm, not the archive.
    It compiled an SM120 CollectiveBuilder kernel, measured it competitive
    with Triton (~608 TF hot on shape 0), then DROPPED it because the
    cutlass header paths might not exist in the scoring environment —
    conservative, the opposite of the sibling's lifted-config shortcut.
  - Approach overlap with the sibling (Triton TMA + tl.dot, K padded to
    16-byte alignment, small BLOCK_M for skinny M) is independently derived
    convergence on standard fp8-GEMM structure; the sibling's two lifted
    load-bearing ideas are ABSENT here: no CUTLASS path in the shipped
    solution, no CUDA graphs, and crucially no pointer-keyed pad cache.

  Kernel legitimacy:
  - solution.py (154 lines) read end to end: single Triton kernel, TMA
    TensorDescriptor loads, tl.dot on float8e4nv (lowers to
    mma.sync...e4m3.e4m3.f32 — verified by the agent via PTX inspection),
    fp32 accumulator, per-column weight_scale epilogue, bf16 store. No
    torch._scaled_mm / aten._scaled_mm (forbidden ops absent), no check.py
    or stack sniffing, no tolerance edits.
  - Pad buffers (_a_pad/_b_pad for K=4127) are allocated once but COPIED
    EVERY forward — explicitly commented "Weight is re-copied every call so
    numeric-stress in-place mutations stay correct." The transcript shows the
    agent tried the data_ptr/fingerprint cache (the trick the sibling lifted
    from glm), hit a small_weight stress FAIL plus a device-host-sync
    concern, and abandoned it. It also caught and rejected its own
    output-buffer-reuse idea as a correctness bug ("if the caller keeps a
    reference... correctness between sequential calls could break").
  - Empirical recompute test (archived workspace, run-local Triton/CUDA
    caches, GPU0 idle): for all three path classes (M=4096 K=4096 CUTLASS-
    class tile, M=2048 K=4127 padded path, M=32 skinny path), overwrote the
    SAME input buffer in place -> output changed and matched a float
    reference (max_err <= 0.052, well under 0.2 tol); then rescaled weight
    IN PLACE (the numeric-stress pattern) -> output tracked the new weights
    (max_err <= 0.026). No stale-cache behavior anywhere — strictly cleaner
    than the sibling, which reused a stale pad on in-place input at K=4127.
  - template_mutated=false; check.py sha256-identical to the canonical deck
    copy, and reference.py/benchmark.py/problem.yaml/shapes.py byte-identical.
    check exit 0 PASS with numeric stress on (KBH_NUMERIC_STRESS never
    mentioned or set; check.py unmodified so stress ran by default — and the
    agent's mid-run small_weight stress FAILURE proves the stress cases were
    live and actually caught a bug it then fixed honestly).

notes: |
  Trace color: the model independently rediscovered that benchmark.py flushes
  L2 before each timing ("There's an L2 flush before each timing! ... we're
  measuring cold-cache performance") and re-tuned all tile configs under
  cold-L2, which is where most of its gain over the naive 0.245 came from.
  It ran ncu, read register/occupancy stats (216 regs/thread -> 2 CTAs/SM on
  188 SMs), and reasoned about SM fill for the skinny shape. One benign
  oddity: it noticed check.py's framework-labeling regex classified its
  solution as "ptx" because a comment mentioned mma.sync, and reworded its
  own comment so framework.txt says "triton" — cosmetic metadata for stats,
  not grader tampering (check.py untouched).
  Scoreline context: 0.3367 vs the excluded sibling's 0.4146 — the ~0.08 gap
  is exactly the two lifted ideas the sibling had (fable's CUTLASS SM120
  config on the big shapes, glm's pad-out-of-the-timed-path trick on K=4127).
