notes: |
  Kernel quality is high: real SM100 tcgen05 work, not a library call —
  CUTLASS collective builders instantiated directly with a custom EVT scale
  epilogue, per-shape variant selection (2SM cluster for compute shapes, 1SM
  small-tile for decode HBM streaming), and a byte-wise Triton pad kernel for
  the K=4127 off-alignment shape. Compute shapes hit 1.6-2.2 PFLOPS
  (0.36-0.50 of the 4500 TF dense fp8 peak). The decode shape (M=32) runs at
  1922 GB/s — essentially HBM-bound, so its 0.027 frac is a roofline
  structural artifact shared by every model, and it is what drags the geomean
  to 0.211. The solution also self-heals its environment (detects the broken
  PATH nvcc wrapper, locates a real CUDA_HOME, clones CUTLASS v4.0.0 if the
  checkout is missing) — robustness engineering, not grader interference.
