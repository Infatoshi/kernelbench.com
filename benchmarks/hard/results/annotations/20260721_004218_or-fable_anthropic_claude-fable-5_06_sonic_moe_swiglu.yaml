summary: >
  Genuine fused MoE up-projection: Triton persistent grouped GEMM with
  interleaved gate/up weights, device-side tile schedule from expert_offsets,
  TMA loads, fp32 tl.dot, and silu(gate)*up epilogue (tanh.approx sigmoid).
  CUDA-graph cache is keyed by (x.data_ptr, offs.data_ptr, x.shape, w_key) and
  on hit calls graph.replay() then returns the same out buffer — that is live
  recompute on fixed addresses, not stale output memoization. Weight interleave
  cache is keyed by data_ptr + _version for both W_gate and W_up. No forbidden
  ops, no cross-run contamination, no grader/tolerance/stress bypass.
