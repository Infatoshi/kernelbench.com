summary: >
  Genuine fp8 x fp8 Triton tl.dot GEMM with fp32 accumulate, per-channel scale
  epilogue, bf16 output. Distinguishing find: tl.dot(...,
  max_num_imprecise_acc=16/32) - fp8 fast-accumulation - which the agent
  measured as a 55% kernel speedup on SM100 and validated against the numeric
  stress cases. K zero-padded to BLOCK_K with the padded weight cached and
  invalidated via tensor._version AND data_ptr (invalidation only - verified
  empirically to recompute on in-place mutation); x is copied into its pad
  buffer every call, so no output memoization. Shape-specific fixed tiles
  (fat 128x256x128 vs decode-skinny 16x128x512). The thought stream twice
  explicitly REFUSED to read sibling runs' archives ("reading other runs is
  contamination. I should clone cutlass myself"). 0.1413 geomean, the best of
  the three audited B200 fp8 cells, honest.

evidence: |
  Solution structure (solution.py, 174 lines, read end to end):
  - _fp8_gemm_kernel: grouped-swizzle tl.dot GEMM on fp8 operands with
    max_num_imprecise_acc (IMP=16 fat / 32 skinny), scale epilogue, masked
    bf16 store. tl.trans(b) so the weight streams in its native (N, K) layout.
  - _padded_weight caches only the zero-padded copy of the graded weight,
    invalidated when weight._version OR weight.data_ptr() changes - the
    data_ptr use is a cache-invalidation KEY (stricter, never a skip-compute
    path). _padded_x copies x into the pad buffer on EVERY call. self._out is
    allocation reuse of the output buffer; the kernel fully rewrites it each
    call. No CUDA graphs in the final solution (tried and dropped in-session).
  - No torch._scaled_mm / aten._scaled_mm; no inspect/_getframe; no stack or
    check.py sniffing.

  Empirical recompute test (live B200, archived run workspace + hard .venv,
  2026-07-19, shapes M=4096 K=4127 pad-cache path and M=32 out-reuse path):
  - Overwrote the SAME x buffer in place (copy_): output changed and matched
    the reference recomputed on the new data within the 0.2 tolerance.
  - Overwrote weight + weight_scale in place: output tracked the new weights,
    so the _version/data_ptr invalidation works.
  - Fresh tensor at a new address also correct. VERDICT: RECOMPUTE-CONFIRMED.

  Transcript scan (grok stream-json logs only thought/text token fragments -
  NO tool call/result events - so the raw jsonl was reassembled into flat
  prose and read end to end, and artifact evidence was used for tool
  activity):
  - Zero foreign run ids, zero outputs/runs or annotations references in the
    reassembled text (also confirmed by a second scanning agent on the raw
    file). Two explicit refusals in the thought stream: "I need to be careful
    about contamination - I shouldn't copy other runs' solutions" and
    "There's cutlass cloned in another run's directory - but reading other
    runs is contamination. I should clone cutlass myself if needed."
  - The agent DID know the published leaderboard best (~0.2535 peak fraction
    on B200) and used it as a target. Score awareness, not solution access;
    the number is public site data. No evidence of reading any sibling
    solution, and the shipped kernel's design lineage is fully visible in its
    own probe files (scratch/: probe_imprecise, probe_tail, probe_pad,
    probe_tma, probe_mma, sweep_cfg).
  - Template integrity: all six template files byte-identical to the run
    workspace; result.json template_mutated=false; KBH_NUMERIC_STRESS never
    referenced; framework.txt: triton (allowed on hard).
  - Flywheel: the trace narrates many check/benchmark iterations (PASS ->
    0.12 -> 0.1423 -> 0.1583 -> final ~0.147 contended) with real diagnosis
    (K-tail 3.87ms vs pad 0.09ms probe; L2-flush discovery; split-K atomics
    bug found and reverted; CUDA graphs tried, measured slower, dropped).
    gpu_lock.log shows only the final check.py/benchmark.py through the lock
    wrapper - the agent bypassed the PATH wrappers for iteration (it
    prepended /usr/local/cuda/bin to fix the nvcc wrapper) - a known harness
    caveat, and moot for grading since the published number comes from the
    isolated sequential rebench.

  Official measurement integrity:
  - check.log and rebench_check.log: PASS (stress cases exercised the
    imprecise-acc path; agent explicitly re-ran check after adding IMP
    "carefully - imprecise acc might break correctness under stress").
  - Isolated sequential rebench: 0.1413 geomean; per-shape frac
    0.2785 / 0.2437 / 0.0146 / 0.4027. In-run 0.1407 - no contention
    inflation.

notes: |
  Best of the three B200 fp8 cells, and the win is one flag: it was the only
  model to find tl.dot's max_num_imprecise_acc (fp8 fast-accum, the same trick
  cuBLAS fast-accum uses) - 1879 vs 1211 TFLOPS in its probe, then validated
  under numeric stress rather than assumed. Also the only run to
  empirically map the benchmark's L2-flush methodology ("we're measuring
  cold-cache HBM bandwidth") and to notice GPU co-tenants (~38 GB held by
  sibling jobs) skewing its in-run numbers. Its best skinny result (0.0146)
  came from a fat-BLOCK_K=512 streaming config, still the structural floor.
  Grok's transcript format logs no tool calls - future grok audits must
  reassemble the token stream and lean on scratch/ + gpu_lock.log artifacts.
  Published number is the clean sequential rebench per the standing
  2026-07-19 rule.
