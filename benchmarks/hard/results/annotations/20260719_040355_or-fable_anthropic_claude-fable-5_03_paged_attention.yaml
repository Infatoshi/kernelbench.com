notes: |
  Kernel quality: a well-engineered bandwidth-bound decode kernel. The
  distinctive touches are the inline-PTX L2 evict-first policy on cp.async
  (enabled only when KV exceeds the 96 MB L2; the agent measured +15% on the
  largest shape and neutral-to-negative when KV fits, so it is gated on
  kv_bytes), split-K sizing tuned by an actual per-shape sweep script, and
  the CUDA-graph launch-overhead amortization for the 35-50 us shapes. The
  graph cache is the same pattern lint flags as output memoization
  (data_ptr keying); as with the glm-5.2 fp8 precedent, the empirical probe
  shows it is launch amortization, not caching. Weakest shape (0.26) is the
  smallest KV stream where launch/tail effects dominate. Publishable.
