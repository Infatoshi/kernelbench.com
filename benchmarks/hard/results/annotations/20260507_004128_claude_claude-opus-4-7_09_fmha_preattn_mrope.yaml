      __global__ void mrope_fused_kernel_v4(
          const __nv_bfloat16* __restrict__ sin_cache,
          __nv_bfloat16* __restrict__ q_out,
          __nv_bfloat16* __restrict__ k_out,
          int B, int T)
      {
          // ...
          int d_low = tid * VEC;
          int d_high = d_low + HALF;
          int pair_idx = d_low;

          int bt = b * T + t;
          int64_t pos;
          if (pair_idx < S0) {
              pos = pos_t[bt];
          } else if (pair_idx < (S0 + S1)) {
              pos = pos_h[bt];
          } else {
              pos = pos_w[bt];
          }

          int cache_off = (int)pos * D + d_low;
          __nv_bfloat162 c2 = *reinterpret_cast<const __nv_bfloat162*>(cos_cache + cache_off);
          __nv_bfloat162 s2 = *reinterpret_cast<const __nv_bfloat162*>(sin_cache + cache_off);

implication: >
  72% of bandwidth peak on a memory-bound kernel — the gather, the per-axis
