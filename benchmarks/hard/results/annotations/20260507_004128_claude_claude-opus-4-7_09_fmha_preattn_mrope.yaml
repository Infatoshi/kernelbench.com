summary: >
  Top finisher on 09. Hand-written CUDA via cpp_extension.load_inline with a
  fully fused mRoPE kernel: per-axis cos/sin gather, mrope_section slicing
  decided per-pair-index inside the kernel (not via three masked passes),
  __nv_bfloat162 vectorized loads, and the (B,T,H,D) → (B,H,T,D) transpose
  fused into the output store. No external libraries beyond standard CUDA.

