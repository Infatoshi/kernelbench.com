evidence: |
  pf=0.0 is real and confirmed: benchmark.log shows all four shapes ran
  (variant=solution, exit 0) at 94-292 ms each, ~0.02 TFLOPS, so each
  shape rounds to solution_peak_fraction=0.0000. The kernel is correct
  but catastrophically slow, not a benchmark failure.
  Solution (read end to end) is pure eager PyTorch chunked KDA: fp32
  upcast, per-chunk cumsum-decay, an O(BT)=64-iteration Python loop of
  einsums to build the intra-chunk A matrix, a sequential forward
  substitution loop over BT, and a recurrent inter-chunk state loop over
  NT with another 64-iteration einsum loop inside. Docstring admits it:
  "Triton optimizations will be added after verification." Real compute
  every call; no caching, no data_ptr checks, no CUDA graphs, no
  memoization. Forbidden ops absent (no fla.ops.kda / chunk_kda /
  fused_recurrent_kda anywhere).
  Trace: template files (check.py, benchmark.py, reference.py,
  problem.yaml, shapes.py, sota.py, PROMPT.txt) all diff byte-identical
  against template_files. Zero references to outputs/runs (no cross-run
  contamination), zero KBH_NUMERIC_STRESS mentions. atol/rtol hits are
  only the agent reading check.py/problem.yaml plus its own honest check
  failures during iteration (bad=778/2097152 at atol=0.05). Official
  check exit 0 PASS with numeric stress, template_mutated=false,
  benchmark exit 0.
notes: |
  Why it stayed eager: the agent spent 118 turns (75 min, 132k output
  tokens, 160 transcript mentions of Triton) trying to build the Triton
  version, and died fixing an indentation error when OpenRouter returned
  "API Error: 400 Provider returned error" twice (harness_exit=1). The
  last valid on-disk solution.py was the eager verification scaffold, so
  the published cell is a correct reference re-implementation graded at
  0.000 of peak. Post-worthy: this is the cleanest possible "correct but
  0.0 pf" cell — the model never cheated, it just never reached its own
  step 2 because the provider 400'd the session.
