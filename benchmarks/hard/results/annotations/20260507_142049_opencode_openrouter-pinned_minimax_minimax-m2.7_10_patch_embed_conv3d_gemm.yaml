      torch.nn.init.normal_(self.conv.weight, std=0.02)

  def forward(self, x: torch.Tensor) -> torch.Tensor:
      cuda_mod = _get_patch_embed_cuda()
      return cuda_mod.patch_embed_cuda(x, self.conv.weight)
