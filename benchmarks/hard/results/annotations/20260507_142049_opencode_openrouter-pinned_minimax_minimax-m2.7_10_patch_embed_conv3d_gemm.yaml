    label: "Triton/CUDA kernel + nn.Conv3d for state_dict storage — but spelled with torch. prefix"
    text: |
      self.conv = torch.nn.Conv3d(
          C, embed_dim,
          kernel_size=(kT, kH, kW),
          stride=(kT, kH, kW),
          bias=False,
          dtype=torch.bfloat16,
