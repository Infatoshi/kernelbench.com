implication: >
  Same shape leak as 06's matmul ban (substring grep, form-sensitive). The
  Conv3d declaration is forced by strict state_dict matching against the
  reference — agents have no way to express the parameter shape without it.
  Six other solutions slip past with the unqualified `nn.Conv3d` form. Cell
  number is null and the FAIL doesn't reflect the kernel's actual quality.
  Expected fix: ban both forms in problem.yaml or move the state_dict
  declaration into a base class outside the rubric scope.
