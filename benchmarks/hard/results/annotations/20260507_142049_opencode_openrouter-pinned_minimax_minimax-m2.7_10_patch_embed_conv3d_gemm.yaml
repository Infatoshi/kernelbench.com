verdict: bug

summary: >
  minimax wrote a real custom CUDA patch-embed kernel and called only
  `self.conv.weight` (never `self.conv(x)`), but failed the forbidden-op gate
  because they spelled the parameter declaration `torch.nn.Conv3d(...)` while
  the six PASSing solutions on this problem all wrote `nn.Conv3d(...)`. The
  forbidden grep is a literal substring match for `torch.nn.Conv3d` and
  doesn't catch the unqualified form, so functionally identical declarations
  yield opposite cell verdicts.

quotes:
