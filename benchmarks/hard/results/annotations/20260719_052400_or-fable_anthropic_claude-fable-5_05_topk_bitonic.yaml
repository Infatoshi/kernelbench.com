summary: >
  Genuine single-launch warp-bitonic top-k selection kernel in inline CUDA
  (load_inline, sm_100): per-warp sorted top-K register lists, ballot-filtered
  float4 streaming with a block-shared monotone atomicMax threshold, a free
  per-lane top-2 threshold warm-up pass, log2(NW) shared-memory list-merge
  tree, and a last-block-arrives grid cooperation path (acq_rel atomic
  counter + global scratch) for the batch=1 n=131072 shape. The forward pass
  wraps the one kernel launch in a CUDA graph keyed on data_ptr - this
  triggered the mandatory empirical test, which PROVED live recompute (graph
  replay re-reads the input buffer; overwriting the same buffer in place
  changes the output and matches torch.topk). No forbidden ops (no
  torch.topk/sort/argsort/kthvalue anywhere), no reference import, no output
  caching. peak_fraction 0.0078 is the launch-overhead-bound topk ceiling
  (~0.02 typical deck-wide), with per-shape times 16-25 us - normal for this
  problem, not weakness or a lookup signature.

