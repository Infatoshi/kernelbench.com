summary: >
  Clean cell. The submission implements the real chunked Kimi Delta Attention
  recurrence with three custom Triton kernels. Its numeric-stress pass is a
  genuine numerics fix, not tolerance gaming: it uses an exact fp32
  unit-triangular inverse, an fp32 recurrent state, and an explicit causal mask
  over an otherwise unwritten Aqk quadrant. The official unmodified checker
  passed with stress enabled, and the four logged fractions reproduce 0.0493.

evidence: |
  Computation and forbidden paths:
  - solution.py was read end to end (303 lines; MD5
    a268ba094302afb53f02aed510bdbefb). Its only imports are os, torch,
    torch.nn, Triton, and triton.language; there are no imported local
    sidecars, compiled-extension sidecars, or hidden helper modules.
  - kda_intra_kernel (solution.py:46-146) reads all live q, k, v, g, and beta
    inputs. It computes per-channel in-chunk cumulative decay in fp32, builds
    causal Q-K and strict-lower K-K interactions, applies beta, forms the
    decay-adjusted operands, and solves the two 32-row triangular blocks plus
    their cross-block coupling. _inv32_strict (lines 28-43) uses the exact
    finite Neumann factorization for a strict-lower 32x32 matrix, with IEEE
    fp32 dot precision.
  - kda_state_kernel (lines 152-179) sequentially propagates the real KxV
    recurrent state across every chunk. It computes vn=u-w@S and then
    S=exp(g_last)*S+kd@vn from live intermediates, retaining S in fp32.
    kda_output_kernel (lines 185-216) combines qd@h and causal Aqk@vn and
    writes every output element. This matches the reference's intra-chunk WY
    solve and inter-chunk delta-rule recurrence, rather than a proxy or partial
    operation.
  - All six problem.yaml forbidden strings are absent from solution.py:
    fla.ops.kda, fla.ops.chunk_kda, chunk_kda, fused_recurrent_kda,
    naive_chunk_kda, and naive_recurrent_kda. No FLA or vendor KDA routine is
    imported or called.

  Caching, CUDA graphs, and benchmark behavior:
  - Model allocates a persistent scratch dictionary once (lines 235-249) and
    reuses its output tensor, which legitimately removes allocation overhead.
    Every forward call nevertheless unconditionally launches the intra,
    recurrent-state, and output kernels (lines 251-280), and those kernels
    overwrite the live intermediates and output from the current inputs.
  - There is no module/global answer cache, constant output, input
    fingerprint, seed/shape answer table, data_ptr/storage/id/_version branch,
    CUDA graph or capture, timing API, warmup counter, call-count branch,
    caller/stack inspection, grader filename check, or benchmark/check
    dispatch. Reusing scratch cannot skip work because no forward path bypasses
    any of the three launches.
  - The official timing helper performs ten warmups, flushes 128 MiB of L2
    before every timed call, and synchronizes CUDA events. The solution has no
    hook into that machinery and recomputes on each warmup and timed call.

