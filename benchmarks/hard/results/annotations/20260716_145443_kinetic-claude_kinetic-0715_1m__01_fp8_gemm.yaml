    or referred to another run's solution, trace, result, check, or benchmark
    artifact. These are incidental process/lock listings, not contamination.
  - Required checker identity holds: workspace, template snapshot, and
    problems-rtxpro6000/01_fp8_gemm/check.py all have MD5
    770f2a44a64a99dcc6f2124849c4fbe3. benchmark.py, reference.py, shapes.py,
    problem.yaml, PROMPT.txt, and sota.py also match byte-for-byte across all
    three locations. result.json records template_mutated=false.
  - Structured Write/Edit target extraction shows only solution.py, run-local
