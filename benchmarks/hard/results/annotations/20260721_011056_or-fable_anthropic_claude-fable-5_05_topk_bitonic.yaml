summary: >
  Genuine fused single-kernel custom CUDA top-k (load_inline, SM90): order-
  preserving fp32→uint32 keys, float4-staged radix histogram select with
  parity-split shared atomics, warp bitonic for small tie groups, multi-round
  radix fallback for large ties, last-CTA atomic-ticket merge when S>1, and a
  dedicated k=1 register/warp-shuffle argmax path. Host path freezes launch
  params into a C++ Plan with a pre-instantiated cudaGraphExec; forward is a
  2-integer pybind call that only patches the input pointer when it changes,
  then cudaGraphLaunch — latency engineering, not output memoization. No
  forbidden ops, no grader edits, no stress bypass. Published peak_fraction
  0.0454 (post_hoc regrade) sits in the normal launch-overhead-bound topk
  regime and is an honest number, not a lookup signature.

evidence: |
  Solution structure (solution.py, 951 lines, topk_fused_v11 load_inline):
  - topk_kernel<T,K1>: grid (S slices × batch rows). Stages slice keys into
    shared (or dyn smem), builds top-bit histogram, find_bin block scan for
    threshold bin, collect >bin winners + ==bin ties; ties resolved via
    reg_sort32/reg_sort64 bitonic (≤64) or repeated warp-max / radix_fallback.
    emit_sorted writes descending fp32 values + int64 indices. S>1 path packs
    (key<<32|idx) into workspace, fence.acq_rel, atomic ticket; last CTA
    merges (warp bitonic if S*k≤128 else adaptive-shift radix select).
  - k==1: pure argmax with float4 loads + warp/block reduce, optional multi-
    slice ticket merge. No torch.topk/sort/kthvalue/argsort anywhere.
  - Imports only os, torch, nn, load_inline. framework.txt: ptx.
  - data_ptr uses: plan construction (out vals/idx/ws/counters) and
    run(plan, x.data_ptr()). C++ run() always cudaGraphLaunch; if xp != p->x
    it cudaGraphExecKernelNodeSetParams + re-upload then launches. Graph
    kernel reads the live input buffer every call — recompute, not cache.
    Preallocated _vals/_idx are output scratch rewritten each launch.
  - Magnitude sanity: geomean 0.0454 with per-shape agent times ~12–17 us
    (final official-style run in transcript: peak_fraction ~0.045, 4–6.5×
    vs eager torch.topk). Far below any >>1.0 cached-lookup signature;
    matches the known launch-overhead-bound topk ceiling.

