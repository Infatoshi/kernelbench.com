    20260716_112718_kinetic-claude_kinetic-0715_07_w4a16_gemm (2 duplicated hits
    each on line 68295).
  - These are incidental shared-machine process/cwd listings, not deliberate
    solution reads. Bash_78 ran ps while checking GPU-lock contention and its
