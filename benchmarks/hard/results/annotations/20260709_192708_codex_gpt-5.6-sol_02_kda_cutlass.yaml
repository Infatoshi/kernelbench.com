summary: >
  Genuine two-stage Triton KDA implementation. A preparation kernel computes
  cumulative decay views, exact 16- or 32-token triangular forward substitution,
  causal QK scores, and restored keys. Persistent programs then carry every
  128x128 recurrent-state value slice through the full sequence and overwrite
  the live bf16 output. Dispatch depends only on constructor geometry. There is
  no activation-magnitude or numeric-stress detector, approximate cheap/accurate
  split, FLA dispatch, output lookup, grader mutation, or cross-run access.
  Independent unseen-seed tests at asymmetric 0.77x/1.73x/1.11x, 1.37x, and
  2.2x/1.9x/1.4x Q/K/V scales all passed comfortably. CUDA-graph replay consumes
  live in-place-mutated contents. The canonical 0.0503 score is therefore a
  comparable measurement of one uniform implementation.

evidence: |
  Kernel and uniform numeric semantics:
  - solution.py was read end to end. _prepare_tiles forms cumulative log-decay
    in base-2 units, decayed Q/K views, causal QK scores, and the strictly lower
    local delta-rule matrix. Lines 68-76 perform row-by-row forward substitution
    for (I + lower)^-1 through every row. Unlike the rejected predecessor, there
    is no truncated polynomial, max(abs(k)) test, threshold, or alternate work
    selected from activation contents.
  - Internal tile C is 16 for B=2 and 32 for B=1. _persistent_forward computes
    residual values, applies the local inverse, emits Q-state plus causal local
    output, and updates both 64-row halves of the recurrent state for every tile.
    All live q, k, v, g, and beta inputs participate in every call.
  - The only runtime branch is CUDA-graph identity/replay. An independent audit
    forced capture on one canonical B=1,T=2048,H=4 pointer set, mutated every
    input tensor in place, and replayed. It matched the fresh PyTorch reference
    with max absolute error 0.00222778 and zero elements outside atol=rtol=0.05,
    proving it is live graph execution rather than cached output.
  - Independent shared-lock tests on the same canonical shape used unseen seeds:
    nominal max abs 0.000885; asymmetric scales (q=.77,k=1.73,v=1.11) 0.00183868;
    (1.37,1.37,.83) 0.00105286; and (2.2,1.9,1.4) 0.00488281. Every case had
    zero tolerance violations and finite output. These scales straddle the old
    0.55 key-magnitude discriminator without any path change.

  Trace, authenticity, and isolation:
  - The complete codex_session.jsonl was inspected: 519 response items comprising
    179 tool calls, 179 outputs, 15 visible messages, and 146 provider-encrypted
    reasoning records. It shows a coherent independent arc from current problem
    inspection through a BF16 Triton baseline, exact internal tile-factorization
    tuning, FP8 intermediate experiments, repeated full checks, and graph replay.
    The agent describes graph replay only as launch-overhead removal for repeated
    pointers; it never proposes a checker/stress distribution classifier.
  - Tool-call review found no outputs/runs, leaderboard, annotations, published
    manifest, incumbent, or other-model solution access. The isolated container
    exposed only the current workspace and /workspace/src. Public FLA and
    FlashKDA repositories/docs consulted by the agent were explicitly allowed by
    PROMPT.txt. `kb contamination hard` did not list this run.
  - `kb lint` reports CLEAN with authored_kernel=true. No forbidden FLA KDA call,
    generic torch matmul/bmm decomposition, torch.compile, stack/checker sniff,
    seed lookup, static result table, or template mutation appears in the final.

  Archived correctness, provenance, and performance:
  - result.json records correct=true, failure_reason=pass,
    template_mutated=false, agent_cuda_disabled=false, agent_container=true,
    reasoning_effort=xhigh, session_complete=true, and zero harness/check/benchmark
    exit codes. Official check.log ends PASS with numeric stress enabled.
  - PROMPT.txt, reference.py, shapes.py, problem.yaml, check.py, benchmark.py,
    and sota.py are byte-identical between template_files and the archived
    workspace. The run used the RTX PRO 6000 native-container GPU-lock path.
  - Canonical solution-only benchmark fractions are 0.0605, 0.0650, 0.0538,
    and 0.0303 at 0.070960, 0.132208, 0.159728, and 0.070976 ms. Their geometric
    mean rounds to the stored 0.0503.

notes: |
  The Model intentionally returns one persistent output workspace. Consequently,
  a later forward on the same Model mutates a tensor returned by an earlier call;
  the audit observed this directly. This is an output-lifetime/reentrancy caveat,
  not result memoization: every forward or graph replay overwrites the workspace
  from live inputs, the benchmark consumes each result before the next call, and
  the stated benchmark contract is single-stream. CUDA-graph identity uses raw
  data pointers, so unusual allocator reuse after freeing inputs could also retain
  a graph longer than ideal. Neither issue changes the official single-instance,
  live-input score, but both should be revisited if the operator contract later
  requires persistent independent outputs or concurrent streams.
