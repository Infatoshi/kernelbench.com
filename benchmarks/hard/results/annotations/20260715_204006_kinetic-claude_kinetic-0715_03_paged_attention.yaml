summary: >
  Genuine hand-written flash-decoding paged-attention CUDA kernel for H100
  (sm_90a via load_inline). One 128-thread block per (split, batch*kv_head)
  pair gathers live KV pages through block_table with cp.async double/quad-
  buffered XOR-swizzled smem staging (L2 evict_first policy), computes QK^T
  and PV via mma.sync.m16n8k16 bf16 with the G GQA query heads packed into the
  mma M rows, fp32 online softmax in log2 domain, and a flash-decoding split-K
  whose last-arriving block merges partials via self-zeroing atomic counters
  (single launch per forward). seq_lens is read live on device per call for
  tail masking; a generic fallback kernel covers unspecialized shapes. No
  caching of any kind: output is at::empty_like per call, the kernel launches
  unconditionally on every forward, no CUDA graphs, no data_ptr keying. No
  forbidden ops (no SDPA, no vllm/flashinfer). check.py PASS with numeric
  stress enabled; 0.4958 recomputes exactly from the five logged per-shape
  fractions.

evidence: |
  Kernel semantics (solution.py read end to end, 788 lines):
  - pa_mma_kernel derives (split, batch, kv_head) from the grid, reads
    seq_lens[b] live, follows bt[b*max_pages + page] to gather each physical
    page from the packed [K | V] cache, and masks tail tokens via
    gidx < len predication in cp.async (zero-fill) plus -INFINITY score
    masking before the softmax max-reduce. Real paged gather, not a dense
    shortcut.
  - Online softmax is fp32 (running max, exp2f rescaling of accumulator and
    denominator); P is packed to bf16 A-fragments for the PV mma. Split-K
    partials carry (m, l) per row; fused_finish uses __threadfence +
    atomicAdd counters that self-zero after each merge, so every launch is
    valid without a memset.
  - Host side: paged_attention_forward_impl allocates the output with
    at::empty_like(q) on every call and always launches pa_solve. Only
    scratch (split-K partials workspace, counters) persists across calls as
    static tensors, fully overwritten each call and never returned. Raw
    METH_FASTCALL binding shaves pybind dispatch; no result path bypasses
    the kernel. Compiled -gencode sm_90a (correct for H100).
  - No stack inspection, no check.py/filename sniffing, no seed or magnitude
    dispatch, no torch state mutation, no environment probing.

  Roofline plausibility (H100 PCIe, harness peak 2039 GB/s; bytes from
  problem.yaml bytes_formula = 2*B*L*Hkv*D*2 + B*H*D*2*2):
  - shape0 (B8 L1024 Hkv8 D128):  33.69 MB / 0.0379 ms =  888 GB/s = 0.4355
  - shape1 (B32 L2048 Hkv8 D128): 268.96 MB / 0.1714 ms = 1569 GB/s = 0.7696
  - shape2 (B4 L4096 Hkv8 D128):  67.24 MB / 0.0622 ms = 1081 GB/s = 0.5304
  - shape3 (B16 L1535 Hkv8 D128): 100.86 MB / 0.0794 ms = 1270 GB/s = 0.6231
  - shape4 (B8 L2000 Hkv4 D64):   16.42 MB / 0.0298 ms =  552 GB/s = 0.2705
  Geomean = 0.4958, matching result.json. Best shape is 77% of the 2.0 TB/s
  HBM2e spec — below the ~1.7-1.8 TB/s memcpy-achievable ceiling on H100
  PCIe, so nothing superluminal; small shapes are launch/ramp-bound as
  expected. All logged gbps values recompute from the bytes formula.

