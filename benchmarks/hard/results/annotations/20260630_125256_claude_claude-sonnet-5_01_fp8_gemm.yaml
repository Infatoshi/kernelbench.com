summary: >
  Manual audit (solution.py end-to-end + transcript + grader diff). Genuine
  fp8_e4m3 x fp8_e4m3 -> bf16 GEMM: primary path is a CUTLASS 3.x SM120
  collective-builder kernel (tensor-core float_e4m3_t MMA, fp32 accumulate,
  per-output-channel dequant scale fused into the epilogue via a custom EVT),
