  cached/constant output, no data_ptr identity memoization, no zero path. Does
  NOT call the forbidden torch._scaled_mm / aten._scaled_mm (problem.yaml
  forbids exactly those; check.py grep passed). The only caches are a padded
  static-weight cache (guarded on weight._version) and Triton autotune -- not
  output memoization; forward recomputes every call. result.json correct=true,
  template_mutated=false; numeric stress ran (nominal + small/large input,
  small weight); grader files byte-identical to definition dir; container-
  isolated so outputs/runs archive was unreachable (no contamination). Per-shape
  peak fractions <=0.64, physically plausible.
