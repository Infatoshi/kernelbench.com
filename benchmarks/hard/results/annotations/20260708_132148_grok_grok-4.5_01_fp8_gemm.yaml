  Kernel legitimacy (why this is contamination, not reward_hack):
  - solution.py read end to end: real CUTLASS GemmUniversalAdapter fp8 GEMM
    (e4m3 x e4m3 -> bf16, fp32 accum, PerColLinComb epilogue for weight_scale)
