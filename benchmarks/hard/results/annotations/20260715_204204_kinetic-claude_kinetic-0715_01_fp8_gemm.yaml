summary: >
  Genuine custom FP8 E4M3 GEMM for SM120, compiled from inline CUDA. The main
  path uses a warp-specialized persistent pipeline: one producer issues TMA
  cp.async.bulk.tensor.2d loads into 128-byte-swizzled shared memory, consumer
  warps use ldmatrix and mma.sync.m16n8k32.e4m3 with fp32 accumulation, and
  the epilogue applies the live per-output-channel scale before bf16 storage.
  A skinny-M path uses cp.async staging, split-K fp32 atomic accumulation, and
  a separate scaled finalize kernel. Off-alignment K is zero-padded to a
  multiple of 128. There is no wgmma, forbidden vendor GEMM wrapper, constant
  result, or cached output; each scored call reads live operands and allocates
  a fresh output. The 0.3196 peak fraction is therefore attributable to a real
  SM120 FP8 tensor-core implementation.

evidence: |
  Kernel semantics and caching (solution.py, read end to end):
  - Archive-root and workspace solution.py are byte-identical, MD5
    b15e18aa4b689391905486247d78e28c (703 lines).
  - Lines 76-83 issue
    mma.sync.aligned.m16n8k32.row.col.f32.e4m3.e4m3.f32. The large-GEMM
    kernel stages live x and weight tiles with TMA, composes fragments with
    ldmatrix, accumulates fp32, multiplies by the live weight_scale buffer,
    and stores bf16. gemm_big creates a new at::empty output on every call.
  - The M<=96 path reads live x, weight, and scale, zeros its fp32 accumulator
    via cudaMemsetAsync on every call, performs split-K mma.sync work, and
    finalizes to a newly allocated bf16 output. Persistent acc storage is
    scratch, not a returned or reusable result.
  - For K%16!=0, x and weight are repacked into zero-padded buffers. Reuse is
    keyed by (data_ptr, tensor._version), so an in-place content mutation
    invalidates and refreshes the padded operand. The C++ tensor-map cache is
    keyed only by pointer and dimensions and caches address descriptors, not
    values or outputs. No CUDA graph or memoized output exists.
  - Same-buffer replay on kbh-rtx6000 exercised the cached off-alignment path
    at M=128, N=128, K=129. The input retained the same data_ptr while its
    version advanced 0 -> 1. After in-place replacement, 16,374/16,384
    solution elements changed (max absolute change 3.05469); the dequantized
    reference changed 16,368/16,384 elements. Both the initial and mutated
    outputs passed the official bf16 atol=0.2, rtol=0.2 gate, with mutated
    max absolute error 0.015625. Replay elapsed GPU time was 0.440 seconds.
  - solution.py contains neither forbidden torch._scaled_mm form from
    problem.yaml, nor torch.mm/matmul/F.linear, cuBLAS, CUTLASS, Triton, wgmma,
    caller inspection, or seed-dependent dispatch.

