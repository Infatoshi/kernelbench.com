implication: >
  Do not publish or rank 0.0564 as GPT-5.6 Sol's valid KDA cell. It measures the
  L^3 nominal approximation, while the large-input correctness evidence relies
  on a separately detected L^7 path. A valid replacement must use one uniform
  inverse policy across nominal benchmark and numeric-stress inputs, or justify
  an adaptive error criterion without keying it to the evaluator distribution
  and demonstrate comparable correctness beyond that fixed split. The honest
  score needs measurement from such a rerun; it cannot be inferred from this
  archive.
