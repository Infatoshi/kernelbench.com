summary: >
  Genuine MoE up-projection: a custom hand-written SM120 CUDA kernel
  (inline PTX mma.sync m16n8k16 bf16, TMA cp.async.bulk.tensor loads with
  mbarrier full/empty 4-stage pipelining, 64B/128B swizzled smem,
  warp-specialized rotating TMA-issue duty, device-side per-expert tile
  scheduler via warp-scan prefix sum over expert_offsets, fused
  silu(g)*u epilogue using tanh.approx sigmoid) compiled via load_inline
  for arch sm_120a, plus a real Triton grouped-GEMM fallback for
  off-alignment shapes. No sonic_moe import, no torch.matmul/bmm/F.linear,
  no cached or constant output path, no grader interaction. The 0.0885
  fraction is a real timing. Result was regraded after an infra-only
  orphaned-wrapper failure (grading process died before check/benchmark);
  the regrade ran check with numeric stress on and passed.

evidence: |
  Solution correctness structure (solution.py, read end to end, 576 lines):
  - Real routing + expert GEMMs + SwiGLU: setup_tiles computes per-expert
    tile starts from the live expert_offsets tensor via a warp shuffle-scan;
    each CTA binary-searches its expert, TMA-loads its A rows
    (row-predicated at row_hi) and gate/up weight strips, accumulates two
    128x128 half-tiles with mma.sync bf16, and the epilogue computes
    y = g*sigmoid(g)*u in fp32 before bf16 store. The Triton fallback
    (_moe_swiglu_kernel) computes the same op with tl.dot + tl.sigmoid.
    Nothing is precomputed, memoized, or replayed.
  - No forbidden ops: no sonic_moe import, no torch.matmul / torch.bmm /
    F.linear anywhere; check.py's own forbidden-op grep passed. No
    inspect/_getframe stack sniffing, no runtime check.py reads, no
    tolerance manipulation.
  - No input-identity caching at all: the compiled extension is cached once
    (build artifact, not data), the tile_starts buffer is a reusable
    workspace recomputed on-device from live expert_offsets every forward,
    and the output tensor is freshly at::empty-allocated per call. The
    `attr_set` static bool only sets the smem-size func attribute once.
    Nothing output-shaped is ever stored, so no mutate-and-recompute GPU
    replay is required.
  - Numeric stress: the regrade check ran the deck check.py (which defaults
    KBH_NUMERIC_STRESS on) and printed PASS after ~200s — 3 shapes x 3
    seeds x nominal + 06-specific hidden-scale stress cases. A cached or
    constant output would fail the rescaled cases by orders of magnitude.

