      __device__ __forceinline__ void insert_desc(int k, float val, int64_t idx,
                                                  float* vals, int64_t* idxs) {
          if (val <= vals[k - 1]) return;
          int pos = k - 1;
          while (pos > 0 && val > vals[pos - 1]) {
              vals[pos] = vals[pos - 1];
              idxs[pos] = idxs[pos - 1];
              --pos;
          }
          vals[pos] = val;
          idxs[pos] = idx;
      }
