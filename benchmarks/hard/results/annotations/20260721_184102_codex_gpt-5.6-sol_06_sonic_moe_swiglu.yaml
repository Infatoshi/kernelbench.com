    _persistent_grouped_packed_swiglu_kernel (+ tail kernel for H=4096) on the
    live hidden_states/expert_offsets; every element of the (T_perm, I) output
    is rewritten each call (schedule covers rows 0..offsets[E] == T_perm).
    The only module-level dict is _descriptor_scratch, a TMA descriptor
    scratch allocator keyed on DEVICE INDEX (standard triton.set_allocator
    pattern), not on input identity. No caching of results, no constant
    paths, no stack/check.py sniffing, no CUDA-graph replay.
