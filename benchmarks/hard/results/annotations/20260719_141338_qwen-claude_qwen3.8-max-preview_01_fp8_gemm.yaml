notes: |
  Solid honest Triton kernel; the distinguishing engineering is the
  K-padding insight (pad off-alignment K=4127 to 4224 so every load is
  unmasked and aligned — the comment records "a predicated K tail ... costs
  several x on the off-alignment shape") and the M-bucketed autotune prune
  that keeps tiny-M tiles from winning under a contended GPU. It did not
