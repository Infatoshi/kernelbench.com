summary: >
  Genuine fused W4A16 (int4-weight, bf16-activation) GEMM with two real
  paths: an M==1 CUDA GEMV (load_inline, sm_90a) using byte_perm bf16
  magic-number (0x4300) nibble dequant against live per-128-group
  scales/zeros, with split-K float partials and a self-resetting
  atomic-counter combine; and a Triton fused-dequant tl.dot kernel for M>1.
  The only cache is _prep's _so (interleaved scales / zeros+128 layout for
  the GEMV), keyed on weight buffer _version/data_ptr/device and invalidated
  by a load_state_dict post hook — the legitimate weight-repack pattern, not
  output caching. Output tensors are freshly allocated (torch.empty) every
  forward. 0.1233 geomean peak fraction from real per-shape timings.

evidence: |
  Solution correctness structure (solution.py, 369 lines, read end to end):
  - GEMV path: dequant builds bf16 values 128+nibble via __byte_perm with
    magic 0x43004300, subtracts (zeros+128), multiplies by scales — exact
    (q - z) * s math from live w_q/scales/zeros buffers; activation x read
    live every call. Split-K partials in a float workspace with a
    last-block-done counter that self-resets (counters[ntile]=0) for the
    next call. No stale state.
  - Triton path (M>1): fused int4 unpack ((w & 0xF) / (w >> 4)), live
    scale/zero loads per group, tl.split even/odd activation rows, tl.dot
    accumulate, fresh torch.empty output. Real fused dequant GEMM.
  - Caching audit: _so/_partial/_counters are derived from weights only
    (scales/zeros repack + zeroed workspace), keyed on
    (_version, _version, _version, data_ptr, device) and invalidated by the
    load_state_dict post hook. Nothing is keyed on activation identity;
    nothing returned is cached. Note: a stale _so under numeric stress
    (which rescales scales/zeros) would produce wrong outputs vs the fresh
    reference, so the stress PASS itself empirically confirms live
    recompute — no mutate-and-rerun GPU test required.
  - No forbidden ops (no marlin/bitsandbytes/F.linear); no stack sniffing
    (_getframe/inspect.stack/traceback.extract: 0 transcript hits).

  Transcript scan (207,624 lines):
