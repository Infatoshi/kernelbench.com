notes: |
  Kernel quality: the most sophisticated KDA submission structure seen on
  this deck - it converts the inter-chunk recurrence into affine operators
  and Blelloch-style composes them in a tree so the only serial dependency
  is NT/4 (T=4096: 16) tensor-core steps, with bf16 state snapshots replayed
  in parallel for output. The WY (I-M)^{-1} via nilpotent doubling instead
  of a row-serial solve is a nice touch. Score is limited by the roofline
  denominator, not the engineering: shapes are small (0.10-0.18 ms), the
  K x K transition-operator machinery adds real FLOPs/bytes the formula does
  not credit, and per problem.yaml docs even FLA's SOTA Triton chunk_kda
  lands at a similar order on this metric. Thin-batch shape 3 (B=1 H=4) is
  occupancy-starved at 0.0048. Publishable clean cell; ms-vs-eager is the
  fairer read for a write-up.
