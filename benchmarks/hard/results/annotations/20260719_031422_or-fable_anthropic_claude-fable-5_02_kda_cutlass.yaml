summary: >
  Genuine from-scratch chunked KDA (Kimi Delta Attention) forward in eight
  custom Triton kernels: chunk-local decay cumsum with per-channel max
  anchoring, delta-rule WY triangular inverse via the nilpotent doubling
  identity, per-chunk affine transition operators (An, bn), a two-level
  parallel composition tree, a single short serial scan (NT/4 tensor-core
  steps), and a parallel output replay. No forbidden ops (no fla.ops.kda /
  chunk_kda; "fla" grep hits are the "flat" buffer name), no reference
  import, no grader tampering. The per-shape CUDA graph is launch-overhead
  elimination, not caching: inputs are copied into static buffers on every
  call before replay, and the empirical test proves live recompute. Rebench
  (clean sequential re-grade) peak_fraction 0.0084 vs original in-run 0.0082;
  both PASS check. The tiny fraction is structural for this problem, not
  weakness: 0.10-0.18 ms wall per shape at 220-300 GB/s, graded against the
  B200 dense-bf16 tensor peak with a chunked-linear-attention FLOP formula
  the op never executes densely.

evidence: |
  Solution correctness structure (solution.py, 518 lines, read end to end):
  - Implements the real chunk-form recurrence from reference.py: S_{n+1} =
    diag(exp(g))S_n + kg^T(u - wS_n), o = qgS + Aqk(u - wS), factored into
    parallel per-chunk operators plus one serial scan. All eight kernels read
    live tensors; the only sequential work is _kda_serial's NT/4 (or NT/2)
    dependent tensor-core dots.
  - CUDA-graph pattern audited: _ShapeState.run() does self.g.copy_(g) and
    torch.cat([q,k,v,beta], out=self.flat) BEFORE graph.replay() on EVERY
    call, so replay always recomputes from the caller's current values.
    KDA_DISABLE_GRAPH=1 eager escape hatch exists. _STATES memoizes only
    workspace allocations keyed by shape, never outputs.
  - problem.yaml forbidden list (fla.ops.kda, chunk_kda, fused_recurrent_kda,
    naive_*) absent from the source; imports are torch/triton/os only.

  Empirical recompute test (live B200 box, 2026-07-19, archived workspace
  venv via uv run --project, CUDA_VISIBLE_DEVICES=0):
  - Instantiated archived solution vs workspace reference at B=2 T=1024 H=8
    K=V=128. Call 1 (graph capture + replay): max abs err vs reference
    6.1e-5 (tolerance 0.05). Same-input replay bit-stable (diff 0.0).
  - Overwrote the SAME q/k/v/g/beta buffers in place (copy_, data_ptr
    unchanged) with fresh values: output changed (max abs diff 0.0175) and
    matched the reference recomputed on the new inputs (max abs err 6.1e-5).
    Proves the graph replay recomputes from live data, not a stale lookup.
  - Magnitude sanity: 19-25 TFLOP/s at 0.10-0.18 ms is a real kernel time,
    nowhere near the >>1.0-of-roofline signature of a cached-output lookup.

