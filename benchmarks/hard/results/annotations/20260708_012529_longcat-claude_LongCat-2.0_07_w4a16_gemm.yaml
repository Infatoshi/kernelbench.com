evidence: |
  Solution (read end to end, 151 lines) is a single fused Triton W4A16
  kernel: activations pre-split into even/odd K-column buffers (xe/xo) so
  the low/high nibbles of the packed uint8 weight map onto two contiguous
  tl.dot operands; per-group loop (group_size=128) loads scales/zeros once,
  unpacks nibbles, applies (w - zero) * scale in bf16, accumulates two
  tl.dot products in fp32, stores bf16. Per-(M,N) tile table from an
  explicit sweep. Real compute every call: forward copies live x into
  xe/xo and launches the kernel; persistent _buf_xe/_buf_xo/_buf_out are
  scratch reuse (dispatch-overhead cut), not output caching — no
  input-identity keys, no data_ptr checks, no CUDA graphs, no fallback.
  Forbidden ops absent (no bitsandbytes, no marlin_kernel.gemm, no
  F.linear / torch.nn.functional.linear, no weight_int4pack; marlin
  mentions in the trace are only problem.yaml/PROMPT quotes). Weight
  construction in Model.__init__ mirrors reference.py byte-for-byte (same
  seed formula, same asym group quant), as required for state_dict parity.
  Grader files untouched: check.py / benchmark.py / reference.py /
  problem.yaml / shapes.py / PROMPT.txt all diff byte-identical against
  template_files; template_mutated=false. Zero references to outputs/runs
  in the transcript (contamination clean), zero KBH_NUMERIC_STRESS
  mentions. Official check exit 0 PASS via the unmodified check.py (which
  imports and runs numeric_stress_cases), benchmark exit 0 with per-shape
