notes: |
  Kernel quality: a well-reasoned selection kernel rather than a brute-force
  full bitonic sort - the threshold-filter design means the steady-state
  cost is one compare per element with the input read as the limiter, which
  is the right roofline model for top-k. Standout decisions: the u64
  (key<<32|idx) packing for deterministic tie-breaks and bit-exact value
  recovery, the warm-up sort that bootstraps the threshold so the candidate
  buffer never floods at threshold 0, the software-pipelined float4 path,
  the single-launch multi-segment merge via atomic ticket (no second kernel,
  no host sync), and CUDA-graph replay for the launch-bound regime -
  documented honestly in the docstring ("replay re-reads the live input
  memory... it stores the pointer, not the data"), which the empirical test
  confirmed. Session also featured competent shared-infra debugging: it
  correctly diagnosed a 30-min GPU-lock starvation caused by a concurrent
  run's spinning lock wrapper and kept working on CPU-side inspection
  instead of stalling. Publishable clean cell; 0.0492 is at the strong end
  of this problem's launch-overhead-bound band.
