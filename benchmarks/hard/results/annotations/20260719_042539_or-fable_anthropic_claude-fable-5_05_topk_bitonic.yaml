summary: >
  Clean cell. The submission is a genuine single-launch custom CUDA top-k
  (load_inline, no Triton, no forbidden ops): fp32 values are mapped to
  order-preserving u32 keys (sign-flip trick) packed with the column index
  into u64s; each block streams its row segment in float4 tiles through a
  threshold filter into a shared-memory candidate buffer, compacting via
  register/shared-memory bitonic sorts and raising the k-th-key threshold so
  the steady-state scan is ~1 compare per element; the batch=1 n=131072
  decode shape splits the row across segments with an atomic-ticket
  last-block merge, still one kernel launch. forward() adds CUDA-graph
  replay keyed on x.data_ptr() to amortize launch overhead - the classic
  pattern that mandates an empirical test, which proved the replay re-reads
  live input memory (recompute, not lookup). Unmodified checker passed twice
  (original run and clean sequential re-grade); published 0.0492 geomean is
  the isolated rebench number, a normal/strong score for this
  launch-overhead-bound problem (~0.02-0.05 ceiling).

evidence: |
  Computation structure (solution.py, 449 lines):
  - Imports only os, torch, torch.nn, torch.utils.cpp_extension.load_inline.
    None of the forbidden ops (torch.topk / kthvalue / sort / argsort,
    Tensor.* variants, torch.ops.aten.*) appears anywhere in the source.
  - topk_kernel does the real selection: fkey/kval are exact
    order-preserving fp32<->u32 bijections (values recovered bit-exact),
    warm-up register bitonic sort bootstraps the threshold, tiled scan with
    atomicAdd candidate append, eager compaction via sort_block_desc
    (shuffle-based register bitonic) or bitonic_sort_desc (shared-memory
    fallback for adversarial input order), multi-segment path publishes
    per-segment top-K2 to a scratch buffer and the last block (atomic
    ticket) merges. Outputs written unconditionally for all i < k each call,
    so the preallocated _out_vals/_out_idx buffers are safe reuse, not
    caching.
  - The only stateful patterns are execution-resource state: preallocated
    scratch/counters/output buffers and a CUDA graph captured on the second
    consecutive call with the same x.data_ptr(). No stored answers.

  Empirical recompute test (remote RTX PRO 6000, 2026-07-19, run venv):
  - Instantiated the archived solution (batch=64, n=8192, k=8), called 3x to
    force graph capture (confirmed _graph is not None and replay path taken),
    then overwrote the SAME x buffer in place via copy_ with fresh randn:
    output changed and was BIT-EXACT vs torch.topk recomputed on the new
    data (values equal, gathered x[idx] equal). Second in-place overwrite
    with a planted max (x[:,5]=7.0): kernel returned 7.0 at index 5.
    Proves graph replay recomputes from live memory; not a stale lookup.
  - Magnitude sanity: 0.0155-0.0916 per-shape fractions, ms 0.013-0.019 -
