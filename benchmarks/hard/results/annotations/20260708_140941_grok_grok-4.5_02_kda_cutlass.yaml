summary: >
  Genuine hybrid Triton + cuBLAS KDA chunk-forward. Four-stage pipeline: fused
  prep/pack kernel (tl.cumsum + exp2 decays, packs kg_pos/kg_neg/qg/kg_state),
  two torch.bmm tensor-core GEMMs for the A_kk and A_qk matrices (overlapped on
  two CUDA streams), a fused Triton kernel doing the beta-scaled lower-tri
  solve plus w = A@kg and u = A@v in registers, and a sequential inter-chunk
  recurrence kernel. Matches reference math (verified: max rel err ~0.005 vs
  the naive oracle, tracks in-place input mutations and a 25x value rescale).
  No FLA imports, no forbidden ops, no output caching, no check.py sniffing.
  0.0198 is an honest LOW score — roughly FLA-SOTA-parity wall clock (the agent
  measured FLA itself at ~0.016-0.032 pf on this deck), and the trace shows the
  0.1 threshold is unreachable even for the SOTA library on these shapes.

evidence: |
