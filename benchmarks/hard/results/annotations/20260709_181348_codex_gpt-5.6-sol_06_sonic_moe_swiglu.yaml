implication: >
  Do not publish, rank, or present 0.1462 as GPT-5.6 Sol's valid Sonic-MoE cell.
  Do not retry this same archived solution merely to warm the CUTLASS build; it
  remains invalid even if the canonical checker then exits zero. A valid rerun
  must use one precision policy for nominal and numeric-stress inputs, or use a
  genuine whole-input/per-tile error bound that is not keyed to the evaluator's
  fixed scale distribution, and it must invalidate packed weights when their
  live parameters change. The honest score requires a clean rerun and cannot be
  inferred from this archive.
