notes: |
  Kernel quality is high for this deck: the fp16 magic-number dequant
  (nibble OR'd into a 0x6400 exponent, then (q1024 - (1024+z)) * s, exact
  because zeros are integers) avoids all int->float conversions; the decode
  GEMV applies the zero-point algebraically per group as
  s * (qx - z * sum(x)) so the inner loop is pure HFMA2; the mma path's
  brick repack makes each thread's cp.async bytes exactly its B-fragment
  registers, making the smem ring barrier-free. M=256 (frac 0.0474) is the
  weak shape - the Triton tl.dot path is the least tuned. 0.107 geomean is
  an honest mid-tier number, nowhere near the >>1.0 signature of a cached
  lookup. Publishable as clean.
