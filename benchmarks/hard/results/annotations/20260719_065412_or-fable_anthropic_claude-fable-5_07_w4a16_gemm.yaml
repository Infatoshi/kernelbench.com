summary: >
  Genuine fused W4A16 dequant+GEMM with three per-shape custom paths, all
  fusing int4 unpack + dequant + GEMM in one pass over the packed weight
  stream (no bf16 weight matrix ever materialized): M=1 decode is a custom
  CUDA GEMV over 32-column repacked slabs with fp16 magic-number nibble
  dequant (LOP3 into the 0x6400 mantissa) and an algebraic per-group
  zero-point correction; M=16/32 is a hand-rolled mma.sync.m16n8k16 fp16
  kernel with cp.async ring buffers and warp-exclusive K-slices; other M
  (256 prefill) is a Triton tl.dot kernel on even/odd K planes. Per-
  (data_ptr, M) CUDA graphs cache the launch sequence only - the empirical
  test proves every replay recomputes from the live x/scales/zeros buffers.
  No forbidden ops, no reference import, no grader tampering. Rebench
  geomean 0.107 (original in-run 0.0991, RESULT: LOW under wave
  concurrency; the clean sequential re-grade is the published number).

evidence: |
  Solution correctness structure (solution.py, 750 lines, read end to end):
  - Computes the real op: y = x @ ((unpack(w_q) - zeros) * scales) per the
    AWQ scheme, group 128 along K. Dequant is fused in-kernel on the packed
    uint8 stream in all three paths; the only precompute is a one-time
    layout repack of w_q (slabs for GEMV, mma bricks) - still int4-packed,
    derived once from the loaded state_dict, which is legitimate weight
    prep, not pre-dequantization.
  - Forbidden ops absent: no bitsandbytes, no marlin_kernel, no
    torch.nn.functional.linear, no torch.matmul on dequantized weights in
    the hot path. No import of reference.py.
  - CUDA graphs are keyed on (x.data_ptr(), M) and cache the captured launch
    sequence; y is rewritten by the kernels on every replay. Docstring
    explicitly states replay recomputes from live buffers - verified
    empirically (below). Graph dict capped at 32 entries then cleared.

