summary: >
  Genuine fused W4A16 (int4-weight, bf16-activation) GEMM with four real
  paths dispatched from one C++ extension: an M==1 split-K GEMV using the
  lop3-magic bf16 dequant trick with fp32 FFMA accumulate and
  arrival-counter reduction; a cp.async + ldmatrix + mma.sync.m16n8k16
  tensor-core kernel for M in [2,32] over lane-packed repacked int4 tiles;
  a 16-warp k6 tensor-core kernel for M in (32,256]; and a Triton
  fused-dequant tl.dot fallback for any other shape. Dequant folds live
  scales/zeros as s/256 and 32768+256*z magic constants, recomputed in the
  repack kernel whenever weights change. The only cache (PackCache) is
  keyed on w_q.data_ptr() plus a hash of the w_q/scales/zeros tensor
  _version counters and a per-Model-instance eid — a legitimate
  weight-repack cache, not output caching. Output y is freshly allocated
  (torch::empty) and recomputed from the live activation on every call.
  0.2427 geomean peak fraction is a real regrade timing.

evidence: |
  Solution correctness structure (solution.py, 1112 lines, read end to end):
  - gemv_k1 (M==1): reads x/w_q/s8p/c2p live every launch; split-K partials
    atomicAdd into a float workspace with last-block-done combine; counters
    and workspace re-zeroed in-kernel after each combine. No stale state.
  - k3_gemm / k6_gemm: cp.async staged pipeline, ldmatrix A-fragments,
    mma.sync.m16n8k16 bf16 with fp32 accumulators; dequant_tile applies the
    packed scale/zero words (szp) per 128-group inside the mainloop. Weights
    only are repacked (repack_wqt_kernel reorders nibbles, repack_sz_kernel
    precomputes s/256 and 32768+256*z); no values fabricated.
  - Caching audit: g_cache is std::unordered_map<void*, PackCache> keyed on
    w_q.data_ptr(); ver = (eid<<40) | hash(w_q._version, scales._version,
    zeros._version), so any in-place weight/scale/zero mutation invalidates
    the pack. Nothing is keyed on the activation; fwd_fast takes x by tensor
    and launches kernels on its live data_ptr. All outputs torch::empty per
    call. Triton fallback reads all four buffers live.
  - Empirical recompute test (run on kbh-rtx6000, RTX PRO 6000, 2026-07-16):
    loaded the archived solution.py, random int4 weights/scales/zeros,
    M=1 N=12288 K=4096. Output matched an fp32 dequant reference
    (max abs err 0.0000). Overwrote the SAME x buffer in place: output
    changed and matched the new reference (max abs err 0.0002, bf16-level).
    Overwrote w_q in place (_version bump): output changed and matched the
    new-weight reference exactly. Proves recompute, not lookup, and proves
    the pack cache invalidates on weight mutation.
  - No forbidden ops, no stack sniffing (_getframe/inspect.stack/
    traceback.extract: 0 transcript hits).

