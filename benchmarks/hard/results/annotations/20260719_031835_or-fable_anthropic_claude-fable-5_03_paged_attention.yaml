notes: |
  Strong kernel work for a decode bench: dedicated TMA producer warp with
  mbarrier expect_tx ring (the agent found plain per-thread cp.async was
  limited by outstanding-load tracking), +16B row padding for conflict-free
  ldmatrix, warp-specialized 288-thread blocks, and split-K across
  sequence-splits with a clean two-kernel merge. Shape 1 hits 3.81 TB/s
  effective (0.476 of peak HBM) - real streaming, not a lookup. Weak shapes
  (0.07-0.16) are small-work/launch-bound. The CUDA-graph identity cache is
  the same vLLM-style pattern previously false-positived by lint on glm-5.2's
  fp8 cell; as there, empirical mutation testing proves recompute. One
  publish-side caveat inherent to graph replay: repeated calls on identical
  buffer identities return the same output tensor object (captured buffer),
  which check.py/benchmark.py handle fine but long-lived callers would need
  to clone - documented by the agent in a source comment.
