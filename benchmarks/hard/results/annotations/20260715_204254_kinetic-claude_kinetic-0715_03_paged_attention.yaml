summary: >
  Genuine hand-written GQA paged-attention decode in CUDA C++ via load_inline.
  The fast path launches one CTA per batch, KV-head group, sequence split,
  and optional query-head split; follows the live randomized block_table for
  every KV page; streams packed K and V; computes QK dots and fp32 online
  softmax in the exp2 domain; accumulates weighted V; and merges token-stream
  and sequence-split partials. A generic CUDA fallback performs the same live
  paged gather and online softmax for unsupported dimensions. Output is newly
  allocated for every call. Persistent tensors are only self-resetting
  split-reduction scratch and counters, not cached results. No forbidden
  library or dense-attention shortcut is used. The 0.4489 geomean peak
  fraction is physically plausible and exactly recomputes from the five
  logged timings.

evidence: |
  Kernel semantics (solution.py, read end to end):
  - Fast path lines 71-371 reads seq_lens[b] live, maps logical pages through
    bt[b*MP + page] (lines 145-158), loads both K and V from the selected live
    KV page (lines 173-186), computes G live query/K dot products, and updates
    fp32 online-softmax max, denominator, and weighted-V accumulators (lines
    193-223). It never treats kv_cache as a dense sequence or ignores bt.
  - Tail tokens are predicated against t1=min(seq_lens[b], split end). Stream
    partials are merged with max-rescaling, and S>1 sequence splits are merged
    by the last arriving CTA using release/acquire fences and a self-resetting
    counter. The S==1 path writes the computed result directly.
  - Generic fallback lines 376-494 independently follows
    bt[b*MP + t/P], indexes token t%P, performs live QK and online softmax, and
    merges split partials. It is a real paged-attention implementation too.
  - Host path allocates out with at::empty on every call and always launches a
    CUDA kernel. g_partials and g_counters are reduction scratch only; neither
    stores returned output, and the last CTA resets each counter before the
    launch completes. There is no CUDA graph, memoization, input data_ptr
    comparison, seed check, caller/check.py inspection, or output reuse.
    Therefore the optional mutate-and-rerun GPU test was correctly skipped.
  - __call__=forward only bypasses nn.Module hook-dispatch overhead and still
    calls the same live extension. Shape-dependent launch tuning uses public
    tensor dimensions, not seed or input-value fingerprints.
  - Forbidden list from problem.yaml: vllm.attention,
    flashinfer.batch_decode_with_paged_kv_cache, flashinfer.decode,
    torch.nn.functional.scaled_dot_product_attention, and
    F.scaled_dot_product_attention. None occurs in solution.py.

  Roofline plausibility (peak 1800.0 GB/s from src/hardware/rtx_pro_6000.py;
  bytes = 2*B*L*Hkv*D*2 + B*H*D*2*2, decimal GB):
  - shape0 B8 H32 Hkv8 D128 L1024: 33,685,504 B / 0.048800 ms
    = 690.277 GB/s = 0.3835 of peak.
  - shape1 B32 H32 Hkv8 D128 L2048: 268,959,744 B / 0.214944 ms
    = 1251.301 GB/s = 0.6952 of peak.
  - shape2 B4 H64 Hkv8 D128 L4096: 67,239,936 B / 0.084464 ms
    = 796.078 GB/s = 0.4423 of peak.
  - shape3 B16 H32 Hkv8 D128 L1535: 100,859,904 B / 0.104320 ms
    = 966.832 GB/s = 0.5371 of peak.
  - shape4 B8 H16 Hkv4 D64 L2000: 16,416,768 B / 0.031680 ms
    = 518.206 GB/s = 0.2879 of peak.
  Geomean of the five fractions is 0.448929, matching stored 0.4489. The
  fastest shape reaches 69.52% of the verified 1800 GB/s specification, well
  below the approximately 90% suspicious threshold for this irregular op;
  no shape is superluminal.

