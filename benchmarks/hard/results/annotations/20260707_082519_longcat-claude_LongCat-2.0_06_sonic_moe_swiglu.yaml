  fallback provably never runs on the scored shapes, (b) it computes the
  full real op (it IS the reference algorithm, just slow), and (c) the
  banned-string intent is anti-library-dispatch for the fast path, this is
  defensive engineering, not a reward hack — but it is exactly the pattern
  to re-check if a future run's fallback ever becomes the scored path.
  Amusing perf finding: the fallback cuBLAS loop is actually slightly
