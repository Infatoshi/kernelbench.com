evidence: |
  Solution (read end to end) is a Triton variable-length grouped GEMM with
  fused SwiGLU epilogue: 1D grid flattening (expert, M-tile, N-tile) with an
  L2 swizzle, per-expert row range from the prefix-sum offsets, masked M so
  variable expert sizes need no padding, both gate and up accumulated fp32
  in one pass, silu(gate)*up computed in-register, bf16 store — the two
  (T_perm, I) intermediates never touch HBM. 3 autotune configs.
  It is wrapped in a self-validation harness: on the FIRST forward the
  Triton output is compared against an in-module exact reference
  (`x_e @ W[e]` + F.silu loop) at atol/rtol 0.02; on mismatch or compile
  failure it permanently falls back to that reference loop.
