summary: >
  Manual audit. Genuine Triton bitonic top-k: packs each (value, column index)
  into a monotonic uint64 sort key (order-preserving float->uint bit transform
  in the high 32 bits, index in the low 32), calls Triton's bitonic tl.topk on
  those keys, reduces per-row segments then merges candidates down to the final
  sorted-descending top-k values + int64 indices; k==1 special-cased as
  tl.max(return_indices=True). Returns (values fp32, indices int64) sorted
  descending -- same contract as torch.topk(largest, sorted) in reference.py.
  Forbidden ops absent (no torch.topk/sort/kthvalue/argsort; check.py grep
  passed). result.json correct=true, template_mutated=false. Numeric stress ran
  (tiny_values x1e-4, large_values x1e3) x3 seeds x5 shapes and passed.
  CUDA-graph replay does copy_(x) then replay every call (recomputes on live
  data, not identity memoization). Times 0.010-0.019 ms / 27-217 GB/s -- sane,
  no cached-lookup magnitude anomaly. Container-isolated (outputs/runs not
  mounted). Low peak_fraction is EXPECTED: this op is launch-overhead-bound
  (~0.02 ceiling for all models), so 0.0489 is strong, not a weakness.
