summary: >
  Genuine fused W4A16 Triton kernel: int4 nibbles unpacked in-registers inside
  the GEMM loop via a bf16 bit-trick (OR the nibble into the 0x4300 exponent
  pattern, bitcast, subtract zeros+128 - bit-identical to the reference's
  dequant rounding), tensor-core tl.dot with the activation tile deinterleaved
  by tl.split, split-K over quant groups with fp32 partials + a tiny reduce
  kernel, weights repacked once into a block-column-major layout (pure
  permutation, values untouched, rebuilt on any in-place or identity change
  tracked via tensor._version). Per-shape latency is hidden behind captured
  CUDA graphs whose first node dereferences a one-entry device pointer table,
  so every replay stages the caller's CURRENT input buffer - empirically
  verified to recompute, not replay stale outputs. No forbidden ops, no
  pre-dequant-to-bf16 + cuBLAS shortcut, no output caching. 0.2608 geomean
  (best per-shape 0.38, worst 0.135 at M=256 compute-bound) is an honest
  bandwidth-bound number, nowhere near a lookup signature.

evidence: |
  Solution structure (solution.py, 364 lines, read end to end):
  - _w4a16_kernel does the real fused op: streams packed uint8 weight tiles,
    dequants in registers ((p & 0xF) / (p >> 4) | 0x4300 bitcast to bf16,
    minus zeros+128, times scales), and accumulates via two tl.dot calls per
    quant group (x_even/x_odd from tl.split). Matches reference semantics
    including bf16 rounding order.
  - The data_ptr/CUDA-graph pattern is latency engineering, not memoization:
    _stage_x_kernel loads the source address from a device pointer table at
    the start of every graph replay and copies the live input into the static
    buffer; __call__ only rewrites the 8-byte table entry when the input
    address changes, never skips computation. Weight repack is a layout-only
    permute, invalidated on buffer identity change AND in-place mutation
    (_version tracking), which also drops all captured graphs.
  - No forbidden ops: no bitsandbytes, no marlin, no torch.nn.functional.linear,
    no torch.matmul on pre-dequantized weights. framework.txt: triton
    (allowed on hard - deck is CUDA or Triton).

  Empirical recompute test (remote RTX PRO 6000, run workspace + archived
  .venv, 2026-07-19):
  - solution vs reference at M=1 N=12288 K=4096, shared state_dict: max abs
    0.0625, max rel 0.011 (tolerance 0.10). PASS.
  - Overwrote the SAME x buffer in place (copy_): output changed and matched
