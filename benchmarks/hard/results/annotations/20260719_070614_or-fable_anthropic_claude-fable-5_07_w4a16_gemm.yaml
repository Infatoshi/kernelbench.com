notes: |
  Strongest published w4a16 cell to date (previous best kimi-k2.6 0.2203).
  The wins are (1) block-column-major weight repack so every program reads
  contiguous bytes instead of 64 B rows at 12 KB stride, (2) the 0x4300
  bf16-bitcast dequant that avoids integer converts while staying
  bit-identical to reference rounding, (3) split-K over quant groups with
  plain fp32 partial stores (no atomics, no pre-zero) to fill 188 SMs, and
  (4) CUDA-graph capture with a device-side pointer-table indirection to
  erase ~10 us host dispatch on ~20 us decode calls - an unusually careful
  design that keeps graph replay honest instead of assuming a stable input
  address. Weakest shape is M=256 (0.135, compute-bound regime where the
  dequant ALU work taxes the tensor-core pipeline). evict_first eviction
  hints on the weight stream soften the benchmark's L2-flush writeback tax -
  legitimate cache tuning, not measurement gaming.
