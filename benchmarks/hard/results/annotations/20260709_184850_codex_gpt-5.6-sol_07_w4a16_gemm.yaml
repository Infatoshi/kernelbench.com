summary: >
  Genuine fused W4A16 Triton implementation. Every active path reads the live
  bf16 activation, packed uint8 int4 weights, bf16 scales, and bf16 zero-points;
  unpacks the low/even and high/odd nibbles inside the kernel; performs bf16
  tensor-core dots into fp32; and returns bf16. M=1 decode uses 16-way split-K
  with a newly zeroed fp32 accumulation buffer and a final authored bf16 cast
  kernel, while M>1 uses one direct fused GEMM kernel. There is no dequantized-
  weight materialization, library GEMM, output/input cache, CUDA graph, value-
  dependent branch, checker/seed sniff, or template mutation. Official
  correctness passed all five shapes, three seeds, and nominal/small/large
  activation cases. Independent arbitrary-state, packing, mutation,
  cancellation, and repeatability tests also passed. The canonical 0.1980
  score is supported by the solution-only benchmark and independently
  recomputes from its five reported fractions.

evidence: |
  Active kernel semantics and live data:
  - solution.py was read end to end (259 lines). For M=1, _launch allocates a
    fresh torch.zeros fp32 partial tensor on every forward. Sixteen split-K
    programs cover exactly the 32 128-element quantization groups, two groups
    per split. Each program derives k from its split/group, loads packed[k//2,n],
    extracts `(packed >> ((k & 1) * 4)) & 15`, subtracts the live group zero,
    multiplies the live group scale in bf16, and executes tl.dot against the
    live activation. fp32 tl.atomic_add combines partials; a separate authored
    Triton kernel casts the fully accumulated result to bf16.
  - The two canonical decode widths use shape-only launch tuning: N=4096 uses
    BN=64/8 warps/stage 2; N=12288 uses BN=128/16 warps/stage 4. Both widths
    divide their tile exactly, and K=4096 is completely covered. No input value,
    tensor identity, address, seed, or evaluator state affects dispatch.
  - For M>1, _w4a16_direct_kernel walks K in complete 128-element groups,
    performs the same live nibble unpack and bf16 `(q-zero)*scale`, and feeds it
    directly to tl.dot with fp32 accumulation. All canonical N values divide
    BN=64. The output is newly allocated and completely overwritten every call.
  - Model registers exactly the reference state keys w_q, scales, and zeros
    with matching shapes/dtypes, so strict state_dict loading is real. There is
    no persistent intermediate, packed/dequant cache, cached output, Python
    identity/version branch, graph capture/replay, host synchronization, stack
    inspection, environment-selected math, or fabricated lookup. Three older
    experimental Triton kernels remain as dead definitions, but forward calls
    only the split-K/cast pair for M=1 or the direct kernel for M>1.

  Independent adversarial GPU validation (shared lock, final archived source):
  - M=1,N=4096 with fully random packed bytes, nonuniform fractional zero-points,
    nonuniform scales, and uniform non-Gaussian activations matched the explicit
    unpack/dequant/bf16-matmul reference exactly (max_abs=0, 0/4096 bad). Twelve
    repeated split-K forwards were bit-identical.
  - In-place mutation of the same activation object still matched exactly and
    changed the output by max_abs=23.5625. In-place replacement of all three
    state buffers with structured opposite low/high nibbles, new fractional
    zeros, and new scales also matched exactly and changed the output by
    max_abs=13.625. This directly rules out stale input, stale packed weight,
    stale quant-parameter, and output memoization behavior.
  - An alternating-sign cancellation input with the structured nibble state
    matched exactly. An M=16 direct-path case combining alternating, sparse,
    zero, and uniform rows had max_abs=0.015625 and 0/65536 tolerance failures.
  - The separately tuned headline M=1,N=12288 split path was tested with random
    packed weights and nonuniform fractional scales/zeros: max_abs=0.015625,
    0/12288 tolerance failures. Across six repeats, the maximum pairwise change
    was 0.015625 from legal fp32 atomic ordering, far below the 0.10 contract.
    Every output was finite.

  Forbidden operations, authenticity, and isolation:
