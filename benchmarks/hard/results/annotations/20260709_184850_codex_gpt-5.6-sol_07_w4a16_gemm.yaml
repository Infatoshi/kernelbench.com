notes: |
  result.json retains harness_exit_code=1 because, after the final internal
  benchmark, Codex could not refresh a revoked OAuth token and therefore emitted
  no final prose message. stderr.log records the terminal 401 refresh failure;
  the complete event trace nevertheless ends with task_complete. The archive-
  level harness then independently ran the final full checker and canonical
  benchmark successfully (both exit 0), classifying the cell as
  failure_reason=pass. This does not weaken the kernel, correctness, provenance,
  or score evidence.

  The M=1 fp32 atomic sum is not guaranteed bitwise deterministic across all
  schedules. The independent headline-width test observed at most one bf16 ULP
  (0.015625) across six runs, with every run inside tolerance; the smaller
  decode test was bit-identical across twelve runs. This is ordinary reduction-
  order behavior, not a benchmark shortcut, and every call recomputes from live
  inputs and live quantization state.
