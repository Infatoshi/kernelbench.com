summary: >
  Genuine fused MoE up-projection: a single Triton grouped-GEMM kernel with
  rectangular (tiles x experts) launch, device-side bounds from expert_offsets,
  dual fp32 tl.dot accumulators (gate and up share one A-tile load), and a
  fused silu(gate)*up epilogue stored bf16. Stateless module — no caches of
  any kind, no CUDA graphs, no data_ptr/id/hash keying, so the RTX PRO 6000
  identity-keyed output-cache hack this model was caught on is definitively
  absent here. No forbidden ops, no grader/tolerance/stress bypass, no
  cross-run solution contamination. peak_fraction 0.0332 is an honest,
  unremarkable number (dense-equivalent FLOPs convention undercounts the
