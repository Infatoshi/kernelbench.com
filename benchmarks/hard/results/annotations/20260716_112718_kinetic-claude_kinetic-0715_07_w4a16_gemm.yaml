summary: >
  Clean record cell. The submission is a genuine end-to-end fused W4A16 GEMM:
  M=1 uses a custom split-K CUDA GEMV that streams packed int4 weights and live
  bf16 activations, applies the live per-group scales and zero-points inside the
  reduction, and combines fp32 partials in one launch; larger M uses a
  cp.async-staged mma.sync.m16n8k16 bf16 GEMM that dequantizes packed nibbles in
  registers and accumulates in fp32. It does not call Marlin, bitsandbytes,
  CUTLASS GEMM, a prebuilt W4A16 kernel, or any problem.yaml-forbidden op. Each
  call allocates a fresh output and launches on current input/state. Cached raw
  pointers refer only to the live buffers and reusable zeroed workspace, not
  cached values or results. The official five shape fractions reproduce
  0.3733 exactly and top out at 0.6155, so the best-ever score is fast but not
  superluminal.

evidence: |
  End-to-end W4A16 semantics (solution.py, 599 lines; MD5
  b3eda747c0190b9d7f4094efd9776e36):
  - The M=1 path reads x, packed w_q, scales, and zeros through live pointers.
    Each official GEMV configuration uses a 128-K group chunk. Coalesced
    uint32 loads expose four packed columns per thread; low/high nibbles are
    converted with the 0x43000000 magic-bias representation. For each group it
    computes s * (sum(x*(128+q)) - (128+z)*sum(x)), algebraically equal to
    sum(x*(q-z)*s) under the deck's group-128 asymmetric dequantization.
  - GEMV split-K blocks atomic-add fp32 partials into _ws. The last block for a
    column tile reads the completed sum, writes a newly allocated bf16 output,
    zeros those workspace entries, and resets its counter. This is live
    recomputation with reusable scratch, not result caching.
  - For M>=8, every K=128 tile cp.async-loads live x, raw packed w_q, scales,
    and zeros into staged shared memory. dq_byte forms paired bf16 values as
    (nibble - zero)*scale in registers, and mma.sync.m16n8k16 performs the real
    dense product with fp32 accumulation. The default official path writes a
    fresh torch::empty output directly; the optional split-K path likewise
    resets all partial workspace and counters after conversion.
  - Model dispatch depends only on M/N/K and optional performance configuration
    variables. The M=1 raw-pointer tuple is invalidated after load_state_dict;
    even without pointer changes, in-place mutations remain visible because the
    kernel dereferences the same live buffers on every launch. The tuple stores
    no tensor contents. There is no saved output, activation identity test,
    input fingerprint, seed/shape answer table, CUDA graph, stack inspection,
    caller check, or grader-dependent branch. __call__ = forward removes Python
    hook overhead but does not change the computation.

  Why the record kernel is fast:
  - Decode avoids materializing a dequantized KxN matrix: packed int4 bytes are
    streamed once, activations are staged in shared memory, four columns are
    accumulated per thread, and group scale/zero correction is fused into the
    reduction. Split-K supplies enough parallelism while its atomic reduction,
    output conversion, and workspace reset stay in one kernel launch.
  - Prefill keeps the original packed weight layout, so there is no repack or
    preprocessing launch. A shape-specialized BM/BN/warp/stage dispatch uses a
    multistage cp.async pipeline, ldmatrix for A fragments, paired-bf16 nibble
    dequantization in registers, and mma.sync tensor-core accumulation.
  - The extension is compiled once and the GEMV host path caches stable raw
    pointers, trimming fixed Python/dispatcher overhead without caching data.
    These techniques explain 997.149 and 619.401 GB/s on the two M=1 shapes and
    1107.953 GB/s on M=16 while preserving the full live operation.

