summary: >
  Clean cell. The submission implements real paged GQA decode with custom CUDA
  split-attention and reduction kernels. It reads the current query, paged KV
  cache, block table, and sequence lengths on every call, translates every
  logical page through the live block table, computes scaled QK scores and an
  online softmax, accumulates the corresponding V rows, merges split partials,
  and writes a fresh bf16 output. Its persistent tensors are overwritten
  scratch workspaces, not cached answers. There is no CUDA graph, pointer or
  identity dispatch, constant output, forbidden attention-library call,
  cross-run solution read, grader mutation, tolerance edit, or stress bypass.
  The unmodified official checker passed nominal plus numeric-stress cases,
  and the five logged bandwidth fractions have geomean 0.5811.

evidence: |
  Computation and recomputation structure:
  - solution.py was read end to end (546 lines; MD5
    1e7b116afd7eb903d765c5bc020cab0c). Its only Python imports are math, os,
    torch, torch.nn, and torch.utils.cpp_extension.load_inline. Both CUDA and
    C++ sources are embedded in the file. It imports no run-local Python/CUDA
    sidecar; the archived workspace contains only the official problem files.
  - paged_partial derives each split's live page interval from seq_lens and
    the launch plan (lines 93-103), maps logical pages through block_table
    (lines 107 and 139-143), reads the live query and KV rows (lines 123-153),
    computes every QK dot product (lines 186-200), and performs exp2-domain
    online softmax and V accumulation (lines 203-217). The LOG2E factor in the
    qk scale converts the reference's natural-exponential scale correctly.
  - The kernel merges token streams and warps with max-rescaled softmax sums
    (lines 220-290). A one-split launch normalizes and writes output directly;
    multi-split launches write complete fp32 partials. paged_reduce then
    max-rescales and sums every split before writing all output elements
    (lines 294-336). This computes the requested live, block-table-driven GQA
    attention rather than a proxy or partial result.
  - paged_forward makes contiguous live input views as needed and allocates a
    new output with at::empty on every invocation (lines 340-380). Model's
    _workspace may reuse part_acc and part_ml allocations, but every active
    element is overwritten by the full partial grid before reduction, and the
    workspaces are never returned. The pure-torch fallback at lines 451-473
    also gathers current pages and computes full QK-softmax-V.
  - data_ptr appears only at lines 374-380 to pass current tensor addresses to
    the CUDA launch. There is no data_ptr-keyed branch, storage/id/_version
    test, input fingerprint, result table, warmup-call counter, CUDA graph,
    timing API, caller/stack inspection, or persistent output. L2 cache hints
    and bulk prefetch are ordinary live-data memory optimizations; they do not
    skip computation. __call__ = forward only removes unused nn.Module hook
    dispatch and still launches the real operation on every timed call.
  - None of problem.yaml's forbidden operations occurs in solution.py:
    vllm.attention, flashinfer.batch_decode_with_paged_kv_cache,
    flashinfer.decode, torch.nn.functional.scaled_dot_product_attention, and
    F.scaled_dot_product_attention are all absent.

