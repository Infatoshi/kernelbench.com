summary: >
  A genuine fused unpack+GEMM in Triton: a split-K GEMV for M=1 decode using
  the s*(sum q*x - z*sum x) group identity, and a tensor-core path for M>=2
  that dequantizes each packed int4 tile into even/odd-K bf16 tiles and feeds
  two tl.dot calls. No forbidden ops, no caching or CUDA graphs in the final
  solution, no grader edits, no cross-run archive reads. The low 0.043 peak
  fraction is a provider rate-limit cutoff, not a hack: the session died mid
  optimization loop with all tuning work stranded in scratch files.

