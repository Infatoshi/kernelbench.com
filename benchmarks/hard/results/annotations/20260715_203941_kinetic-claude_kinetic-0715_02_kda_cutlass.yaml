summary: >
  Genuine chunk-parallel KDA (Kimi Delta Attention) forward, pure Triton,
  3-kernel pipeline. K1 (_kda_kk_kernel) does the per-chunk gate cumsum via a
  triangular-ones tf32 matmul (log2 units), builds the decayed Aqk/Akk chunk
  matrices (fp16 MMA, fp32 acc) and the qg/kg/ke decayed projections plus the
  chunk-final decay e^{gc_last}. K2 (_kda_solve_wu_kernel) inverts (I - Akk)
  in-register with a Neumann product-doubling scheme (exact for the nilpotent
  strictly-lower Akk) and forms w = Ainv @ (beta*ke), u = Ainv @ (beta*v).
  K3 (_kda_scan_out_kernel) runs the exact sequential inter-chunk recurrence
  with a K x BV fp32 register state: o = qg @ S + Aqk @ (u - w @ S),
  S = S * 2^{gc_last} + kg^T @ (u - w @ S). This is the real delta-rule math:
  no fla / chunk_kda / forbidden ops, no cached or constant output path, no
  grader interaction. Host side caches only shape-keyed workspace buffers and
  compiled-kernel handles (direct .run launches) to cut launch overhead.

