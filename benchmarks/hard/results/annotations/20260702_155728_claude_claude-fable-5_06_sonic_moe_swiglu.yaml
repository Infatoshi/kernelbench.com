summary: >
  A genuine CUTLASS 3.x SM100 grouped GEMM with a hand-modified fused SwiGLU
  epilogue: the stock Blackwell ptr-array 2-SM tcgen05 mainloop feeds a custom
  epilogue that pair-loads gate/up TMEM subtiles, computes silu(g)*u in fp32
  registers, and TMA-stores the half-width bf16 tile. Weights are pre-interleaved
  128-column blocks; per-group shapes/pointers are built on device with no host
  sync. A Triton persistent grouped-GEMM kernel is the fallback. No forbidden
  ops, no output caching, no grader edits, no cross-run archive reads.

