          def _forward_ext(self, hidden_states, expert_offsets):
              ext = _get_ext()
              T_perm, H = hidden_states.shape
              if expert_offsets.dtype != torch.int32:
                  expert_offsets = expert_offsets.to(torch.int32)
              if not expert_offsets.is_contiguous():
                  expert_offsets = expert_offsets.contiguous()
              if not hidden_states.is_contiguous():
                  hidden_states = hidden_states.contiguous()
              W = self._w_cat()
              out = torch.empty(T_perm, self.I, dtype=torch.bfloat16, device=hidden_states.device)
              ga, ws = self._ext_buffers(ext, hidden_states.device)
              ext.run(hidden_states, W, out, expert_offsets, ga, ws,
                      self.E, H, 2 * self.I, self.I, self._sm_count, *self.cfg)
              return out
  - file: solution.py
    lines: [115, 126]
    label: "Only cache is a weight-layout repack, keyed on data_ptr + version"
    text: |
          def _w_cat(self):
              wg, wu = self.W_gate, self.W_up
              key = (wg.data_ptr(), wg._version, wu.data_ptr(), wu._version)
              if self._w_cache is not None and self._w_cache[0] == key:
                  return self._w_cache[1]
              HB = 128
              E, H, I = self.E, self.H, self.I  # noqa: E741
              Wg = wg.detach().reshape(E, H, I // HB, HB)
              Wu = wu.detach().reshape(E, H, I // HB, HB)
              W = torch.stack([Wg, Wu], dim=3).reshape(E, H, 2 * I).contiguous()
              self._w_cache = (key, W)
              return W

implication: >
  Audit is static + trace only: the run executed on a rented B200 that has since
  been torn down, so no empirical recompute test was possible. Static evidence is
  unambiguous — the output tensor is freshly allocated and written by the grouped
  GEMM every forward, hidden_states is never hashed or identity-checked, and the
  only caches hold weight repacks (invalidated by data_ptr/_version, so numeric
  stress rescales are honored), routing-schedule metadata (invalidated by
  offsets identity/_version), and workspace buffers. Transcript shows check.py /
  numeric_stress.py were only read, never edited; KBH_NUMERIC_STRESS was never
  set; zero references to other runs' archives (containered at /workspace).
  The 0.0762 headline understates the hardware: the dense-equivalent FLOPs
  convention divides real work by K (8x on shapes 0/2), so the kernel actually
  sustains roughly half of B200 bf16 peak heat-soaked (~73% cold per the agent's
  measurements, which also documented tcgen05 thermal throttling 1965 to 1057 MHz).
  CUTLASS grouped GEMM is the PROMPT's explicitly intended path.
