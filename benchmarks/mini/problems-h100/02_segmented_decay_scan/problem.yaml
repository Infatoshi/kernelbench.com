name: 02_segmented_decay_scan
display_name: "Segmented Exponential-Decay Scan (episode resets)"
precision: bf16
regime: memory  # streams x + decay in, trajectory out; ~8 B/elem of traffic

# Nominal arithmetic: one mul + one add + one select per element.
flops_formula: "3 * B * T * D"

# Bytes moved per call:
#   x:      B*T*D*2  (bf16)
#   decay:  B*T*D*4  (fp32)
#   out:    B*T*D*2  (bf16)
#   resets: B*T      (bool)
bytes_formula: "B*T*D*(2+4+2) + B*T"

hardware: [H100_SXM]
peak_tflops_key: bf16
peak_bandwidth_key: dram

tolerance:
  bfloat16: 5.0e-2  # long decay chains accumulate bf16 rounding vs the fp32 loop

# Triton allowed (Mini 01/02 are language-open; 03/04 are CUDA-only).
allow_triton: true
require_cuda_evidence: false

forbidden:
  - "import reference"
  - "from reference"

sota:
  name: "none pinned — segmented scans with per-token reset masks have no library kernel"
  url: ""
  function: ""
  notes: |
    mamba-ssm / fla selective-scan kernels implement adjacent recurrences but
    not this exact reset-mask semantics; the ceiling is the DRAM roofline.
  deps: []

num_correct_trials: 3
num_perf_trials: 30
