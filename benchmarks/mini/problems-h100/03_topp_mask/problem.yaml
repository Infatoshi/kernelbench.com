name: 03_topp_mask
display_name: "Sort-free Top-p (nucleus) Mask (CUDA-only)"
precision: fp32
regime: memory  # one logits read + one mask write; headline metric is MILLISECONDS

# Nominal arithmetic (softmax + selection); documentation only — this cell is
# graded on ms speedup vs the frozen eager anchor, not peak fraction.
flops_formula: "5 * B * V"

# Bytes: logits in (fp32) + mask out (bool).
bytes_formula: "B*V*4 + B*V"

hardware: [H100_SXM]
peak_tflops_key: fp32
peak_bandwidth_key: dram

# Correctness is EXACT outside a float64 oracle band (see check.py): tokens
# whose exclusive cumulative mass is more than 1e-3 away from p are forced;
# tokens inside the band are free (absorbs fp32 summation-order rounding).
tolerance:
  float32: 0.0

language: cuda
require_cuda_evidence: true

# The reference sorts; the solution may not — a sort-free device algorithm
# (histogram / counting / threshold search) is the entire problem. Patterns
# cover both function and tensor-method spellings.
forbidden:
  - "torch.sort"
  - "torch.argsort"
  - "torch.msort"
  - "torch.topk"
  - "torch.kthvalue"
  - "torch.quantile"
  - ".sort("
  - ".argsort("
  - ".msort("
  - ".topk("
  - ".kthvalue("
  - "cub::DeviceRadixSort"
  - "cub::DeviceSegmentedRadixSort"
  - "thrust::sort"
  - "import triton"
  - "from triton"
  - "@triton.jit"
  - "triton.language"
  - "import reference"
  - "from reference"

sota:
  name: "torch.sort + cumsum eager path (the reference itself)"
  url: ""
  function: ""
  notes: |
    Inference engines (vLLM, TensorRT-LLM) fuse top-p into sampling; none
    expose a standalone sort-free mask kernel. The anchor is the eager
    reference, timed and frozen at deck publication.
  deps: []

num_correct_trials: 3
num_perf_trials: 50
