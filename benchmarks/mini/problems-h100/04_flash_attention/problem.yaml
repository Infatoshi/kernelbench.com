name: 04_flash_attention
display_name: "Causal FlashAttention Forward (CUDA-only)"
precision: bf16
regime: compute

# Causal FLOPs: half of the dense 4*B*H*S*S*D (two matmuls over the lower
# triangle). The ceiling is real here — peak_fraction is the headline.
flops_formula: "2 * B * H * S * S * D"

# Bytes: q + k + v + o, bf16.
bytes_formula: "B * H * S * D * 2 * 4"

hardware: [H100_SXM]
peak_tflops_key: bf16
peak_bandwidth_key: dram

tolerance:
  bfloat16: 5.0e-2  # flash reordering noise vs the fp32-softmax reference

language: cuda
require_cuda_evidence: true

forbidden:
  - "scaled_dot_product_attention"
  - "flash_attn"
  - "flashinfer"
  - "xformers"
  - "memory_efficient_attention"
  - "import triton"
  - "from triton"
  - "@triton.jit"
  - "triton.language"
  - "import thunderkittens"
  - "from cutlass.cute"
  - "import tilelang"
  - "import reference"
  - "from reference"

sota:
  name: "torch SDPA flash/cudnn backend (F.scaled_dot_product_attention, is_causal)"
  url: "https://arxiv.org/abs/2307.08691"
  function: "torch.nn.functional.scaled_dot_product_attention"
  notes: |
    SDPA routes to FlashAttention-2 / cuDNN fused attention on SM90; that is
    the ceiling line. Forbidden in solution.py, used only as the sota variant.
  deps: []

num_correct_trials: 3
num_perf_trials: 15
