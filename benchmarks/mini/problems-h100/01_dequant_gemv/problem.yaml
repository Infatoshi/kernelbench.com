name: 01_dequant_gemv
display_name: "Gated W4A16 Dequant GEMV (group size 96)"
precision: int4_bf16
regime: memory  # M<=4 decode: bandwidth-bound on the two int4 weight streams

# Dense-equivalent FLOPs: two GEMVs (gate + up); silu/mul epilogue ignored.
flops_formula: "2 * 2 * M * N * K"

# Bytes moved per call (memory roofline):
#   x:            M*K*2                       (bf16 activations)
#   w_q (x2):     (K/2)*N each                (packed int4, 0.5 B/elem)
#   scales+zeros: ((K+95)//96)*N*2*2 each mat (bf16, ragged group count)
#   out:          M*N*2                       (bf16 store)
bytes_formula: "M*K*2 + 2*((K/2)*N + ((K+95)//96)*N*4) + M*N*2"

hardware: [H100_SXM]
peak_tflops_key: bf16
peak_bandwidth_key: dram

tolerance:
  bfloat16: 0.10  # group-quant noise on top of bf16 accumulator slop

# Group size along K. NOT 128 — the last group is ragged for most K.
group_size: 96

# Triton is allowed on this problem (Mini 01/02 are language-open; 03/04 are
# CUDA-only). DSLs still fail the gate; a pure torch chain is allowed to run
# but cannot win the roofline.
allow_triton: true
require_cuda_evidence: false

forbidden:
  - "bitsandbytes.functional.dequantize_4bit"
  - "bitsandbytes.functional.gemv_4bit"
  - "marlin_kernel.gemm"
  - "torch.nn.functional.linear"
  - "import reference"
  - "from reference"

sota:
  name: "none pinned — decode W4A16 SOTA (Marlin/machete) is group-128; group-96 has no library path"
  url: "https://github.com/IST-DASLab/marlin"
  function: ""
  notes: |
    The group-96 ragged layout is deliberate: no vendor kernel supports it, so
    there is no library ceiling to call. The roofline ceiling is DRAM bandwidth
    on the packed weight stream.
  deps: []

num_correct_trials: 3
num_perf_trials: 50
