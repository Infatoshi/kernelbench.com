name: 10_patch_embed_conv3d_gemm
display_name: "Conv3d-as-GEMM Patch Embedding"
precision: bf16
regime: compute  # GEMM-equivalent, embed_dim=1280 is well above the bf16 ridge

# Dense FLOPs: 2 * (num_patches) * (C * kT * kH * kW) * embed_dim.
# With stride==kernel and divisible inputs, num_patches * (kT*kH*kW) = T*H*W,
# so this collapses to: 2 * B * embed_dim * C * T * H * W.
flops_formula: "2 * B * embed_dim * C * T * H * W"

# Bytes moved (lower bound):
#   read input x:    B * C * T * H * W * 2
#   read weights:    embed_dim * C * kT * kH * kW * 2
#   write output:    B * embed_dim * (T // kT) * (H // kH) * (W // kW) * 2
bytes_formula: "B*C*T*H*W*2 + embed_dim*C*kT*kH*kW*2 + B*embed_dim*(T//kT)*(H//kH)*(W//kW)*2"

hardware: [RTX_PRO_6000]
peak_tflops_key: bf16
peak_bandwidth_key: dram

tolerance:
  bfloat16: 0.02

# Forbidden ops -- agent must implement the fused patch-gather + GEMM
# themselves. Banning Conv3d/conv3d (the cuDNN dispatch) and matmul/bmm/linear/
# einsum (the lazy reshape-then-cuBLAS shortcut). Unfold is also banned for
# completeness even though it's nominally 2D.
forbidden:
  - "torch.nn.Conv3d"
  - "torch.nn.functional.conv3d"
  - "F.conv3d"
  - "torch.conv3d"
  - "torch.matmul"
  - "torch.bmm"
  - "torch.nn.functional.linear"
  - "F.linear"
  - "torch.einsum"
  - "torch.nn.functional.unfold"
  - "F.unfold"

sota:
  name: "cuDNN Conv3d (torch.nn.functional.conv3d)"
  url: "https://docs.nvidia.com/deeplearning/cudnn/api/index.html"
  function: "torch.nn.functional.conv3d"

num_perf_trials: 30
